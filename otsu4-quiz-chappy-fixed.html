      "堆積粉が広く存在する場合は、１次の爆発が堆積粉を舞い上げて、２次の爆発を起こし、次々にこの過程を繰り返し遠方に伝播することがある。",
      "気体と比べて、粉体はその種類や環境条件などによって静電気が発生しやすく、その放電は粉じん爆発の着火源になる場合がある。",
      "可燃性粉じんと空気との混合気は、可燃性ガスと空気との混合気に比べて比重が大きく、一般的に爆発時の発生熱量が大きい。",

    explanation: "粉じんは気体や蒸気と異なり、粒径が大きいため酸素と均一に混合しにくく、不完全燃焼を起こしやすいです。「完全燃焼しやすい」という記述が誤りです。",
  },
  {
    id: 419,
    genre: "kagaku2",
    genreLabel: "基礎化学②",
    subCategory: "粉じん爆発③特徴の誤り",
    difficulty: 2,
    type: "誤っているものを選べ",
    question: "粉じん爆発の特徴について、次のうち誤っているものはどれか。",
    options: [
      "有機物の粉じん爆発の場合、不完全燃焼を起こしやすく、生成ガス中に一酸化炭素が多量に含まれていることがあるので、中毒を起こしやすい。",
      "爆発の際、粒子が燃えながら飛散するので、周囲の可燃物は局部的にひどく炭化したり着火する可能性がある。",
      "一般にガス爆発に比較して、発生するエネルギーが小さい。",
      "最初の部分的な爆発により、たい積している可燃性粉じんが舞い上がり、次々に爆発的な燃焼が持続し、被害が大きくなる。",
      "一般にガス爆発に比較して、最小着火エネルギーが大きい。",
    ],
    answer: 2,
    explanation: "粉じん爆発はガス爆発に比べて発生するエネルギーが数倍「大きい」です。「小さい」という記述が誤りです。最小着火エネルギーはガス爆発より大きい（着火しにくい）のは正しい。",

const StarRating = ({ count }) => (
  <span>
    {[1, 2, 3].map((i) => (
      <span key={i} style={{ opacity: i <= count ? 1 : 0.2, fontSize: "12px", color: "#c8a96e" }}>★</span>
    ))}
  </span>
);


function App() {
  const [activeGenre, setActiveGenre] = useState("all");
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [correctCount, setCorrectCount] = useState(0);
  const [finished, setFinished] = useState(false);
  const [results, setResults] = useState([]);
  const [quizStarted, setQuizStarted] = useState(false);
  const [lapCounts, setLapCounts] = useState({});
  const [savedProgress, setSavedProgress] = useState({});
  const [storageLoaded, setStorageLoaded] = useState(false);
  const [wrongIds, setWrongIds] = useState(new Set());

  useEffect(() => {
    try { const r = localStorage.getItem("lapCounts"); if(r) setLapCounts(JSON.parse(r)); } catch(e){}
    try { const r = localStorage.getItem("savedProgress"); if(r) setSavedProgress(JSON.parse(r)); } catch(e){}
    try { const r = localStorage.getItem("wrongIds"); if(r) setWrongIds(new Set(JSON.parse(r))); } catch(e){}
    setStorageLoaded(true);
  }, []);

  const save = (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){ console.log("storage err",e); }
  };

  const filteredQuestions = activeGenre === "all"
    ? allQuestions
    : activeGenre === "wrong"
      ? allQuestions.filter(q => wrongIds.has(q.id))
      : allQuestions.filter(q => q.genre === activeGenre);
  const q = filteredQuestions[current];
  const genreInfo = GENRES.find(g => g.id === activeGenre) || { id: "wrong", label: "間違えた問題", icon: "❌" };
  const savedForGenre = savedProgress[activeGenre];
  const hasSaved = storageLoaded && !!(savedForGenre && savedForGenre.current > 0);

  const handleGenreSelect = (id) => {
    if (quizStarted && !finished) {
      const p = { ...savedProgress, [activeGenre]: { current, correctCount, results } };
      setSavedProgress(p);
      save("savedProgress", p);
    }
    setActiveGenre(id);
    setCurrent(0); setSelected(null); setShowResult(false);
    setCorrectCount(0); setFinished(false); setResults([]); setQuizStarted(false);
  };

  const handleStart = () => {
    if (savedForGenre && savedForGenre.current > 0) {
      setCurrent(savedForGenre.current);
      setCorrectCount(savedForGenre.correctCount);
      setResults(savedForGenre.results || []);
    }
    setQuizStarted(true);
  };

  const handleSelect = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
    setShowResult(true);
    const correct = idx === q.answer;
    if (correct) setCorrectCount(c => c + 1);
    setResults(r => [...r, { correct, id: q.id }]);
    // 間違えた問題を記録・正解したら削除
    setWrongIds(prev => {
      const next = new Set(prev);
      if (correct) {
        next.delete(q.id);
      } else {
        next.add(q.id);
      }
      save("wrongIds", [...next]);
      return next;
    });
  };

  const handleNext = () => {
    if (current + 1 >= filteredQuestions.length) {
      const newLaps = { ...lapCounts, [activeGenre]: (lapCounts[activeGenre] || 0) + 1 };
      const newProg = { ...savedProgress };
      delete newProg[activeGenre];
      setLapCounts(newLaps);
      setSavedProgress(newProg);
      setFinished(true);
      save("lapCounts", newLaps);
      save("savedProgress", newProg);
    } else {
      setCurrent(c => c + 1);
      setSelected(null);
      setShowResult(false);
    }
  };

  const handlePause = () => {
    const p = { ...savedProgress, [activeGenre]: { current, correctCount, results } };
    setSavedProgress(p);
    save("savedProgress", p);
    setSelected(null); setShowResult(false); setQuizStarted(false);
  };

  const handleRestart = () => {
    const p = { ...savedProgress };
    delete p[activeGenre];
    setSavedProgress(p);
    save("savedProgress", p);
    setCurrent(0); setSelected(null); setShowResult(false);
    setCorrectCount(0); setFinished(false); setResults([]); setQuizStarted(false);
  };

  if (!storageLoaded) return (
    <div style={{minHeight:"100vh",background:"#1a1612",display:"flex",justifyContent:"center",alignItems:"center"}}>
      <div style={{color:"#c8a96e",fontSize:16}}>読み込み中...</div>
    </div>
  );

  if (finished) {
    const pct = Math.round((correctCount / filteredQuestions.length) * 100);
    return (
      <div style={s.root}><div style={s.wrap}>
        <div style={s.header}><span style={s.headerTitle}>🔥 乙種第４類</span></div>
        <div style={s.tabRow}>{GENRES.map(g => (
          <button key={g.id} style={{...s.tab,...(activeGenre===g.id?s.tabActive:{})}} onClick={() => handleGenreSelect(g.id)}>
            {g.icon} {g.label}
            {g.id === "wrong"
              ? wrongIds.size > 0 ? <span style={{...s.lapBadge, background:"#de5d5d", color:"#fff"}}>{wrongIds.size}</span> : null
              : lapCounts[g.id] ? <span style={s.lapBadge}>{lapCounts[g.id]}周</span> : null}
          </button>
        ))}</div>
        <div style={s.finishCard}>
          <div style={{fontSize:48,marginBottom:12}}>🔥</div>
          <h2 style={s.finishTitle}>お疲れさまでした！</h2>
          <div style={s.scoreCircle}>
            <span style={s.scoreNum}>{correctCount}</span>
            <span style={s.scoreDenom}>/ {filteredQuestions.length}</span>
          </div>
          <div style={s.pctText}>{pct}% 正解</div>
          <div style={s.resultList}>{filteredQuestions.map((qq,i) => (
            <div key={qq.id} style={s.resultRow}>
              <div>
                <div style={s.resultQNum}>問{i+1}</div>
                <div style={{color:"#888",fontSize:11}}>{qq.subCategory}</div>
              </div>
              <span style={{...s.resultBadge,background:results[i]?.correct?"#1a3327":"#331a1a",color:results[i]?.correct?"#5dde8a":"#de5d5d",border:`1px solid ${results[i]?.correct?"#2a6b3c":"#6b2a2a"}`}}>
                {results[i]?.correct ? "正解 ✓" : "不正解 ✗"}
              </span>
            </div>
          ))}</div>
          <button style={s.nextBtn} onClick={handleRestart}>もう一度挑戦する</button>
        </div>
      </div></div>
    );
  }

  if (!quizStarted) return (
    <div style={s.root}><div style={s.wrap}>
      <div style={s.header}><span style={s.headerTitle}>🔥 乙種第４類</span></div>
      <div style={s.tabRow}>{GENRES.map(g => (
        <button key={g.id} style={{...s.tab,...(activeGenre===g.id?s.tabActive:{})}} onClick={() => handleGenreSelect(g.id)}>
          {g.icon} {g.label}
          {g.id === "wrong"
            ? wrongIds.size > 0 ? <span style={{...s.lapBadge, background:"#de5d5d", color:"#fff"}}>{wrongIds.size}</span> : null
            : lapCounts[g.id] ? <span style={s.lapBadge}>{lapCounts[g.id]}周</span> : null}
        </button>
      ))}</div>
      <div style={s.startCard}>
        <div style={s.startIcon}>{genreInfo.icon}</div>
        <h2 style={s.startTitle}>{genreInfo.label}</h2>
        <p style={s.startCount}>{filteredQuestions.length}問</p>
        {activeGenre === "wrong" && wrongIds.size === 0 ? (
          <p style={{color:"#5dde8a", fontSize:14, marginBottom:16}}>🎉 間違えた問題はありません！</p>
        ) : (
          <>
            {lapCounts[activeGenre] ? <div style={s.lapInfo}>🔄 {lapCounts[activeGenre]}周目完了</div> : null}
            {hasSaved ? (
              <div style={{marginBottom:10}}>
                <button style={s.resumeBtn} onClick={handleStart}>
                  ▶ {savedForGenre.current + 1}問目から再開
                </button>
                <button style={s.restartSmallBtn} onClick={handleRestart}>最初からやり直す</button>
              </div>
            ) : (
              <button style={s.startBtn} onClick={handleStart}>スタート →</button>
            )}
          </>
        )}
        <div style={{...s.questionPreviewList,marginTop:16}}>
          {filteredQuestions.map((qq,i) => (
            <div key={qq.id} style={s.previewRow}>
              <span style={s.previewNum}>問{i+1}</span>
              <span style={s.previewSub}>{qq.subCategory}</span>
              <StarRating count={qq.difficulty} />
            </div>
          ))}
        </div>
      </div>
    </div></div>
  );

  return (
    <div style={s.root}><div style={s.wrap}>
      <div style={s.header}>
        <button style={s.closeBtn} onClick={handlePause}>✕</button>
        <span style={s.headerTitle}>🔥 乙種第４類</span>
        <div style={{width:32}}/>
      </div>
      <div style={s.tabRow}>{GENRES.map(g => (
        <button key={g.id} style={{...s.tab,...(activeGenre===g.id?s.tabActive:{})}} onClick={() => handleGenreSelect(g.id)}>
          {g.icon} {g.label}
          {g.id === "wrong"
            ? wrongIds.size > 0 ? <span style={{...s.lapBadge, background:"#de5d5d", color:"#fff"}}>{wrongIds.size}</span> : null
            : lapCounts[g.id] ? <span style={s.lapBadge}>{lapCounts[g.id]}周</span> : null}
        </button>
      ))}</div>
      <div style={s.categoryBar}><span style={s.categoryText}>{genreInfo.icon} {genreInfo.label} ／ {q.subCategory}</span></div>
      <div style={s.progressRow}>
        <span style={s.progressText}>問{current+1} / {filteredQuestions.length}問</span>
        <div style={s.progressBar}><div style={{...s.progressFill,width:`${((current+1)/filteredQuestions.length)*100}%`}}/></div>
        <span style={s.progressText}>正解 {correctCount}</span>
      </div>
      <div style={s.metaRow}>
        <span style={s.pastTag}>過去問題</span>
        <span style={s.qNumLabel}>／ 問{current+1}</span>
        <StarRating count={q.difficulty}/>
        <span style={s.typeTag}>{q.type}</span>
      </div>
      <div style={s.questionBox}><p style={s.questionText}>{q.question}</p></div>
      <div style={s.optionsList}>{q.options.map((opt,idx) => {
        let extra = {};
        if (selected !== null) {
          if (idx === q.answer) extra = s.optCorrect;
          else if (idx === selected) extra = s.optWrong;
        }
        return (
          <button key={idx} style={{...s.optBtn,...extra}} onClick={() => handleSelect(idx)}>
            <span style={s.optNum}>{idx+1}</span>
            <span style={s.optText}>{opt}</span>
            {selected !== null && idx === q.answer && <span style={{color:"#5dde8a",fontWeight:700}}>✓</span>}
            {selected !== null && idx === selected && idx !== q.answer && <span style={{color:"#de5d5d",fontWeight:700}}>✗</span>}
          </button>
        );
      })}</div>
      {showResult && (
        <div style={{...s.resultPanel,borderColor:selected===q.answer?"#2a6b3c":"#6b2a2a"}}>
          <div style={{...s.resultLabel,color:selected===q.answer?"#5dde8a":"#de5d5d"}}>
            {selected===q.answer?"✓ 正解！":"✗ 不正解"}
          </div>
          <p style={s.explanationText}><span style={s.expLabel}>解説：</span>{q.explanation}</p>
          <button style={s.nextBtn} onClick={handleNext}>
            {current+1>=filteredQuestions.length?"結果を見る":"次の問題へ →"}
          </button>
        </div>
      )}
    </div></div>
  );
}
