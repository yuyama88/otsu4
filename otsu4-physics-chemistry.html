<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>乙4 物理化学</title>
<style>
:root{
  --bg:#15110d;--panel:#211810;--panel2:#19130e;--line:#3b2b1e;--text:#f7efe6;--muted:#c7ad92;--accent:#f2b35e;--good:#11381f;--goodLine:#32b96b;--bad:#3b1514;--badLine:#e25b50;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.62;font-size:16px}
.app{max-width:820px;margin:0 auto;padding:12px 10px 92px}
.header{padding:4px 0 8px}
h1{font-size:21px;margin:0 0 4px;line-height:1.25}
.sub{font-size:12px;color:var(--muted);margin-bottom:6px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:6px 0}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:6px 4px;text-align:center;min-height:48px}
.stat b{display:block;color:var(--accent);font-size:17px;line-height:1.1}
.stat span{display:block;color:var(--muted);font-size:9.5px;margin-top:3px}
.progress{height:6px;background:#1b1510;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:7px 0 8px}
.bar{height:100%;width:0%;background:var(--accent)}
select,button{width:100%;border:0;border-radius:12px;padding:9px 10px;font-size:14px;font-weight:700}
select{background:#f5efe8;color:#211810}
button{background:var(--accent);color:#1b1209}
.secondary{background:#3a2b20;color:var(--text);border:1px solid #5d4633}
.danger{background:#4a2020;color:#fff4ee;border:1px solid #7b3737}
.quickRow{display:grid;grid-template-columns:1fr;gap:7px;margin-top:7px}
details.settings{margin-top:7px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;overflow:hidden}
details.settings summary{cursor:pointer;padding:9px 11px;color:#ead6bf;font-weight:700;font-size:14px;list-style:none}
details.settings summary::-webkit-details-marker{display:none}
.settingsBody{padding:0 9px 9px;display:grid;gap:7px}
.twoCols{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.smallActions{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.audit{font-size:11px;color:var(--muted)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:11px;margin-top:9px}
.hidden{display:none}
.meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.tag{font-size:11px;color:#f9d6a2;background:#342618;border:1px solid #5a402b;border-radius:999px;padding:2px 7px}
.question{white-space:pre-wrap;font-weight:800;font-size:16px;line-height:1.72;margin:8px 0 11px}
.options{display:grid;gap:8px}
.option{text-align:left;background:#17120e;color:var(--text);border:1px solid #4a3828;border-radius:13px;padding:10px 11px;line-height:1.55;font-size:14.5px}
.option.selected{background:#3b2a18;border-color:var(--accent)}
.option.correct{background:var(--good);border-color:var(--goodLine)}
.option.wrong{background:var(--bad);border-color:var(--badLine)}
.explanation{margin-top:12px;padding:11px;background:#15100d;border:1px solid #4a3828;border-radius:12px;color:#f4e1c9;white-space:pre-wrap;font-size:14px}
.note{font-size:13px;color:#d7c0a8;margin:2px 0 8px}
.foot{position:fixed;left:0;right:0;bottom:0;max-width:820px;margin:0 auto;background:rgba(21,17,13,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:7px 10px calc(7px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.foot button{padding:9px 6px;font-size:14px;border-radius:12px}
@media(max-width:420px){.app{padding-left:9px;padding-right:9px}h1{font-size:20px}.stat{min-height:47px}.stat b{font-size:16px}.stat span{font-size:9px}.question{font-size:16px}.option{font-size:14.5px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>乙4 物理化学</h1>
    <div class="sub">別アプリ版。30問区切り・周回数・途中再開・自動判定</div>

    <div class="stats">
      <div class="stat"><b id="totalCount">0</b><span>このセット</span></div>
      <div class="stat"><b id="doneCount">0</b><span>回答済み</span></div>
      <div class="stat"><b id="rate">0%</b><span>正答率</span></div>
      <div class="stat"><b id="roundCount">0</b><span>周回</span></div>
    </div>
    <div class="progress"><div class="bar" id="progressBar"></div></div>

    <div class="quickRow"><select id="chunkFilter"></select></div>

    <details class="settings">
      <summary>フィルター・ランダムを開く</summary>
      <div class="settingsBody">
        <div class="twoCols">
          <select id="genreFilter">
            <option value="all">全分野</option>
            <option value="物理化学1">物理化学1</option>
            <option value="物理化学2">物理化学2</option>
            <option value="物理化学3">物理化学3</option>
            <option value="物理化学4">物理化学4</option>
          </select>
          <select id="mode">
            <option value="all">すべて</option>
            <option value="wrong">間違えた問題だけ</option>
            <option value="unseen">未回答だけ</option>
          </select>
        </div>
        <div class="smallActions">
          <button onclick="shuffleCurrent()">このセットをランダム</button>
          <button class="secondary" onclick="jumpRandom()">ランダム1問</button>
        </div>
        <div class="audit">構造チェック済み：正解番号・選択肢・解説欄。</div>
      </div>
    </details>
  </div>

  <div id="empty" class="panel hidden">この条件の問題はまだないで。</div>

  <div id="card" class="panel">
    <div class="meta">
      <span class="tag" id="qid"></span>
      <span class="tag" id="chunkTag"></span>
      <span class="tag" id="genre"></span>
      <span class="tag" id="cat"></span>
      <span class="tag" id="typ"></span>
    </div>
    <div class="question" id="question"></div>
    <div id="multiNote" class="note hidden"></div>
    <div class="options" id="options"></div>
    <div id="explanation" class="explanation hidden"></div>
  </div>
</div>

<div class="foot">
  <button class="secondary" onclick="prevQ()">前へ</button>
  <button class="secondary" onclick="nextQ()">次へ</button>
  <button class="danger" onclick="resetStats()">リセット</button>
</div>

<script>
const QUESTIONS = [{"id": "pc-001", "originalId": 1, "genre": "kikenbutsu", "genreLabel": "物理化学1", "subCategory": "動植物油類", "difficulty": 3, "type": "妥当でないものを選べ", "question": "動植物油類について、次のうち妥当でないものはどれか。", "options": ["引火点以上に熱すると、火花等による引火の危険性を生じる。", "乾性油は、ぼろ布等に染み込ませ積み重ねておくと自然発火することがある。", "水に溶けない。", "容器の中で燃焼しているものに注水すると、燃えている油が飛散する。", "引火点は、300℃程度である。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "法令上の動植物油類は、1気圧において引火点が250℃以上のものです。選択肢4「300℃程度」は250℃以上という定義の範囲外ではありませんが、動植物油類の引火点は一般に250〜300℃程度とされており、「300℃程度」という断定的な記述は妥当ではありません。乾性油の自然発火性、注水時の油飛散は正しい記述です。", "source": "物理化学1 / 危険物の性質・消火", "status": "OK"}, {"id": "pc-002", "originalId": 201, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "有機物の燃焼", "difficulty": 2, "type": "誤っているものを選べ", "question": "有機物の燃焼に関する一般的な説明として、次のうち誤っているものはどれか。", "options": ["蒸発または分解して生成する気体が炎をあげて燃えるものが多い。", "燃焼に伴う明るい炎は、主として高温の炭素粒子が光っているものである。", "空気の量が不足すると、すすの出る量が多くなる。", "分子中の炭素数が多い物質ほど、すすの出る量が多くなる。", "不完全燃焼すると、二酸化炭素の発生量が多くなる。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "不完全燃焼すると二酸化炭素ではなく「一酸化炭素（CO）」の発生量が多くなります。完全燃焼の場合はCO₂が生成されますが、不完全燃焼ではCOやすすが生成されます。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-003", "originalId": 202, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼の三要素", "difficulty": 1, "type": "正しいものを選べ", "question": "次のうち、燃焼の三要素がそろっている組合せとして、正しいものはどれか。", "options": ["ナトリウム　水素　炎", "過酸化水素　酸素　反応熱", "アマニ油　酸素　酸化熱", "硝酸銀　空気　紫外線", "ガソリン　窒素　電気火花"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "燃焼の三要素は「可燃物・酸素供給源・点火源」です。アマニ油（可燃物）・酸素（酸素供給源）・酸化熱（点火源となる熱）の組み合わせが正しいです。炎は三要素ではなく燃焼の結果です。窒素は支燃性がありません。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-004", "originalId": 203, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "可燃物・酸素供給源", "difficulty": 2, "type": "該当しないものを選べ", "question": "燃焼の三要素の可燃物または酸素供給源に該当しないものは、次のうちどれか。", "options": ["過酸化水素", "窒素", "水素", "メタン", "一酸化炭素"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "窒素（N₂）は不活性気体で、可燃物でも酸素供給源でもありません。過酸化水素は酸素を放出する酸素供給源。水素・メタン・一酸化炭素は可燃性気体（可燃物）です。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-005", "originalId": 204, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "20℃・1気圧で燃焼するもの", "difficulty": 2, "type": "正しいものを選べ", "question": "次の物質のうち、20℃、１気圧の空気中で燃焼するものはどれか。", "options": ["ヘリウム", "硫化水素", "二酸化炭素", "三酸化硫黄", "五酸化リン"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "硫化水素（H₂S）は可燃性気体で、空気中で燃焼します。ヘリウムは希ガス（不燃）。二酸化炭素・三酸化硫黄・五酸化リンはすでに酸化されており燃焼しません。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-006", "originalId": 205, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "炎色反応", "difficulty": 2, "type": "誤っているものを選べ", "question": "炎色反応の組合せとして、次のうち誤っているものはどれか。", "options": ["リチウム……赤色", "ナトリウム……青紫色", "カリウム……赤紫色", "バリウム……黄緑色", "銅……青緑色"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "ナトリウムの炎色反応は「黄色（橙黄色）」です。青紫色はカリウムの炎色反応です。炎色反応の覚え方：リチウム→赤、ナトリウム→黄、カリウム→紫（赤紫）、バリウム→黄緑、銅→青緑。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-007", "originalId": 301, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼の形態①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "燃焼について、次のうち誤っているものはどれか。", "options": ["メタンが燃焼して完全に二酸化炭素と水になることを完全燃焼という。", "ニトロセルロースのように、分子内に酸素を含有し、その酸素が燃焼に使われることを内部（自己）燃焼という。", "ガソリンは、液体のまま空気と接触している表面が燃焼する。これを表面燃焼という。", "木材のように、熱分解生成ガスがまず燃焼することを分解燃焼という。", "灯油のように、発生した蒸気が燃焼することを蒸発燃焼という。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "ガソリンは液面から蒸発した可燃性蒸気が燃焼する「蒸発燃焼」です。表面燃焼は固体表面がそのまま燃焼するもので、木炭・コークス・金属粉などが該当します。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-008", "originalId": 302, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼の形態②分解燃焼と表面燃焼", "difficulty": 2, "type": "正しいものを選べ", "question": "次の文の（　）内のＡ及びＢに当てはまる物質の燃焼の仕方として、正しいものはどれか。\n\n「木材、紙などの可燃性固体が加熱されて、このとき発生する可燃性ガスが燃焼することを（Ａ）といい、木炭、コークスなどの可燃性固体が加熱されて、赤熱しながら燃焼することを（Ｂ）という。」", "options": ["Ａ：蒸発燃焼　　Ｂ：表面燃焼", "Ａ：表面燃焼　　Ｂ：分解燃焼", "Ａ：分解燃焼　　Ｂ：表面燃焼", "Ａ：分解燃焼　　Ｂ：蒸発燃焼", "Ａ：表面燃焼　　Ｂ：蒸発燃焼"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "木材・紙などが加熱されて発生した可燃性ガスが燃焼するのは「分解燃焼（Ａ）」。木炭・コークスが赤熱しながら燃焼するのは「表面燃焼（Ｂ）」です。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-009", "originalId": 303, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼の形態③物質と燃焼形態", "difficulty": 1, "type": "誤っているものを選べ", "question": "次に掲げる物質と主な燃焼の形態の組合せとして、誤っているものはどれか。", "options": ["石炭→分解燃焼", "エタノール→蒸発燃焼", "灯油→蒸発燃焼", "重油→表面燃焼", "硫黄→蒸発燃焼"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "重油は第４類危険物（第３石油類）で、燃焼形態は「蒸発燃焼」です。第４類危険物はすべて蒸発燃焼です。「表面燃焼」という記述が誤りです。表面燃焼は木炭・コークス・金属粉など固体が直接赤熱しながら燃焼するものです。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-010", "originalId": 304, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼の形態④表面燃焼の物質", "difficulty": 1, "type": "正しいものを選べ", "question": "次の物質のうち、主な燃焼の方法が表面燃焼であるものはどれか。", "options": ["プロパンガス", "木炭", "固形アルコール", "木材", "ニトロセルロース"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "表面燃焼は固体表面がそのまま赤熱しながら燃焼する形態で、木炭・コークス・金属粉などが該当します。プロパンガスは拡散燃焼、固形アルコール・硫黄は蒸発燃焼、木材は分解燃焼、ニトロセルロースは内部（自己）燃焼です。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-011", "originalId": 305, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼の形態⑤蒸発燃焼の物質", "difficulty": 1, "type": "正しいものを選べ", "question": "主な燃焼の仕方が蒸発燃焼に該当するものは、次のうちどれか。", "options": ["アルミニウム箔", "石炭", "木炭", "ニトロセルロース", "硫黄"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "硫黄は加熱すると蒸発し、その蒸気が燃焼する「蒸発燃焼」です。アルミニウム箔は表面燃焼、石炭は分解燃焼、木炭は表面燃焼、ニトロセルロースは内部（自己）燃焼です。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-012", "originalId": 306, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "引火性液体の燃焼", "difficulty": 2, "type": "正しいものを選べ", "question": "引火性液体の通常の燃焼について、次のうち正しいものはどれか。", "options": ["液体の表面から発生する蒸気が空気と混合して燃焼する。", "液体が蒸発しないで、液体そのものが空気と接触しながら燃焼する。", "液体の内部で燃焼が起こり、その燃焼生成物が炎となって液面上に現れる。", "液体が熱によって分解し、その際に発生する可燃性ガスが燃焼する。", "液体の内部に空気を吸収しながら燃焼する。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "引火性液体（第４類危険物）は液体表面から蒸発した可燃性蒸気が空気と混合して燃焼します（蒸発燃焼）。液体そのものが燃えるのではなく、蒸気が燃焼します。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-013", "originalId": 307, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃えやすい条件", "difficulty": 3, "type": "正しいものを選べ", "question": "次の組合せのうち、一般に可燃物が最も燃えやすい条件はどれか。\n（発熱量　酸化　空気との接触面積　周囲の温度　熱伝導率）", "options": ["小さい　されやすい　大きい　高い　大きい", "大きい　されやすい　大きい　高い　小さい", "小さい　されやすい　大きい　高い　小さい", "大きい　されにくい　小さい　低い　小さい", "大きい　されにくい　小さい　低い　大きい"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "可燃物が最も燃えやすい条件：発熱量が大きい、酸化されやすい、空気との接触面積が大きい、周囲の温度が高い、熱伝導率が小さい（保温効果が高く熱が蓄積されやすい）。熱伝導率が小さいと熱が逃げにくく燃えやすくなります。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-014", "originalId": 308, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼の難易と無関係なもの", "difficulty": 3, "type": "誤っているものを選べ", "question": "燃焼の難易と直接関係のないものは、次のうちどれか。", "options": ["体膨張率", "空気との接触面積", "含水量", "熱伝導率", "発熱量"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "体膨張率は燃焼の難易に関係ありません。燃焼の難易に関係するのは：空気との接触面積、含水量、熱伝導率、発熱量などです。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-015", "originalId": 309, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼の難易③一般的な誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "可燃物の一般的な燃焼の難易として、次のうち誤っているものはどれか。", "options": ["水分の含有量が少ないほど燃焼しやすい。", "空気との接触面積が大きいほど燃焼しやすい。", "周囲の温度が高いほど燃焼しやすい。", "熱伝導率の大きい物質ほど燃焼しやすい。", "蒸発しやすいものほど燃焼しやすい。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "熱伝導率が大きいほど熱が逃げやすく、燃焼しにくくなります。燃えやすいのは熱伝導率が「小さい」物質（熱が蓄積されやすく保温効果が高い）です。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-016", "originalId": 310, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "二酸化炭素が燃焼しない理由", "difficulty": 3, "type": "正しいものを選べ", "question": "20℃、1気圧（1.013×10⁵Pa）において二酸化炭素が燃焼しない理由として、次のうち正しいものはどれか。", "options": ["酸素と結合するが、吸熱反応であるから", "酸化反応を起こすが、燃焼が継続しないから", "酸化反応を起こすが、発熱量が小さいから", "二酸化炭素の熱伝導率が大きいから", "酸素と結合しないから"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "二酸化炭素（CO₂）は炭素がすでに完全に酸化された安定な物質です。20℃・1気圧の通常条件ではCO₂はこれ以上酸化反応を起こさず、酸素と結合しないため燃焼しません。乙4の試験では「酸素と結合しないから」が正解とされています。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-017", "originalId": 311, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "数値が大きいほど危険なもの", "difficulty": 2, "type": "正しいものを選べ", "question": "可燃性液体の危険性は、その物性の数値の大小で判断できる。次のうち数値が大きいほど危険が大きいものはどれか。", "options": ["燃焼範囲の下限界", "最小着火（発火）エネルギー", "導電率", "引火点", "火炎伝播速度"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "火炎伝播速度は大きいほど火災が急速に広がり危険です。燃焼範囲の下限界・最小着火エネルギー・引火点は数値が小さいほど危険です。導電率（電気伝導率）は静電気蓄積に関係し、小さいほど危険です。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-018", "originalId": 312, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼及び発火の一般的説明", "difficulty": 2, "type": "正しいものを選べ", "question": "燃焼及び発火等に関する一般的説明として、次のうち正しいものはどれか。", "options": ["ハロゲン元素を混合した気体の炭化水素は、20℃で発火する。", "高引火点の可燃性液体でも、綿糸に染み込ませると容易に着火する。", "静電気の発生しやすい物質ほど、燃焼が激しい。", "水溶性の可燃性液体は、非水溶性のそれより燃焼点は低い。", "気化熱の大きい物質ほど、燃焼温度が高い。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "高引火点の可燃性液体でも綿糸等の繊維に染み込ませると、表面積が大幅に増大して蒸発が促進されるため、容易に着火します。ハロゲン添加は難燃化、静電気は点火源になり得るが燃焼の激しさと直接関係しません。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-019", "originalId": 313, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "引火点の説明", "difficulty": 2, "type": "正しいものを選べ", "question": "引火点の説明として、次のうち正しいものはどれか。", "options": ["可燃性液体を空気中で燃焼させるのに必要な熱源の温度をいう。", "可燃物から、その蒸気を発生させるのに必要な最低の気温をいう。", "可燃物を空気中で加熱したとき、他から点火されなくても燃え出すときの温度をいう。", "可燃性液体が空気中で点火したとき燃え出すのに必要な濃度の蒸気を液面上に発生する最低の液温をいう。", "発火点と同じもので、その可燃物が気体または液体の場合に引火点といい、固体の場合には発火点という。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "引火点とは、可燃性液体が液面上に燃焼範囲の下限値の濃度の蒸気を発生するときの最低液温をいいます。着火源があれば引火できる最低の液温です。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-020", "originalId": 314, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "引火・発火の説明の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "引火及び発火等の説明について、次のうち誤っているものはどれか。", "options": ["同一の可燃性物質においては、一般的に発火点の方が引火点より高い数値を示す。", "発火点とは、可燃性物質を空気中で加熱したときに火源なしに自ら燃焼し始める最低の温度をいう。", "燃焼点とは、燃焼を継続させるのに必要な可燃性蒸気が、可燃性液体の液面上に供給される温度をいう。", "引火点とは、可燃性液体が燃焼範囲の上限値の濃度の蒸気を発生するときの液体の温度をいう。", "同一の可燃性物質においては、一般的に燃焼点の方が引火点より高い数値を示す。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "引火点とは燃焼範囲の「下限値」の濃度の蒸気を発生するときの液温です。「上限値」という記述が誤りです。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-021", "originalId": 315, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "引火点の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "引火点について、次のうち誤っているものはどれか。", "options": ["可燃性液体が、燃焼下限界の濃度の蒸気を発生するときの液体の温度を引火点という。", "液体の温度が引火点より低い場合は、燃焼に必要な濃度の可燃性蒸気は発生しない。", "引火点は、物質によって異なる値を示す。", "可燃性液体の温度がその引火点より高いときは、火源により引火する危険がある。", "引火点に達すると、液体表面からの蒸気のほか、液体内部からも気化が起こり始める。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "液体内部から気化（沸騰）が起こり始めるのは引火点ではなく「沸点」に達したときです。引火点は液面からの蒸気発生に関する温度です。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-022", "originalId": 316, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼に関する記述の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "燃焼に関する記述として、次のうち誤っているものはどれか。", "options": ["可燃性液体の液面上の蒸気に着火源を近づけたとき、蒸気に火がつく液体の最低温度を引火点という。", "可燃性液体を空気中で加熱したとき、着火源により火がつき、継続して燃え続ける液体の最低温度を燃焼点という。", "物質１gの温度を１℃上げるのに必要な熱量を燃焼熱という。", "可燃性蒸気が空気と混合し、特定の濃度範囲にあるとき、着火源があると燃焼する。この濃度範囲を燃焼範囲という。", "可燃性物質を空気中で加熱したとき、着火源なしで燃焼がはじまる最低温度を発火点という。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "物質１gの温度を１℃上げるのに必要な熱量は「比熱（熱容量）」です。燃焼熱とは可燃物が完全燃焼するときに発生する熱量のことです。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-023", "originalId": 317, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼範囲の説明", "difficulty": 1, "type": "正しいものを選べ", "question": "可燃性蒸気の燃焼範囲の説明として、次のうち正しいものはどれか。", "options": ["燃焼するのに必要な酸素量の範囲のことである。", "燃焼によって被害を受ける範囲のことである。", "空気中において燃焼することができる可燃性蒸気の濃度範囲のことである。", "可燃性蒸気が燃焼を開始するのに必要な熱源の温度範囲のことである。", "燃焼によって発生するガスの濃度範囲のことである。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "燃焼範囲（爆発範囲）とは、空気中において可燃性蒸気が燃焼（爆発）することができる濃度範囲（vol%）のことです。この範囲内でのみ着火源があると燃焼します。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-024", "originalId": 318, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼範囲が最も広いもの", "difficulty": 2, "type": "正しいものを選べ", "question": "燃焼範囲が一番広いものは、次のうちどれか。", "options": ["ジエチルエーテル", "ガソリン", "ベンゼン", "酢酸エチル", "エタノール"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "ジエチルエーテルの燃焼範囲は1.9〜36vol%で非常に広く、特殊引火物に分類されます。ガソリン：1.4〜7.6vol%、ベンゼン：1.2〜7.8vol%、酢酸エチル：2.0〜11.5vol%、エタノール：3.3〜19vol%。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-025", "originalId": 319, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼範囲1.4〜7.6vol%の説明", "difficulty": 2, "type": "正しいものを選べ", "question": "「ある可燃性液体の燃焼範囲は、1.4〜7.6vol%である。」このことを正しく説明しているものは、次のうちどれか。", "options": ["100Lの容器中に空気92.4〜98.6Lと可燃性蒸気7.6〜1.4Lとの混合気体が入っている場合は、点火すると燃焼する。", "100Lの容器中に可燃性蒸気92.4〜98.6Lと空気7.6〜1.4Lとの混合気体が入っている場合は、点火すると燃焼する。", "100Lの容器中に空気92.4〜98.6Lと可燃性蒸気7.6〜1.4Lとの混合気体が入っている場合は、長期間放置すれば自然発火する。", "空気100Lと可燃性蒸気1.4〜7.6Lとの混合気体は、点火すると燃焼する。", "空気100Lに可燃性蒸気1.4〜7.6Lを混合したものは、長時間放置すれば自然発火する。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "燃焼範囲1.4〜7.6vol%とは、全体（空気＋蒸気）に対して蒸気が1.4〜7.6%を占める場合に燃焼します。100L容器では蒸気が1.4〜7.6L、残り空気が92.4〜98.6Lのとき点火すると燃焼します。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-026", "originalId": 320, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼範囲の計算①", "difficulty": 1, "type": "正しいものを選べ", "question": "次の燃焼範囲の危険物を100Lの空気と混合させて、その均一な混合気体に電気火花を発したとき、燃焼可能な蒸気量はどれか。\n・燃焼下限界 1.3vol%\n・燃焼上限界 7.1vol%", "options": ["1L", "5L", "10L", "15L", "20L"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "蒸気濃度＝蒸気/(空気+蒸気)×100で計算します。蒸気1L：1/101×100≒0.99vol%（下限界1.3%未満→燃焼しない）。蒸気5L：5/105×100≒4.76vol%（1.3〜7.1%の範囲内→燃焼する ✓）。蒸気10L：10/110×100≒9.1vol%（上限界7.1%超→燃焼しない）。よって燃焼可能な蒸気量は5Lです。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-027", "originalId": 321, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "燃焼範囲の計算②", "difficulty": 1, "type": "正しいものを選べ", "question": "危険物の蒸気を100Lの空気と混合させて、その均一な混合気体に電気火花を発したとき、燃焼可能な蒸気量はどれか。ただし、危険物の燃焼範囲は6.0vol%〜14vol%とする。", "options": ["1L", "5L", "15L", "40L", "50L"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "蒸気濃度＝蒸気/(空気+蒸気)×100で計算します。蒸気1L：1/101×100≒0.99vol%（範囲外）。蒸気5L：5/105×100≒4.76vol%（範囲外）。蒸気15L：15/115×100≒13.0vol%（6.0〜14%の範囲内→燃焼する ✓）。蒸気40L：40/140×100≒28.6vol%（範囲外）。よって燃焼可能な蒸気量は15Lです。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-028", "originalId": 322, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "実験結果の読み取り", "difficulty": 2, "type": "正しいものを選べ", "question": "次の実験結果について、正しいものはどれか。\n\n「空気中で、ある化合物を−50℃から徐々に温めると、−42℃のとき液体になり始めた。そのまま温め続け、液温が20℃まで上がったとき、液面付近の蒸気濃度を測定すると1.8vol%であった。更に加熱を続けたところ、液温は115℃で一定となり、すべて気化してしまった。また、液温20℃のものを別容器にとり、液面付近に火花を飛ばすと激しく燃焼した。」", "options": ["この物質の分解温度は−42℃である。", "この物質の沸点は115℃である。", "この物質の発火点は20℃である。", "この物質の融点は−50℃である。", "この物質の燃焼範囲は0〜1.8vol%である。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "液温が115℃で一定となりすべて気化したのは「沸点」の特徴です。−42℃は凝固点（融点）、−50℃は実験開始温度。20℃で1.8vol%の蒸気濃度で着火したことから、引火点は20℃以下であることがわかります。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-029", "originalId": 323, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "ヨウ素価の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "ヨウ素価について、次のＡ〜Ｄのうち誤っているものの組合せはどれか。\n\nＡ．油脂100gに付加するヨウ素の質量をg単位で表した数値をヨウ素価という。\nＢ．ヨウ素価の値は、油脂中の不飽和脂肪酸の含有量が多く、また、脂肪酸の不飽和度が高いほど値は小さい。\nＣ．油脂は、不乾性油、半乾性油または乾性油に分類される。\nＤ．不乾性油は、半乾性油や乾性油に比べて自然発火しやすい。", "options": ["ＡとＢ", "ＡとＣ", "ＢとＣ", "ＢとＤ", "ＣとＤ"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "Ｂ：ヨウ素価は不飽和脂肪酸が多く不飽和度が高いほど「大きく」なります（「小さい」は誤り）。Ｄ：自然発火しやすいのは不乾性油ではなく「乾性油」です（ヨウ素価100以上の乾性油が自然発火しやすい）。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-030", "originalId": 324, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "蓄熱自然発火のメカニズム", "difficulty": 3, "type": "正しいものを選べ", "question": "蓄熱して自然発火が起こることについて、次の文の（　）内のＡ〜Ｃに当てはまる語句の組合せとして、正しいものはどれか。\n\n「ある物質が空気中で20℃において自然に発熱し、発火する場合の発熱機構は、分解熱、（Ａ）、吸着熱などによるものがある。分解熱による例には、（Ｂ）などがあり、（Ａ）による例の多くは不飽和結合を有するアマニ油、キリ油などの（Ｃ）がある。」", "options": ["Ａ：酸化熱　Ｂ：セルロイド　Ｃ：乾性油", "Ａ：燃焼熱　Ｂ：石炭　Ｃ：半乾性油", "Ａ：生成熱　Ｂ：硝化綿　Ｃ：不乾性油", "Ａ：反応熱　Ｂ：ウレタンフォーム　Ｃ：不乾性油", "Ａ：中和熱　Ｂ：炭素粉末類　Ｃ：乾性油"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "（Ａ）酸化熱：油脂の酸化による発熱。（Ｂ）セルロイド：分解熱で自然発火する物質の例。（Ｃ）乾性油：アマニ油・キリ油など不飽和結合を有し、酸化熱で自然発火しやすい油脂。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-031", "originalId": 325, "genre": "kagaku1", "genreLabel": "物理化学1", "subCategory": "酸化による自然発火", "difficulty": 1, "type": "正しいものを選べ", "question": "次のうち、主に酸化による発熱で自然発火することがあるものはどれか。", "options": ["ニトロセルロース", "硫黄", "クレオソート油", "活性炭", "アマニ油"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "アマニ油は乾性油（ヨウ素価130以上）で、空気中の酸素と反応して酸化熱を発生し自然発火することがあります。ニトロセルロースは分解熱による自然発火、活性炭は吸着熱による自然発火です。", "source": "物理化学1 / 基礎化学①", "status": "OK"}, {"id": "pc-032", "originalId": 326, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "動植物油類の自然発火の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "動植物油類の自然発火について、次の文の下線部分Ａ〜Ｅのうち誤っている箇所はどれか。\n\n「動植物油類の自然発火は、油が空気中で酸化され、この反応で発生した酸化熱が蓄積され、（Ａ）発火点に達すると起こる。自然発火は一般に乾きやすい乾性油ほど（Ｂ）起こりやすく、この乾きやすさを（Ｃ）油脂100gが吸収するヨウ素のグラム数で表したものをヨウ素価といい、脂肪酸の不飽和度が高いほど（Ｄ）ヨウ素価が小さく、ヨウ素価が大きいほど（Ｅ）自然発火しやすくなる。」", "options": ["Ａ", "Ｂ", "Ｃ", "Ｄ", "Ｅ"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "脂肪酸の不飽和度が高いほどヨウ素価は「大きく」なります（「小さい」が誤り）。ヨウ素価は不飽和結合の数に比例して増加し、ヨウ素価が大きいほど酸化されやすく自然発火しやすくなります。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-033", "originalId": 327, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "自然発火を起こしにくい条件", "difficulty": 1, "type": "誤っているものを選べ", "question": "動植物油類の乾性油の他、原綿、石炭、ゴム粉、金属紛等は、空気中で酸素と化合することによって自然発火を起こすが、次のうち、自然発火を起こしにくいものはどれか。", "options": ["気温が高く、堆積物内の温度が高いとき。", "湿度が高く、気温が高いとき。", "物質の表面積が広く、酸素との接触面積が広いとき。", "通風が良いところで、乾燥しているとき。", "物質の熱伝導率が小さく、保温効果が良いとき。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "通風が良く乾燥しているときは、酸化で発生した熱が放散されやすく、また乾性油の酸化反応に必要な適度な湿度も不足するため、自然発火が起こりにくくなります。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-034", "originalId": 401, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "消火方法①適切でないもの", "difficulty": 1, "type": "適切でないものを選べ", "question": "消火方法の一般的な説明として、次のうち最も適切でないものはどれか。", "options": ["油配管のバルブを閉めて、燃焼している油の供給を止める。", "窒素ガス消火剤を放射して、燃焼物周囲の酸素濃度を低下させる。", "リン酸塩類の粉末消火剤を放射して、燃焼の連鎖反応を抑制、阻止する。", "ハロゲン化物の消火剤を放射して、燃焼物を冷却し、可燃性気体の発生を減少させる。", "泡消火剤を放射して、燃焼物表面を覆い、酸素を遮断する。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "ハロゲン化物消火剤の主な消火作用は「負触媒効果（抑制効果）」による燃焼の連鎖反応の遮断です。冷却して可燃性気体の発生を減少させるというのは誤りです。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-035", "originalId": 402, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "消火方法②各消火法の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "消火の方法には、除去消火、窒息消火、冷却消火、抑制作用による消火があるが、次のそれぞれの説明のうち、誤っているものはどれか。", "options": ["除去消火は、燃焼に必要な可燃物を取り去ることによる消火をいい、ガスの元栓を閉めて消火するのがこれにあたる。", "窒息消火は、燃焼に必要な酸素の供給を遮断することによる消火をいい、窒素消火剤で酸素濃度を下げて消火するのがこれにあたる。", "窒息消火は、物質中に含まれている酸素により燃焼している場合には、効果がない。", "冷却消火は、燃焼物の温度を下げることによる消火をいい、一般的なものはロウソクの炎などの吹き消しのように冷風を送風して消火するものがこれにあたる。", "抑制作用による消火は、可燃物の分子が次々と活性化されて連鎖的な酸化反応が進行するのを抑制することによる消火をいい、ハロゲン化物消火剤の放射による消火がこれにあたる。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "冷却消火は燃焼物の温度を下げる消火法で、代表例は「水をかける」ことです。ロウソクの吹き消しは冷風で冷却するのではなく、息を吹きかけて可燃性蒸気濃度を下げる「除去消火」（または窒息消火）です。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-036", "originalId": 403, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "消火剤全般の誤り①", "difficulty": 2, "type": "誤っているものを選べ", "question": "消火剤に関する説明として、次のうち誤っているものはどれか。", "options": ["強化液消火剤は、凝固点が０℃のため、寒冷地では使用できない。", "粉末消火剤は、粉末の粒子が小さいほど消火効果が高い。", "水は熱エネルギーを取り除く冷却効果が大きい。", "二酸化炭素消火剤は、電気絶縁性に優れている。", "ハロゲン化物消火剤は、燃焼を抑制する効果を有する。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "強化液消火剤はアルカリ金属塩類等の濃厚な水溶液で、凝固点が０℃より低く（約−20℃）、寒冷地でも使用できます。「凝固点が０℃のため寒冷地では使用できない」という記述が誤りです。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-037", "originalId": 404, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "消火剤全般の誤り②", "difficulty": 2, "type": "誤っているものを選べ", "question": "消火剤について、次のうち誤っているものはどれか。", "options": ["ハロゲン化物は、負触媒効果による燃焼抑制作用を有する。", "水は気化熱と比熱がともに大きいため、冷却効果が大きい。", "リン酸塩類を主成分とする消火粉末は、油火災および電気火災には適応するが、木材等の火災には適応しない。", "二酸化炭素は、安定な不燃性ガスで、空気より重いため窒息効果が大きい。", "強化液は炭酸カリウム等の水溶液であるが、これを霧状に放射する場合は電気火災にも適応する。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "リン酸塩類（ABC粉末）を主成分とする消火粉末は、普通火災（木材等）・油火災・電気火災の全てに適応します（「木材等の火災には適応しない」は誤り）。炭酸水素塩類（BC粉末）は油火災・電気火災のみ適応です。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-038", "originalId": 405, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "金属火災の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "金属火災に関する一般的な説明として、次のうち誤っているものはどれか。", "options": ["金属火災とは、ナトリウム、カリウム、マグネシウムなどの火災をいう。", "金属火災の消火には、勢いよく消火剤を放射する。", "金属ナトリウムは、アルカリ金属で、ハロゲンと激しく反応する。", "乾燥砂や膨張ひる石は、金属火災の消火に適している。", "水による消火は、金属火災に適さない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "金属火災の消火には、勢いよく消火剤を放射してはいけません。粉末を飛散させると燃焼が激しくなるためです。乾燥砂等を静かにかぶせて窒息消火するのが正しい方法です。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-039", "originalId": 406, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "抑制効果の消火剤", "difficulty": 1, "type": "正しいものを選べ", "question": "次のＡ〜Ｅの消火剤のうち、主な消火作用が抑制効果であるものの組み合わせはどれか。\n\nＡ．水蒸気　Ｂ．たん白泡消火剤　Ｃ．二酸化炭素消火剤\nＤ．ハロゲン化物消火剤　Ｅ．粉末消火剤（炭酸水素ナトリウム）", "options": ["ＡとＢ", "ＡとＤ", "ＢとＣ", "ＣとＥ", "ＤとＥ"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "抑制効果（負触媒効果）は燃焼の連鎖反応を遮断する消火作用です。ハロゲン化物消火剤（Ｄ）と粉末消火剤（Ｅ）が主に抑制効果を持ちます。水蒸気・泡は窒息効果、CO₂は窒息・冷却効果が主です。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-040", "originalId": 407, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "水の消火効果の穴埋め", "difficulty": 1, "type": "正しいものを選べ", "question": "次の文の（　）に当てはまる語句として、次のうち正しいものはどれか。\n\n「水は、（　）と比熱が大きいため、消火剤として使用すると冷却効果が大きい。」", "options": ["熱伝導率", "比重", "気化熱", "分子量", "表面張力"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "水は「気化熱」と比熱がともに大きいため、燃焼物から大量の熱を奪う冷却効果が非常に高い消火剤です。気化熱：蒸発する際に周囲から熱を奪う熱量。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-041", "originalId": 408, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "水が消火剤として優れている理由の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "水が消火剤として優れている理由として、次のうち誤っているものはどれか。", "options": ["比熱と蒸発熱が大きいことから", "容易に入手できることから", "凝固点が高いことから", "液体であることから", "水蒸気が酸素濃度を薄めることから"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "水の凝固点は０℃で、これは消火剤として「優れている理由」ではなく、むしろ寒冷地では使いにくいという欠点になります。水が優れている理由は比熱・蒸発熱が大きい、入手容易、液体で浸透性がある、水蒸気による窒息効果などです。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-042", "originalId": 409, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "動植物油類への注水が危険な理由", "difficulty": 1, "type": "正しいものを選べ", "question": "容器内で燃焼している動植物油類に、注水すると危険な理由として、最も適切なものは次のうちどれか。", "options": ["水が容器の底に沈み、徐々に油面を押し上げるから。", "高温の油と水の混合物は、単独の油よりも燃焼点が低くなるから。", "注水が空気を巻き込み、火炎及び油面に酸素を供給するから。", "油面をかき混ぜ、油の蒸発を容易にするから。", "水が沸騰し、高温の油を飛散させるから。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "高温の油に水を注ぐと、水が瞬時に沸騰・急激に気化して体積が約1700倍に膨張し、高温の燃焼中の油を飛散させます（スロップオーバー）。これが最も危険な理由です。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-043", "originalId": 410, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "水消火剤の誤り（2つ）", "difficulty": 2, "type": "誤っているものを選べ", "question": "水消火剤について、次のうち誤っているものはどれか。", "options": ["油火災に用いると、炎を拡大させるおそれがある。", "水は流動性がよく、表面を流れてしまうため、木材等の深部が燃えていると冷却効率が悪い。", "燃焼に必要な熱エネルギーを取り去る冷却効果が小さい。", "電気設備の火災に用いると、人体に対する感電危険や設備が絶縁不良となる危険がある。", "金属火災に用いると、通常燃焼の温度が高いため、水が水素と酸素に分解し、爆発するおそれがある。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "水は気化熱・比熱がともに大きく、冷却効果は非常に大きい消火剤です。「冷却効果が小さい」という記述が誤りです。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-044", "originalId": 411, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "強化液消火剤の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "強化液消火剤について、次のうち誤っているものはどれか。", "options": ["アルカリ金属塩類等の濃厚な水溶液である。", "油火災に対しては、霧状にして放射しても適応性がない。", "−20℃でも凍結しないので、寒冷地での使用にも適する。", "電気火災に対しては、霧状にして放射すれば適応性がある。", "木材などの火災の消火後、再び出火するのを防止する効果がある。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "強化液消火剤は油火災に対して「霧状にして放射すると適応性がある」とされています。「適応性がない」という記述が誤りです。棒状放射では油火災に不適ですが、霧状放射なら油火災にも対応できます。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-045", "originalId": 412, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "二酸化炭素消火剤の正しいもの", "difficulty": 1, "type": "正しいものを選べ", "question": "二酸化炭素消火剤について、次のうち正しいものはどれか。", "options": ["化学的に不安定である。……二酸化炭素は火炎に熱せられると一酸化炭素となり、消火中、突然爆発することがある。", "消火後の汚損が少ない。……粉末および泡消火剤のように機器等を汚損させることはない。", "電気絶縁性が悪い。……電気絶縁性が悪いので電気火災には使用できない。", "長期貯蔵ができない。……固体や液体で貯蔵できないため、ガスの状態で貯蔵するが、経年で変質しやすいため長期貯蔵ができない。", "人体への影響はほとんどない。……化学的に分解して有害ガスを発生することはなく、また二酸化炭素そのものは無害であることから、密閉された場所で使用しても人体に対する影響はほとんどない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "CO₂消火剤は消火後の汚損がほとんどなく、精密機器の火災に適しています（正しい）。選択肢1：CO₂は化学的に安定した不燃性ガスで爆発しません（誤り）。選択肢3：電気絶縁性に優れ電気火災に使用できます（誤り）。選択肢4：液化して高圧容器に長期貯蔵可能です（誤り）。選択肢5：密閉空間では酸素濃度が低下し窒息の危険があります（誤り）。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-046", "originalId": 413, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "電気火災に適応する消火器の組み合わせ", "difficulty": 2, "type": "正しいものを選べ", "question": "次のＡ〜Ｅの消火器のうち、電気設備の火災に適応するもののみの組み合わせはどれか。\n\nＡ．棒状の水を放射する消火器\nＢ．棒状の強化液を放射する消火器\nＣ．ハロゲン化物を放射する消火器\nＤ．二酸化炭素を放射する消火器\nＥ．泡を放射する消火器", "options": ["ＡとＢ", "ＡとＣ", "ＢとＥ", "ＣとＤ", "ＤとＥ"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "電気設備の火災に適応するのは電気絶縁性のある消火剤のみです。ハロゲン化物（Ｃ）と二酸化炭素（Ｄ）は電気絶縁性に優れ、電気火災に適応します。水・強化液（棒状）・泡は電気を通すため感電の危険があり、電気火災には不適です。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-047", "originalId": 414, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "二酸化炭素消火剤の穴埋め", "difficulty": 1, "type": "正しいものを選べ", "question": "二酸化炭素消火剤に関する、次の文の（　）内のＡ〜Ｃに当てはまる語句の組み合わせとして、正しいものはどれか。\n\n「消火の原理は、酸素の希釈による（Ａ）効果である。また、（Ｂ）することで容易に液化するため、高圧ガス容器に充填して設置できる。さらに、消火剤による機器の汚損がほとんどなく、電気（Ｃ）に優れているので、電気設備用としても用いられている。」", "options": ["Ａ：抑制　Ｂ：圧縮　Ｃ：伝導性", "Ａ：窒息　Ｂ：冷却　Ｃ：伝導性", "Ａ：窒息　Ｂ：圧縮　Ｃ：伝導性", "Ａ：抑制　Ｂ：冷却　Ｃ：絶縁性", "Ａ：窒息　Ｂ：圧縮　Ｃ：絶縁性"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "Ａ：CO₂は酸素濃度を下げる「窒息」効果。Ｂ：CO₂は「圧縮」することで液化し高圧容器に貯蔵。Ｃ：電気を通さない「絶縁性」に優れるため電気設備火災に使用できます。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-048", "originalId": 415, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "粉末消火剤の正しいもの", "difficulty": 1, "type": "正しいものを選べ", "question": "粉末消火剤に関する記述について、次のうち正しいものはどれか。", "options": ["消火剤として用いられる炭酸水素塩類には、炭酸カリウムがある。", "主な消火作用は、冷却効果と窒息効果である。", "粒子が大きいものほど、燃焼抑制効果が大きい。", "リン酸塩類を主成分とするものは、淡青色に着色されている。", "炭酸水素塩類を主成分とするものは、油火災および電気火災に適応する。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "炭酸水素塩類（BC粉末）は油火災・電気火災に適応します（正しい）。炭酸水素塩類には炭酸水素ナトリウム（重曹）や炭酸水素カリウムがあります（炭酸カリウムは誤り）。主な消火作用は負触媒（抑制）効果と窒息効果。粒子は小さいほど効果大。リン酸塩類は淡紅色です。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-049", "originalId": 416, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "粉末消火剤の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "粉末消火剤について、次のうち誤っているものはどれか。", "options": ["ナトリウム、カリウムの重炭酸塩その他の塩類またはリン酸塩類、硫酸塩類などを主成分として構成されている。", "主成分の種類により着色されている。", "吸湿固化を防止するため、粉末の表面にシリコン樹脂等により防湿処理がなされている。", "消火剤の主成分に関係なく、あらゆる火災に消火効果がある。", "負触媒効果（抑制効果）と窒息効果がある。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "粉末消火剤は主成分によって適応できる火災が異なります。炭酸水素塩類（BC粉末）は普通火災（木材等）には適応せず、リン酸塩類（ABC粉末）は全火災に適応します。「あらゆる火災に消火効果がある」という記述が誤りです。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-050", "originalId": 417, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "粉じん爆発①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "粉じん爆発について、次のうち誤っているものはどれか。", "options": ["可燃性固体の微粉が空気中に浮遊しているときに、何らかの火源により爆発する現象をいう。", "開放空間では爆発の危険性は低い。", "粉じんが空気とよく混合している浮遊状態が必要である。", "粉じんが大きい粒子の場合は、簡単に浮遊しないので爆発の危険性は低い。", "有機化合物の粉じん爆発では、燃焼が完全になるので一酸化炭素が発生することはない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "有機化合物の粉じん爆発では粒径が大きいため不完全燃焼を起こしやすく、一酸化炭素（CO）が大量に発生しやすいです。「燃焼が完全になるので一酸化炭素が発生しない」という記述が誤りです。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-051", "originalId": 418, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "粉じん爆発②特性の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "粉じん爆発の特性について、次のうち誤っているものはどれか。", "options": ["粉じん爆発とは、空間に遊離、分散した燃焼範囲の粉じん雲中で何らかの原因で着火し、火炎が伝播する際の急激な体積膨張、圧力上昇により周囲への被害が及ぶ爆発現象をいう。", "堆積粉が広く存在する場合は、１次の爆発が堆積粉を舞い上げて、２次の爆発を起こし、次々にこの過程を繰り返し遠方に伝播することがある。", "気体と比べて、粉体はその種類や環境条件などによって静電気が発生しやすく、その放電は粉じん爆発の着火源になる場合がある。", "可燃性粉じんと空気との混合気は、可燃性ガスと空気との混合気に比べて比重が大きく、一般的に爆発時の発生熱量が大きい。", "可燃性粉じんは空気中に漂い、酸素分子と均一に混合され燃焼するので完全燃焼しやすい。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "粉じんは気体や蒸気と異なり、粒径が大きいため酸素と均一に混合しにくく、不完全燃焼を起こしやすいです。「完全燃焼しやすい」という記述が誤りです。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-052", "originalId": 419, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "粉じん爆発③特徴の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "粉じん爆発の特徴について、次のうち誤っているものはどれか。", "options": ["有機物の粉じん爆発の場合、不完全燃焼を起こしやすく、生成ガス中に一酸化炭素が多量に含まれていることがあるので、中毒を起こしやすい。", "爆発の際、粒子が燃えながら飛散するので、周囲の可燃物は局部的にひどく炭化したり着火する可能性がある。", "一般にガス爆発に比較して、発生するエネルギーが小さい。", "最初の部分的な爆発により、たい積している可燃性粉じんが舞い上がり、次々に爆発的な燃焼が持続し、被害が大きくなる。", "一般にガス爆発に比較して、最小着火エネルギーが大きい。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "粉じん爆発はガス爆発に比べて発生するエネルギーが数倍「大きい」です。「小さい」という記述が誤りです。最小着火エネルギーはガス爆発より大きい（着火しにくい）のは正しい。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-053", "originalId": 420, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "静電気①帯電防止方法の不適切なもの", "difficulty": 1, "type": "適切でないものを選べ", "question": "非導電性液体の帯電防止方法として、次のうち適切でないものはどれか。", "options": ["配管内の流速を制限し、静電気の発生をできる限り防止する。", "ノズルからの噴出速度を制限し、帯電電位の上昇を抑制する。", "タンク、容器、ノズル等は、できる限り導電性のものを使用し、これらの導体部分を接地する。", "タンクへの充填時は、ノズルの先端が直接液体に接触しないよう液面より上部に接地する。", "液体に溶解しない空気、水は混入しないように取り扱う。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "タンクへの充填時はノズルの先端を液面より上部（液面上）に保つのではなく、「タンクの底部近くまで延ばして液中に挿入する」ことが正しい方法です。液面上から注入すると液体が飛散・霧化して静電気が大量に発生します。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-054", "originalId": 421, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "静電気②帯電しやすい条件の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "液体危険物が静電気を帯電しやすい条件について、次のうち誤っているものはどれか。", "options": ["加圧された液体がノズル、亀裂等、断面積の小さな開口部から噴出するとき。", "液体が液滴となって空気中に放出されるとき。", "導電率の低い液体が配管を流れるとき。", "液体相互または液体と粉体等を混合・かくはんするとき。", "直射日光に長時間さらされたとき。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "直射日光に長時間さらされることは静電気の帯電とは直接関係ありません。静電気が帯電しやすい条件は、噴出・飛散・配管内流動（導電率低い）・混合かくはんなど、液体が動く・摩擦が生じる状況です。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-055", "originalId": 422, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "静電気③帯電しにくいもの", "difficulty": 2, "type": "正しいものを選べ", "question": "流動などによって、静電気を最も帯電しにくいのは、次のうちどれか。", "options": ["トルエン", "ベンゼン", "軽油", "ガソリン", "エタノール"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "エタノールは導電率が高く（水と混合しやすい極性物質）、静電気が蓄積しにくいです。トルエン・ベンゼン・軽油・ガソリンは導電率が低い非極性物質で静電気を帯電しやすいです。導電率が高いほど電荷が逃げやすく帯電しにくくなります。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-056", "originalId": 423, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "静電気④摩擦時の発生防止対策", "difficulty": 2, "type": "正しいものを選べ", "question": "物質の摩擦時における静電気発生の防止および抑制は、材料の特性・性能および工程上の制約等から現実的には困難な場合が多いが、一般的な対策として、次のうち正しいものはどれか。", "options": ["接触面積を大きくする。", "接触回数を増やす。", "不純物等異物を混入させる。", "接触状態にあるものをゆっくりはがす。", "接触圧力を大きくする。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "接触状態にあるものを「ゆっくりはがす」と静電気の発生を抑制できます。急速にはがすと大きな摩擦が生じ静電気が多く発生します。接触面積・回数・圧力を大きくするとむしろ静電気が増えます。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-057", "originalId": 424, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "静電気⑤誤っているもの", "difficulty": 1, "type": "誤っているものを選べ", "question": "静電気について、次のうち誤っているものはどれか。", "options": ["静電気は人体にも帯電する。", "静電気は電気の不良導体に帯電しやすい。", "静電気は固体だけでなく、液体にも帯電する。", "物質に静電気が蓄積すると電気分解が起こり、引火しやすくなる。", "一般的に合成繊維の衣類は木綿のものより静電気が発生しやすい。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "物質に静電気が蓄積すると「放電（火花）」が起こり引火しやすくなります。「電気分解」が起こるという記述が誤りです。電気分解は直流電流を流して化合物を分解する現象で、静電気の蓄積とは別の現象です。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-058", "originalId": 425, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "静電気⑥災害予防対策の正しい組み合わせ", "difficulty": 1, "type": "正しいものを選べ", "question": "静電気による災害を予防する一般的な対策として、次のＡ〜Ｅのうち、正しいものの組み合わせはどれか。\n\nＡ．床面へ散水する。\nＢ．作業服、靴、手袋は絶縁性材料のものを使用する。\nＣ．可燃性蒸気が滞留するおそれのある場所で、作業服等の着脱を行わない。\nＤ．絶縁性材料のパイプやホースを使用する。\nＥ．パイプ内の液体の流速を大きくする。", "options": ["ＡとＢ", "ＡとＣ", "ＢとＤ", "ＣとＥ", "ＤとＥ"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "Ａ（床面へ散水）：湿度を上げて電荷を逃がす効果があり正しい対策です。Ｃ（可燃性蒸気滞留場所で着脱しない）：着脱時の摩擦で静電気が発生し引火の危険があるため正しい対策です。Ｂ（絶縁性材料の作業服）：絶縁性だと電荷が逃げず誤り→導電性が正しい。Ｄ（絶縁性パイプ）：誤り→接地可能な導電性が正しい。Ｅ（流速を大きく）：誤り→流速を小さくするのが正しい。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-059", "originalId": 426, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "静電気⑦記述の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "静電気に関する記述として、次のうち誤っているものはどれか。", "options": ["物体が電気を帯びることを帯電といい、帯電した物体に分布している流れのない電気を静電気という。", "異なる物体をこすり合わせると、電子の一部が一方から他方へ移り、一方は正に他方は負に帯電する。", "電子が不足した物体は、負に帯電する。", "物体間で電荷のやりとりがあっても、電気量の総和は変わらない。", "電荷には正電荷と負電荷があり、異種の電荷の間には引力がはたらく。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "電子が不足した物体は「正（＋）」に帯電します。電子はマイナスの電荷を持っているため、電子が不足すると正電荷が多くなり正に帯電します。「負に帯電する」という記述が誤りです。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-060", "originalId": 427, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "静電気⑧誤っているもの", "difficulty": 2, "type": "誤っているものを選べ", "question": "静電気について、次のうち誤っているものはどれか。", "options": ["帯電防止靴を着用しても、絶縁性の床上では帯電を防止することができない。", "絶縁体は、環境下の湿度が高いと、帯電しにくくなる。", "空気中に浮遊する液滴や粉体が導体の場合、帯電しない。", "抵抗率が10⁶Ω・m以上の物体は、接地しても帯電防止の効果はない。", "液化ガスは、ボンベから気相で放出される場合より、気液混合状態で放出される場合の方が、静電気が多く発生する。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "空気中に浮遊する液滴や粉体が導体であっても、空気（絶縁体）に囲まれているため電荷が逃げず帯電します。「帯電しない」という記述が誤りです。接地されていない導体は帯電します。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-061", "originalId": 428, "genre": "kagaku2", "genreLabel": "物理化学2", "subCategory": "静電気⑨発生に関する誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "静電気の発生に関する説明として、次のうち誤っているものはどれか。", "options": ["２つの固体の摩擦、はく離、衝突などの過程で発生する。", "液体をフィルタでろ過する際、イオンの吸着現象により発生する。", "固体の破砕などの破壊過程で発生する。", "静電誘導や帯電粒子、イオンの付着などにより発生する。", "溶解しない粉体と液体を混合してかくはんする場合、かくはん槽の壁面でのみ発生する。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "粉体と液体を混合・かくはんする場合、静電気はかくはん槽の壁面だけでなく、粉体と液体の界面全体・かくはん翼と液体の接触面など広範囲で発生します。「壁面でのみ」という記述が誤りです。", "source": "物理化学2 / 基礎化学②", "status": "OK"}, {"id": "pc-062", "originalId": 429, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "静電気⑩コンデンサの静電エネルギー計算", "difficulty": 2, "type": "正しいものを選べ", "question": "100Vの電圧で充電した電気容量3.0μFのコンデンサに蓄積されている静電エネルギーとして、次のうち正しいものはどれか。", "options": ["1.5×10⁻²J", "3.0×10⁻²J", "1.5×10⁻⁴J", "1.5×10⁴J", "3.0×10⁴J"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "静電エネルギーの公式：E = ½CV²。C = 3.0μF = 3.0×10⁻⁶F、V = 100V。E = ½ × 3.0×10⁻⁶ × 100² = ½ × 3.0×10⁻⁶ × 10000 = ½ × 3.0×10⁻² = 1.5×10⁻²J。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-063", "originalId": 430, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "静電気⑪電気のしくみ・誤りの組合せ", "difficulty": 2, "type": "誤っているものの組合せを選べ", "question": "電気のしくみについて、次の文の下線部分Ａ〜Ｅのうち、誤っているもののみの組合せはどれか。\n\n「原子は（Ａ）陽子を放出したり取り込んだりすることで、電気を帯びることがある。このように電気を帯びることを帯電といい、帯電した粒子を（Ｂ）イオンという。（Ａ）陽子を放出し、正に帯電した粒子を（Ｃ）陽イオンといい、（Ａ）陽子を取り込んで、負に帯電した粒子を（Ｄ）陰イオンという。2つの物体が電子をやりとりした後、電気量の総和は（Ｅ）増加する。」", "options": ["ＡとＢ", "ＡとＥ", "ＢとＣ", "ＣとＥ", "ＤとＥ"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "Ａ（陽子）→誤り：原子は「電子」を放出・取り込むことでイオンになります。陽子は原子核内に固定されています。Ｅ（増加する）→誤り：電荷保存の法則により、電気量の総和は変化しません（一定に保たれます）。ＢＣＤは正しい記述です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-064", "originalId": 431, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "電気分解①硫酸銅水溶液", "difficulty": 2, "type": "正しいものを選べ", "question": "硫酸銅（Ⅱ）（CuSO₄）の水溶液を電気分解したとき、電極から発生・析出する物質の組み合わせとして、正しいものは次のうちどれか。なお、電極は両極とも白金を使用する。", "options": ["酸素と銅", "酸素と水素", "水素と銅", "硫黄と酸素", "硫黄と水素"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "CuSO₄水溶液の電気分解：陽極（＋）では水が酸化されて酸素（O₂）が発生。陰極（－）ではCu²⁺が還元されて銅（Cu）が析出。反応式：陽極 2H₂O→O₂＋4H⁺＋4e⁻、陰極 Cu²⁺＋2e⁻→Cu。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-065", "originalId": 432, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "電気分解②硝酸銀水溶液", "difficulty": 2, "type": "正しいものを選べ", "question": "硝酸銀（AgNO₃）の水溶液を電気分解したとき、電極から発生・析出する物質の組み合わせとして、正しいものは次のうちどれか。なお、電極は両極とも白金を使用する。", "options": ["酸素と銀", "酸素と水素", "水素と銀", "窒素と酸素", "窒素と水素"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "AgNO₃水溶液の電気分解：陽極（＋）では水が酸化されて酸素（O₂）が発生。陰極（－）ではAg⁺が還元されて銀（Ag）が析出。CuSO₄と同様のパターンで、金属イオン（Ag⁺）が陰極に析出します。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-066", "originalId": 433, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "沸点上昇・穴埋め", "difficulty": 2, "type": "正しいものを選べ", "question": "次の文の（　）内のＡ〜Ｃに当てはまる語句の組合せとして、正しいものはどれか。\n\n「溶液の沸点が純粋な（Ａ）よりも高くなる現象を沸点上昇といい、溶液と純粋な（Ａ）のそれぞれの沸点の差を沸点上昇度という。希薄溶液の沸点上昇度は溶質の種類に（Ｂ）、溶液中の溶質の質量モル濃度に（Ｃ）する。」", "options": ["Ａ：溶質　Ｂ：関係し　Ｃ：反比例", "Ａ：溶媒　Ｂ：無関係で　Ｃ：比例", "Ａ：溶媒　Ｂ：関係し　Ｃ：比例", "Ａ：溶質　Ｂ：無関係で　Ｃ：比例", "Ａ：溶媒　Ｂ：関係し　Ｃ：反比例"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "沸点上昇は純粋な「溶媒（Ａ）」と比較した現象です。希薄溶液の沸点上昇度は溶質の種類に「無関係で（Ｂ）」、溶質の質量モル濃度に「比例（Ｃ）」します（ラウールの法則）。溶質の種類ではなく粒子数（モル数）のみに依存します。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-067", "originalId": 434, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "物質の状態変化①誤っているもの", "difficulty": 1, "type": "誤っているものを選べ", "question": "物質の状態変化について、次のうち誤っているものはどれか。", "options": ["一般に融点は沸点よりも低い。", "固体が液体になることを融解という。", "固体が直接気体になることを昇華という。", "気体が液体になることを凝縮という。", "融点が12℃の物質は20℃では固体である。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "選択肢5「融点が12℃の物質は20℃では固体である」が誤りです。融点12℃を超えた20℃では液体として存在します。選択肢1〜4（融点は沸点より低い・融解・昇華・凝縮）はすべて正しい記述です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-068", "originalId": 435, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "物質の三態変化・気体から液体", "difficulty": 1, "type": "正しいものを選べ", "question": "物質の三態の変化のうち、気体から液体に変化することはどれか。", "options": ["凝固", "融解", "蒸発", "昇華", "凝縮"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "気体→液体の変化は「凝縮（液化）」です。凝固は液体→固体、融解は固体→液体、蒸発は液体→気体、昇華は固体→気体（または気体→固体）の変化です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-069", "originalId": 436, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "物質の状態変化②正しいもの", "difficulty": 1, "type": "正しいものを選べ", "question": "物質の状態の変化について、次のうち正しいものはどれか。", "options": ["水は１気圧において100℃で沸騰する。", "二酸化炭素には気体と固体の状態があるが、いかなる条件下でも液体の状態にはならない。", "硫黄は加熱すると溶解して気化する。この現象を昇華という。", "可燃性液体の沸点は常に100℃より低い。", "０℃で水と氷が共存するのは、水の凝固点と氷の融点が異なっているためである。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "水は１気圧（標準大気圧）において100℃で沸騰します（正しい）。選択肢2：CO₂は高圧下（5.1気圧以上）で液体になります（誤り）。選択肢3：硫黄は加熱すると融解・蒸発しますが、これは昇華ではありません（誤り）。選択肢4：沸点が100℃以上の可燃性液体もあります（誤り）。選択肢5：水の凝固点と氷の融点はともに0℃で同一です（誤り）。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-070", "originalId": 437, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "物質の状態変化③説明の正しいもの", "difficulty": 1, "type": "正しいものを選べ", "question": "物質の状態変化の説明として、次のうち正しいものはどれか。", "options": ["熱が吸収されて、氷が水になることを液化という。", "水が水蒸気になるとき熱を吸収するが、液体から気体への状態変化に使われるため、温度は上昇しない。", "水が水蒸気になることを蒸発といい、熱が放出される。", "水が氷になることを凝固といい、熱が吸収される。", "水蒸気が水になることを凝固といい、熱が放出される。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "水が水蒸気になるとき気化熱（蒸発熱）を吸収しますが、この熱は状態変化に使われるため温度は上昇しません（正しい）。選択肢1：氷が水になるのは「融解」（液化は気体→液体）（誤り）。選択肢3：蒸発では熱が吸収されます（誤り）。選択肢4：凝固では熱が放出されます（誤り）。選択肢5：水蒸気が水になるのは「凝縮」（凝固は液体→固体）（誤り）。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-071", "originalId": 438, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "蒸気圧①誤っているもの", "difficulty": 2, "type": "誤っているものを選べ", "question": "蒸気圧と沸点に関する記述について、次のうち誤っているものはどれか。", "options": ["沸点は、飽和蒸気圧と外圧が等しくなる温度をいう。", "液体の温度が高くなると、蒸気圧は小さくなる。", "一定温度における液体の飽和蒸気圧は、物質ごとに決まっている。", "大気圧が小さくなると、沸点は低くなる。", "同温で比較したとき、分子間力の小さい物質ほど、蒸気圧は大きくなる傾向が大きい。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "液体の温度が高くなると蒸気圧は「大きく」なります。温度が上がると分子の運動エネルギーが増して蒸発しやすくなるため、蒸気圧は上昇します。「小さくなる」という記述が誤りです。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-072", "originalId": 439, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "蒸気圧②穴埋め", "difficulty": 1, "type": "正しいものを選べ", "question": "次の文の（　）内のＡ〜Ｃに当てはまる語句の組合せとして、正しいものはどれか。\n\n「液体の飽和蒸気圧は、温度の上昇とともに（Ａ）する。その圧力が大気の圧力に等しくなるときの（Ｂ）が沸点である。したがって、大気の（Ｃ）が低いと沸点も低くなる。」", "options": ["Ａ：減少　Ｂ：温度　Ｃ：圧力", "Ａ：増大　Ｂ：湿度　Ｃ：温度", "Ａ：減少　Ｂ：圧力　Ｃ：温度", "Ａ：増大　Ｂ：温度　Ｃ：圧力", "Ａ：減少　Ｂ：圧力　Ｃ：湿度"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "飽和蒸気圧は温度の上昇とともに「増大（Ａ）」します。その圧力が大気圧に等しくなるときの「温度（Ｂ）」が沸点です。大気の「圧力（Ｃ）」が低いと沸点も低くなります（高山では水が100℃未満で沸騰するのはこのため）。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-073", "originalId": 440, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "物質の性質①最も妥当なもの", "difficulty": 1, "type": "妥当なものを選べ", "question": "次のうち最も妥当なものはどれか。", "options": ["２つの物質の分子式が同じであれば、化学的性質は全く同じである。", "黄リンと赤リンは、同素体であるから、化学的性質は全く同じである。", "比重が同じであれば、同一体積の物体の質量は同じである。", "２つの物質の体積が同じであれば、その質量は同じである。", "沸点が同じであれば、必ず同一物質である。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "比重が同じであれば、同一体積の物体の質量は同じです（比重＝質量/体積の比率なので正しい）。選択肢1：分子式が同じでも構造異性体など化学的性質が異なる場合があります。選択肢2：同素体は同じ元素でも構造が異なるため化学的性質は異なります（黄リンは猛毒・自然発火性、赤リンは安定）。選択肢4：体積が同じでも比重（密度）が違えば質量は異なります。選択肢5：異なる物質でも沸点が同じ場合があります。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-074", "originalId": 441, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "比熱①説明の正しいもの", "difficulty": 1, "type": "正しいものを選べ", "question": "比熱の説明として、次のうち正しいものはどれか。", "options": ["物質１gの温度を１Kだけ高めるのに必要な熱量である。", "物質が水を含んだとき発生する熱量である。", "物質１gが液体から気体に変化するのに必要な熱量である。", "物質に１J（ジュール）の熱を加えたときの温度上昇の割合である。", "物質を圧縮したとき発生する熱量である。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "比熱とは物質１gの温度を１K（または１℃）だけ高めるのに必要な熱量です。選択肢3は「気化熱（蒸発熱）」の説明です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-075", "originalId": 442, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "熱の移動①対流の数", "difficulty": 1, "type": "正しいものを選べ", "question": "熱の移動の仕方には伝導、対流および放射の３つがあるが、次のＡ〜Ｅのうち主として対流が原因であるものはいくつあるか。\n\nＡ．天気のよい日に屋外で日光浴をしたら身体が温まった。\nＢ．ストーブで灯油を燃焼していたら、床面よりも天井近くの温度が高くなった。\nＣ．鉄棒を持って、その先端を火の中に入れたら手元の方まで次第に熱くなった。\nＤ．ガスコンロで水を沸かしたところ、水の表面から温かくなった。\nＥ．アイロンをかけたら、その衣類が熱くなった。", "options": ["１つ", "２つ", "３つ", "４つ", "５つ"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "対流はＢ（暖気が上昇）とＤ（水の対流）の２つです。Ａは放射（太陽からの輻射熱）、Ｃは伝導（鉄棒を通じた熱伝導）、Ｅは伝導（アイロンから衣類への直接接触）です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-076", "originalId": 443, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "熱の移動②対流・放射穴埋め", "difficulty": 1, "type": "正しいものを選べ", "question": "次の文の（　）内のＡ及びＢに当てはまる語句の組合せとして、正しいものはどれか。\n\n「物体と熱源との間に液体が存在するときには、液体は一般に温度が高くなると比重が小さくなるので上方に移動し、それによって物体に熱が伝わる。これが（Ａ）による熱の伝わり方である。しかし、熱源と物体との間に何もなく真空である場合にも熱は伝わる。太陽により地上の物体が温められて温度が上がるのはこの例であって、このような熱の伝わり方を（Ｂ）と呼ぶ。」", "options": ["Ａ：対流　Ｂ：伝導", "Ａ：伝導　Ｂ：放射", "Ａ：伝導　Ｂ：対流", "Ａ：対流　Ｂ：放射", "Ａ：放射　Ｂ：伝導"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "液体の温度差による上昇・循環は「対流（Ａ）」。真空中でも伝わる熱（太陽からの熱）は「放射（輻射）（Ｂ）」です。伝導は固体・液体・気体の接触による熱移動です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-077", "originalId": 444, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "熱の移動③誤っているもの", "difficulty": 1, "type": "誤っているものを選べ", "question": "熱の移動について、次のうち誤っているものはどれか。", "options": ["ストーブに近づくと、ストーブに向いた方が熱くなるのは放射熱によるものである。", "ガスこんろで水を沸かすと、水が表面から温かくなるのは熱の伝導によるものである。", "コップにお湯を入れると、コップが熱くなるのは、熱の伝導によるものである。", "冷却装置で冷やされた空気により、室内全体が冷やされるのは、熱の対流によるものである。", "太陽で地上の物が温められて温度が上昇するのは、放射熱によるものである。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "ガスこんろで水を沸かすとき、水が表面から温かくなるのは「対流」によるものです。熱せられた底部の水が軽くなって上昇し、表面付近が温かくなります。「伝導」は固体中の熱移動で、液体の循環による熱移動は対流です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-078", "originalId": 445, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "熱に関する一般的説明の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "熱に関する一般的な説明について、次のうち誤っているものはどれか。", "options": ["比熱とは、物質１gの温度を１K（ケルビン）上昇させるのに必要な熱量をいう。", "熱伝導率の大きな物質は、熱を伝えやすい。", "比熱が小さい物質は、温まりにくく冷めにくい。", "体膨張率は、固体が最も小さく、気体が最も大きい。", "理想気体の体積は、圧力が一定で温度が１℃上昇すると、０℃のときの体積の約273分の１膨張する。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "比熱が小さい物質は少ない熱量で温度が上がるため「温まりやすく冷めやすい」です。「温まりにくく冷めにくい」は比熱が大きい物質の説明です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-079", "originalId": 446, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "物理変化②正しいもの", "difficulty": 2, "type": "正しいものを選べ", "question": "物質の物理変化について、次のうち正しいものはどれか。", "options": ["気体の体膨張率は、圧力に関係するが温度の変化には関係しない。", "固体または液体は、１℃上がるごとに約273分の１体積が増える。", "固体の体膨張率は、気体の体膨張率の３倍である。", "水の密度は、約４℃のとき最大である。", "液体の体膨張率は、気体の体膨張率よりはるかに大きい。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "水は約４℃のとき密度が最大（約1g/cm³）になります。０℃や100℃では密度がやや小さくなります。選択肢1：気体の体膨張率は温度変化と深く関係します（誤り）。選択肢2：約273分の１膨張するのは「気体」（シャルルの法則）です（誤り）。選択肢3：固体の体膨張率は気体より「はるかに小さい」です（誤り）。選択肢5：液体の体膨張率は気体よりはるかに「小さい」です（誤り）。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-080", "originalId": 447, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "熱伝導率が最も小さいもの", "difficulty": 1, "type": "正しいものを選べ", "question": "熱伝導率がもっとも小さいものは、次のうちどれか。", "options": ["アルミニウム", "水", "木材", "銅", "空気"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "熱伝導率（大きい順）：銅＞アルミニウム＞水＞木材＞空気。空気は熱伝導率が極めて小さく、断熱材として利用されます。金属は一般に熱伝導率が大きく、気体は小さいです。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-081", "originalId": 448, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "熱の一般的説明②正しいもの", "difficulty": 2, "type": "正しいものを選べ", "question": "次のうち正しいものはどれか。", "options": ["エタノールの比熱は、水より大きい。", "銀の熱伝導率は、水より小さい。", "ニッケルの線膨張率は、体膨張率より大きい。", "熱の対流は、液体および固体だけに起こる現象である。", "外気圧が高くなれば、沸点も高くなる。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "外気圧（大気圧）が高くなると沸点も高くなります（圧力鍋の原理）。選択肢1：水の比熱（約4.2J/g・K）はエタノール（約2.4J/g・K）より大きいです（誤り）。選択肢2：銀の熱伝導率は金属の中でも高く、水より大きいです（誤り）。選択肢3：体膨張率は線膨張率の約３倍で、体膨張率の方が大きいです（誤り）。選択肢4：対流は液体と気体に起こる現象で、固体では起こりません（誤り）。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-082", "originalId": 449, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "液体が気体になるときの熱量", "difficulty": 1, "type": "正しいものを選べ", "question": "液体が気体になるときの熱量として、次のうち正しいものはどれか。", "options": ["燃焼熱", "昇華熱", "融解熱", "比熱", "蒸発熱"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "液体が気体になるときに必要な熱量は「蒸発熱（気化熱）」です。融解熱は固体→液体、昇華熱は固体→気体の変化に必要な熱量です。燃焼熱は燃焼反応による発熱量、比熱は温度を上げるのに必要な熱量です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-083", "originalId": 450, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "空間容積と体膨張", "difficulty": 1, "type": "正しいものを選べ", "question": "タンクや容器に液体の危険物を入れる場合、空間容積を必要とするのは、次のどの現象と関係があるか。", "options": ["酸化", "還元", "蒸発", "熱伝導", "体膨張"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "液体危険物は温度が上がると体膨張（熱膨張）により体積が増加します。空間容積を設けないと、温度上昇時にタンクや容器が破損・爆発する危険があります。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-084", "originalId": 451, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "体膨張率の計算", "difficulty": 2, "type": "正しいものを選べ", "question": "容器に入った液温０℃のガソリン1,000Lを温めていくと1,020Lになった。このとき、ガソリンの液温として最も近いものは次のうちどれか。なお、ガソリンの体膨張率は1.35×10⁻³K⁻¹とし、蒸発による減少はないものとする。", "options": ["５℃", "10℃", "15℃", "20℃", "25℃"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "体膨張の公式：ΔV = V₀ × β × ΔT。ΔV = 1020 - 1000 = 20L、V₀ = 1000L、β = 1.35×10⁻³K⁻¹。ΔT = ΔV ÷ (V₀ × β) = 20 ÷ (1000 × 1.35×10⁻³) = 20 ÷ 1.35 ≒ 14.8℃ ≒ 15℃。０℃から約15℃上昇したので液温は約15℃です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-085", "originalId": 452, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "化学反応熱", "difficulty": 1, "type": "正しいものを選べ", "question": "化学反応にともなう反応熱は、次のうちどれか。", "options": ["中和熱", "蒸発熱", "凝固熱", "凝縮熱", "融解熱"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "中和熱は酸と塩基が反応（中和反応）するときに発生する熱量で、化学反応にともなう反応熱です。蒸発熱・凝固熱・凝縮熱・融解熱はいずれも状態変化にともなう熱量（物理変化）です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-086", "originalId": 453, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "物理変化・化学変化①誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "物理変化および化学変化に関する説明として、次のうち誤っているものはどれか。", "options": ["炭素が燃焼して、二酸化炭素になる反応は化合である。", "結晶性の物質が、空気中で粉末状態になる変化を潮解という。", "酸素と他の物質との間に行われる化合を酸化という。", "他の物質と作用して酸化を起こさせる物質を、一般に酸化剤という。", "酸化物が酸素を失ったり、物質が水素を化合することを還元という。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "結晶性の物質が空気中の水分を吸収して溶解する現象は「潮解」です。「空気中で粉末状態になる」のは「風解（ふうかい）」の説明です。潮解と風解を混同しないよう注意が必要です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-087", "originalId": 454, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "化学変化①正しいもの", "difficulty": 1, "type": "正しいものを選べ", "question": "化学変化の説明として、次のうち正しいものはどれか。", "options": ["鉄が空気中でさびる。", "氷が溶けて水になる。", "水が沸騰して水蒸気になる。", "砂糖が水に溶ける。", "ばねが伸びる。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "鉄がさびる（酸化鉄になる）のは化学変化（酸化反応）です。氷が溶ける・水が沸騰・砂糖が溶ける・ばねが伸びるはすべて物理変化（物質の種類は変わらない）です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-088", "originalId": 455, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "物理変化と化学変化②誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "物理変化と化学変化について、次のうち誤っているものはどれか。", "options": ["ドライアイスが二酸化炭素（気体）に変化するのは、化学変化である。", "氷が水になるのは、物理変化である。", "鉄がさびるのは、化学変化である。", "ニクロム線に電気を通すと発熱するのは、物理変化である。", "鉛を加熱すると溶けるのは、物理変化である。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "ドライアイス（固体CO₂）が気体CO₂になるのは「昇華」という物理変化で、化学変化ではありません。物質の種類（CO₂）は変わらず、状態だけが変化します。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-089", "originalId": 456, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "化学変化②穴埋め", "difficulty": 1, "type": "正しいものを選べ", "question": "次の文の（　）内のＡ〜Ｃに当てはまる語句の組合せとして、正しいものはどれか。\n\n「物質と物質とが作用し、その結果、新しい物質ができる変化が（Ａ）である。また、２種類あるいはそれ以上の物質から別の物質ができることを（Ｂ）といい、その結果できた物質を（Ｃ）という。」", "options": ["Ａ：物理変化　Ｂ：化合　Ｃ：化合物", "Ａ：化学変化　Ｂ：混合　Ｃ：混合物", "Ａ：化学変化　Ｂ：重合　Ｃ：化合物", "Ａ：物理変化　Ｂ：混合　Ｃ：混合物", "Ａ：化学変化　Ｂ：化合　Ｃ：化合物"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "新しい物質ができる変化は「化学変化（Ａ）」。２種類以上の物質から別の物質ができることを「化合（Ｂ）」といい、その結果できた物質を「化合物（Ｃ）」といいます。混合は物質を混ぜるだけで新物質は生じません。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-090", "originalId": 457, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "潮解の説明", "difficulty": 1, "type": "正しいものを選べ", "question": "潮解の説明について、次のうち正しいものはどれか。", "options": ["物質が空気中の水蒸気と反応して固化する現象", "物質の中に含まれている水分が放出されて粉末になる現象", "固体が水分を吸収して、その水に溶ける現象", "物質が空気中の水蒸気と反応して、性質の異なった２つ以上の物質になる現象", "水溶液の水分が蒸発して、溶質が析出する現象"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "潮解とは固体が空気中の水蒸気（水分）を吸収して溶解する現象です。例：塩化カルシウム、水酸化ナトリウムなど。選択肢2は「風解」の説明（結晶水を失って粉末になる）です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-091", "originalId": 458, "genre": "kagaku3", "genreLabel": "物理化学3", "subCategory": "中性子数が7の原子", "difficulty": 2, "type": "正しいものを選べ", "question": "中性子の数が７である原子として、次のうち正しいものはどれか。", "options": ["²³₁₁Na", "¹⁶₈O", "¹⁹₉F", "¹³₆C", "⁷₃Li"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "中性子数＝質量数－原子番号（陽子数）。¹³₆C：中性子数＝13－6＝7 ✓。²³₁₁Na：23－11＝12。¹⁶₈O：16－8＝8。¹⁹₉F：19－9＝10。⁷₃Li：7－3＝4。中性子数が7なのは¹³₆C（炭素13）です。", "source": "物理化学3 / 基礎化学③", "status": "OK"}, {"id": "pc-092", "originalId": 459, "genre": "kagaku4", "genreLabel": "物理化学4", "subCategory": "二硫化炭素の完全燃焼", "difficulty": 2, "type": "正しいものを選べ", "question": "次の文の（　）内に当てはまるものは、次のうちどれか。\n\n「二硫化炭素が完全燃焼すると（　）になる。」", "options": ["水蒸気と二酸化炭素", "二酸化炭素と二酸化硫黄", "二酸化硫黄と水蒸気", "一酸化炭素と二酸化硫黄", "一酸化炭素と二酸化炭素"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "二硫化炭素（CS₂）の完全燃焼反応：CS₂ ＋ 3O₂ → CO₂ ＋ 2SO₂。炭素（C）は二酸化炭素（CO₂）に、硫黄（S）は二酸化硫黄（SO₂）になります。水素を含まないため水蒸気は生じません。", "source": "物理化学4 / 基礎化学④", "status": "OK"}, {"id": "pc-093", "originalId": 460, "genre": "kagaku4", "genreLabel": "物理化学4", "subCategory": "単体・化合物・混合物①正しいもの", "difficulty": 1, "type": "正しいものを選べ", "question": "単体、化合物および混合物について、次のうち正しいものはどれか。", "options": ["空気は、酸素と窒素からなる化合物で、その成分の約２分の１は酸素である。", "水は、酸素と水素の混合物である。", "二酸化炭素は、炭素と酸素の混合物である。", "ガソリンは種々の炭化水素の混合物である。", "鉄のさびは、単体である。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "ガソリンは様々な炭化水素（ペンタン・ヘキサン・オクタンなど）の混合物です（正しい）。空気は混合物（化合物ではない）、水はH₂Oという化合物（混合物ではない）、CO₂は化合物（混合物ではない）、鉄のさびはFe₂O₃という化合物（単体ではない）です。", "source": "物理化学4 / 基礎化学④", "status": "OK"}, {"id": "pc-094", "originalId": 461, "genre": "kagaku4", "genreLabel": "物理化学4", "subCategory": "単体・化合物・混合物②誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "単体、化合物および混合物について、次のうち誤っているものはどれか。", "options": ["水は、酸素と水素に分解できるので化合物である。", "硫黄やアルミニウムは、１種類の元素からできているので単体である。", "赤リンと黄リンは、単体である。", "食塩水は、食塩と水の化合物である。", "ガソリンは種々の炭化水素の混合物である。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "食塩水は食塩（NaCl）と水（H₂O）が混合した「混合物」です。「化合物」ではありません（食塩自体はNaとClの化合物ですが、食塩水は混合物）。", "source": "物理化学4 / 基礎化学④", "status": "OK"}, {"id": "pc-095", "originalId": 462, "genre": "kagaku4", "genreLabel": "物理化学4", "subCategory": "単体・化合物・混合物③組み合わせ", "difficulty": 2, "type": "正しいものを選べ", "question": "単体、化合物および混合物について、次の組み合わせのうち正しいものはどれか。", "options": ["単体：空気　化合物：水　混合物：水蒸気", "単体：水素　化合物：ガソリン　混合物：石油", "単体：塩酸　化合物：塩素　混合物：海水", "単体：窒素　化合物：アンモニア　混合物：岩石", "単体：亜鉛　化合物：塩化ナトリウム　混合物：ドライアイス"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "窒素（N₂）は単体、アンモニア（NH₃）はNとHの化合物、岩石は複数の鉱物からなる混合物です（正しい）。空気は混合物、水蒸気はH₂Oで化合物。ガソリンは混合物。塩酸はHClの水溶液で混合物、塩素は単体。ドライアイスはCO₂の固体で化合物です。", "source": "物理化学4 / 基礎化学④", "status": "OK"}, {"id": "pc-096", "originalId": 463, "genre": "kagaku4", "genreLabel": "物理化学4", "subCategory": "同素体の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "同素体の組合せとして、次のうち誤っているものはどれか。", "options": ["ダイヤモンドと黒鉛（グラファイト）", "黄リンと赤リン", "酸素とオゾン", "斜方硫黄と単斜硫黄", "銀と水銀"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "銀（Ag）と水銀（Hg）は異なる元素なので同素体ではありません。同素体は同じ元素からなる異なる単体です。ダイヤモンドと黒鉛（炭素）、黄リンと赤リン（リン）、酸素とオゾン（酸素）、斜方硫黄と単斜硫黄（硫黄）はすべて正しい同素体の組み合わせです。", "source": "物理化学4 / 基礎化学④", "status": "OK"}, {"id": "pc-097", "originalId": 464, "genre": "kagaku4", "genreLabel": "物理化学4", "subCategory": "構造異性体", "difficulty": 2, "type": "正しいものを選べ", "question": "次に示す物質の組み合わせのうち、互いに構造異性体であるものはどれか。", "options": ["エタノールとジメチルエーテル", "赤リンと黄リン", "単斜硫黄と斜方硫黄", "酸素とオゾン", "シス－２－ブテンとトランス－２－ブテン"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "エタノール（C₂H₅OH）とジメチルエーテル（CH₃OCH₃）は分子式がどちらもC₂H₆Oで同じですが、原子の結合順序（構造）が異なる構造異性体です。選択肢2・3・4は同素体。選択肢5は幾何異性体（シス・トランス異性体）です。", "source": "物理化学4 / 基礎化学④", "status": "OK"}, {"id": "pc-098", "originalId": 465, "genre": "kagaku4", "genreLabel": "物理化学4", "subCategory": "混合物の分離操作の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "混合物を分離する操作として、次のうち誤っているものはどれか。", "options": ["ろ過", "希釈", "蒸留", "遠心分離", "抽出"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "希釈は混合物に溶媒を加えて濃度を薄める操作で、「分離」ではありません。ろ過・蒸留・遠心分離・抽出はいずれも混合物を成分ごとに分離する操作です。", "source": "物理化学4 / 基礎化学④", "status": "OK"}];
const CHUNK_SIZE = 30;
const KEY = "otsu4_physics_chemistry_v1";
let state = JSON.parse(localStorage.getItem(KEY) || '{"answers":{},"chunks":{},"last":{"chunk":"0","genre":"all","mode":"all","idx":0}}');
let list = [...QUESTIONS];
let idx = 0;
let locked = false;
let selectedSet = new Set();

function initState(){
  if(!state.answers) state.answers = {};
  if(!state.chunks) state.chunks = {};
  if(!state.last) state.last = {chunk:"0", genre:"all", mode:"all", idx:0};
}
function initChunks(){
  const total = Math.ceil(QUESTIONS.length / CHUNK_SIZE);
  chunkFilter.innerHTML = "";
  for(let i=0; i<total; i++){
    const start = i * CHUNK_SIZE + 1;
    const end = Math.min((i+1) * CHUNK_SIZE, QUESTIONS.length);
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = `第${i+1}セット：${start}〜${end}問`;
    chunkFilter.appendChild(opt);
  }
  const all = document.createElement("option");
  all.value = "all";
  all.textContent = `全問題：1〜${QUESTIONS.length}問`;
  chunkFilter.appendChild(all);
}
function restoreLast(){
  const last = state.last || {};
  if(last.chunk && [...chunkFilter.options].some(o => o.value === last.chunk)) chunkFilter.value = last.chunk;
  if(last.genre) genreFilter.value = last.genre;
  if(last.mode) mode.value = last.mode;
}
function chunkKey(){ return chunkFilter.value; }
function getChunkData(key=chunkKey()){
  if(!state.chunks[key]) state.chunks[key] = {rounds:0, currentRoundAnswered:{}, lastIdx:0};
  if(!state.chunks[key].currentRoundAnswered) state.chunks[key].currentRoundAnswered = {};
  if(typeof state.chunks[key].rounds !== "number") state.chunks[key].rounds = 0;
  if(typeof state.chunks[key].lastIdx !== "number") state.chunks[key].lastIdx = 0;
  return state.chunks[key];
}
function isMulti(q){ return (q.correctNos || []).length > 1; }
function sameArray(a,b){ return a.length === b.length && a.every((v,i) => v === b[i]); }

function baseForChunk(){
  const chunk = chunkFilter.value;
  if(chunk === "all") return [...QUESTIONS];
  const c = Number(chunk);
  return QUESTIONS.slice(c * CHUNK_SIZE, Math.min((c+1) * CHUNK_SIZE, QUESTIONS.length));
}
function currentFilteredBase(){
  let base = baseForChunk();
  const g = genreFilter.value;
  if(g !== "all") base = base.filter(q => (q.genreLabel || "").includes(g) || (q.source || "").includes(g));
  const m = mode.value;
  if(m === "wrong") base = base.filter(q => state.answers[q.id] && !state.answers[q.id].correct);
  if(m === "unseen") base = base.filter(q => !state.answers[q.id]);
  return base;
}
function save(){
  state.last = {chunk:chunkFilter.value, genre:genreFilter.value, mode:mode.value, idx};
  localStorage.setItem(KEY, JSON.stringify(state));
  stats();
}
function stats(){
  totalCount.textContent = list.length;
  const ids = new Set(list.map(q => q.id));
  const entries = Object.entries(state.answers).filter(([id]) => ids.has(id));
  const answered = entries.length;
  const correct = entries.filter(([_, x]) => x.correct).length;
  doneCount.textContent = answered;
  rate.textContent = answered ? Math.round(correct / answered * 100) + "%" : "0%";

  const cd = getChunkData();
  roundCount.textContent = cd.rounds;
  const baseIds = baseForChunk().map(q => q.id);
  const answeredInRound = baseIds.filter(id => cd.currentRoundAnswered[id]).length;
  progressBar.style.width = baseIds.length ? Math.round(answeredInRound / baseIds.length * 100) + "%" : "0%";
}
function build(useSavedIdx=true){
  list = currentFilteredBase();
  const cd = getChunkData();
  idx = useSavedIdx ? Math.min(cd.lastIdx || 0, Math.max(0, list.length - 1)) : 0;
  if(state.last && useSavedIdx && chunkFilter.value === state.last.chunk && genreFilter.value === state.last.genre && mode.value === state.last.mode){
    idx = Math.min(state.last.idx || 0, Math.max(0, list.length - 1));
  }
  render();
}
function currentChunkText(){
  const chunk = chunkFilter.value;
  if(chunk === "all") return "全問題";
  const c = Number(chunk);
  const start = c * CHUNK_SIZE + 1;
  const end = Math.min((c+1) * CHUNK_SIZE, QUESTIONS.length);
  return `第${c+1}セット ${start}〜${end}`;
}
function render(){
  stats();
  if(!list.length){
    card.classList.add("hidden");
    empty.classList.remove("hidden");
    return;
  }
  card.classList.remove("hidden");
  empty.classList.add("hidden");

  const q = list[idx];
  locked = false;
  selectedSet = new Set();

  getChunkData().lastIdx = idx;
  state.last = {chunk:chunkFilter.value, genre:genreFilter.value, mode:mode.value, idx};
  localStorage.setItem(KEY, JSON.stringify(state));

  qid.textContent = `${idx+1} / ${list.length}`;
  chunkTag.textContent = currentChunkText();
  genre.textContent = q.genreLabel || "物理化学";
  cat.textContent = q.subCategory || "";
  typ.textContent = q.type || "";
  question.textContent = q.question;

  explanation.classList.add("hidden");
  explanation.textContent = "";
  multiNote.classList.toggle("hidden", !isMulti(q));
  multiNote.textContent = isMulti(q) ? `この問題は${q.correctNos.length}つ選ぶ形式。${q.correctNos.length}個選んだら自動で答え合わせするで。` : "";

  options.innerHTML = "";
  q.options.forEach((o, i) => {
    const b = document.createElement("button");
    b.className = "option";
    b.textContent = `${i+1}. ${o}`;
    b.onclick = () => selectOption(i);
    options.appendChild(b);
  });
}
function selectOption(i){
  if(locked) return;
  const q = list[idx];
  if(isMulti(q)){
    if(selectedSet.has(i)) selectedSet.delete(i);
    else selectedSet.add(i);
    [...document.querySelectorAll(".option")].forEach((b,n) => b.classList.toggle("selected", selectedSet.has(n)));
    if(selectedSet.size === q.correctNos.length){
      submitAnswer([...selectedSet].sort((a,b) => a-b));
    }
  }else{
    submitAnswer([i]);
  }
}
function updateRoundProgress(qid){
  const key = chunkKey();
  const cd = getChunkData(key);
  cd.currentRoundAnswered[qid] = true;
  const baseIds = baseForChunk().map(q => q.id);
  const done = baseIds.every(id => cd.currentRoundAnswered[id]);
  if(done && baseIds.length){
    cd.rounds += 1;
    cd.currentRoundAnswered = {};
    alert(`${currentChunkText()} を1周完了！ 現在 ${cd.rounds}周`);
  }
}
function submitAnswer(selectedIndexes){
  if(locked) return;
  locked = true;

  const q = list[idx];
  const correctIndexes = [...(q.answerIndexes || [q.answer])].sort((a,b) => a-b);
  const chosen = [...selectedIndexes].sort((a,b) => a-b);
  const ok = sameArray(chosen, correctIndexes);

  state.answers[q.id] = {
    selectedIndexes: chosen,
    selectedNos: chosen.map(x => x + 1),
    selected: chosen[0],
    correct: ok,
    at: new Date().toISOString()
  };

  updateRoundProgress(q.id);

  [...document.querySelectorAll(".option")].forEach((b,n) => {
    if(correctIndexes.includes(n)) b.classList.add("correct");
    if(chosen.includes(n) && !correctIndexes.includes(n)) b.classList.add("wrong");
  });

  const correctText = (q.correctNos || correctIndexes.map(x => x+1)).join("・");
  explanation.textContent = `${ok ? "正解" : "不正解"}。正解は${correctText}番。\n\n${q.explanation}`;
  explanation.classList.remove("hidden");
  save();
}
function nextQ(){
  if(!list.length) return;
  idx = (idx + 1) % list.length;
  getChunkData().lastIdx = idx;
  save();
  render();
}
function prevQ(){
  if(!list.length) return;
  idx = (idx - 1 + list.length) % list.length;
  getChunkData().lastIdx = idx;
  save();
  render();
}
function shuffleCurrent(){
  for(let i=list.length-1; i>0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [list[i], list[j]] = [list[j], list[i]];
  }
  idx = 0;
  getChunkData().lastIdx = idx;
  save();
  render();
}
function jumpRandom(){
  if(!list.length) return;
  idx = Math.floor(Math.random() * list.length);
  getChunkData().lastIdx = idx;
  save();
  render();
}
function resetStats(){
  if(confirm("回答履歴・周回数・途中再開位置を全部リセットする？")){
    state = {answers:{}, chunks:{}, last:{chunk:chunkFilter.value, genre:genreFilter.value, mode:mode.value, idx:0}};
    localStorage.setItem(KEY, JSON.stringify(state));
    build(false);
  }
}

initState();
initChunks();
restoreLast();
chunkFilter.addEventListener("change", () => build(true));
genreFilter.addEventListener("change", () => build(true));
mode.addEventListener("change", () => build(true));
build(true);
</script>
