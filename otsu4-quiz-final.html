になれるわけではありません。危険物取扱者、危険物施設保安員、又は危険物取扱者の立会いを受けた者などが実施できます。", "source": "法令3.pdf p.13", "status": "OK"}, {"id": "law3-025", "originalId": "", "genreLabel": "法令3", "subCategory": "定期点検", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等の定期点検について、次のうち正しいものはどれか。ただし、規則で定める漏れの点検及び固定式の泡消火設備に関する点検を除く。", "options": ["定期点検を行うことができる者は、危険物取扱者のみである。", "定期点検は、製造所等における危険物の貯蔵または取扱いが技術上の基準に適合しているかどうかについて行う。", "定期点検を行わなければならない製造所等の所有者等は、当該製造所等について定期に点検し、その点検記録を作成し、これを保存しなければならない。", "製造所、屋内貯蔵所、屋外タンク貯蔵所、屋外貯蔵所及び一般取扱所については、指定数量の倍数にかかわらず、定期点検を行わなければならない。", "移動タンク貯蔵所については、定期点検を行わなくてもよい。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "定期点検が必要な製造所等の所有者等は、定期に点検し、点検記録を作成・保存しなければなりません。", "source": "法令3.pdf p.13", "status": "OK"}, {"id": "law3-026", "originalId": "", "genreLabel": "法令3", "subCategory": "定期点検", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等の定期点検について、次のうち誤っているものはどれか。ただし、規則で定める漏れの点検及び固定式の泡消火設備に関する点検を除く。", "options": ["当該製造所等において危険物を取り扱うことができる丙種危険物取扱者は、この点検を行うことができない。", "製造所等の所有者等は、当該製造所等について定期に点検し、その点検記録を作成し、これを一定期間保存しなければならない。", "この点検は、製造所等の位置、構造及び設備が技術上の基準に適合しているかどうかについて行う。", "危険物施設保安員は、この点検を行うことができる。", "当該製造所等において危険物を取り扱うことができる乙種危険物取扱者は、この点検を行うことができる。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "丙種危険物取扱者であっても、当該製造所等で取り扱うことができる危険物については定期点検を行うことができます。", "source": "法令3.pdf p.14", "status": "OK"}, {"id": "law3-027", "originalId": "", "genreLabel": "法令3", "subCategory": "移動貯蔵タンクの漏れ点検", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、規則で定められた移動貯蔵タンクの漏れの点検について、次のうち誤っているものはどれか。", "options": ["漏れ点検の時期は、設置の完成検査済証の交付を受けた日または前回の漏れ点検を行った日から5年を経過する日の属する月の末日までの間に1回以上実施する。", "点検記録の保存期間は10年間である。", "危険物取扱者の立会いがあれば、点検の方法に関する知識及び技能を有していない者でも、漏れ点検を実施することができる。", "災害その他非常事態が生じ、定期点検を行うことが困難と認められるときは、市町村長等が点検を行うべき期限を別に定めることができる。", "点検記録には、点検をした製造所等の名称、点検の方法及び結果、点検年月日、点検を行った者の氏名を記載する。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "漏れ点検は、点検の方法に関する知識及び技能を有する者が行う必要があります。危険物取扱者の立会いがあれば誰でもよいわけではありません。", "source": "法令3.pdf p.14-15", "status": "OK"}, {"id": "law3-028", "originalId": "", "genreLabel": "法令3", "subCategory": "地下貯蔵タンクの漏れ点検", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、製造所等において規則で定める地下貯蔵タンクの漏れの点検について、次のA〜Dのうち正しいもののみを掲げているものはどれか。\n\nA. 危険物取扱者又は危険物施設保安員で、漏れの点検方法に関する知識及び技能を有する者は、点検を行うことができる。\nB. 点検は、タンク容量が10,000L以上のものについて行わなければならない。\nC. 点検記録は、製造所等の名称、点検年月日、点検方法、結果及び実施者等を記載しなければならない。\nD. 点検結果は、市町村長等に報告しなければならない。", "options": ["AとB", "AとC", "BとC", "BとD", "CとD"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "AとCが正しいです。地下貯蔵タンクの漏れ点検は、点検方法に関する知識及び技能を有する者が行い、点検記録を作成・保存します。", "source": "法令3.pdf p.15", "status": "OK"}, {"id": "law3-029", "originalId": "", "genreLabel": "法令3", "subCategory": "保安検査", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、市町村長等が行う保安に関する検査の対象となる製造所等として、次のうち正しいものはどれか。", "options": ["貯蔵する液体の危険物の最大数量が100kLの屋外タンク貯蔵所", "危険物を移送するための配管の延長が20kmの移送取扱所", "指定数量の倍数が100の製造所", "指定数量の倍数が100の屋外貯蔵所", "指定数量の倍数が3000の一般取扱所"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "配管の延長が一定以上の移送取扱所は、保安検査の対象となります。", "source": "法令3.pdf p.16", "status": "OK"}, {"id": "law3-030", "originalId": "", "genreLabel": "法令3", "subCategory": "保安検査", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、市町村長等が行う保安に関する検査の対象となる製造所等として、次のうち正しいものはどれか。", "options": ["すべての移動タンク貯蔵所", "貯蔵する液体の危険物の最大数量が10,000kL以上の特定屋外タンク貯蔵所", "指定数量の倍数が100以上の製造所", "指定数量の倍数が100以上の屋外貯蔵所", "すべての移送取扱所"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "液体危険物を大量に貯蔵する特定屋外タンク貯蔵所は、保安検査の対象となります。", "source": "法令3.pdf p.16", "status": "OK"}, {"id": "law3-031", "originalId": "", "genreLabel": "法令3", "subCategory": "保安検査", "difficulty": 2, "type": "対象とならない組み合わせを選べ", "question": "法令上、市町村長等が行う保安に関する検査の対象とならない製造所等の組み合わせは次のうちどれか。\n\nA. 指定数量の倍数が100の製造所\nB. 危険物を移送するための配管の延長が20kmの移送取扱所\nC. 指定数量の倍数が100の屋外貯蔵所\nD. 指定数量の倍数が3,000の一般取扱所\nE. 貯蔵する液体の危険物の最大数量が10,000kLの屋外タンク貯蔵所", "options": ["A、B、C", "A、C、D", "A、D、E", "B、C、E", "C、D、E"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "保安検査の対象となるのは、一定規模以上の特定屋外タンク貯蔵所や一定の移送取扱所などです。A、C、Dは対象外です。", "source": "法令3.pdf p.16", "status": "OK"}, {"id": "law3-032", "originalId": "", "genreLabel": "法令3", "subCategory": "保安距離", "difficulty": 2, "type": "適合していないものを選べ", "question": "法令上、製造所等の位置は、学校、病院等の建築物等から、当該製造所等の外壁又はこれに相当する工作物の外側までの間に、それぞれ定められた距離（保安距離）を保たなければならないが、その距離として、次のうち法令に適合していないものはどれか。ただし、当該建築物等との間に防火上有効な塀はないものとし、特例基準が適用されるものを除く。", "options": ["製造所の存する敷地の外にある住居から10m", "中学校から20m", "重要文化財に指定された建造物から60m", "高圧ガス保安法により都道府県知事の許可を受けた貯蔵所から30m", "病院から40m"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "学校、病院、劇場等からは30m以上の保安距離が必要です。中学校から20mでは不足します。", "source": "法令3.pdf p.17", "status": "OK"}, {"id": "law3-033", "originalId": "", "genreLabel": "法令3", "subCategory": "保安距離", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等の中には、特定の建築物等から一定の距離（保安距離）を保たなければならないものがあるが、その建築物等として次のうち正しいものはどれか。", "options": ["大学、短期大学", "病院", "使用電圧が7,000Vの特別高圧埋設電線", "重要文化財である絵画を保管する倉庫", "製造所等の存する敷地と同一の敷地内に存する住居"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "病院は保安距離を保つべき建築物等に該当します。大学・短期大学、埋設電線、重要文化財である絵画を保管する倉庫、同一敷地内の住居は、この問題の選択肢では該当しません。", "source": "法令3.pdf p.17", "status": "OK"}, {"id": "law3-034", "originalId": "", "genreLabel": "法令3", "subCategory": "保安距離", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、学校、病院等の建築物等から、当該製造所の外壁又はこれに相当する工作物の外側までの間に、それぞれ定められた距離（保安距離）を保たなければならない製造所等と建築物等の組み合わせとして、次のうち正しいものはどれか。ただし、当該建築物等との間に防火上有効な塀はないものとし、特例基準が適用されるものを除く。", "options": ["屋内タンク貯蔵所｜使用電圧66,000Vの特別高圧架空電線", "給油取扱所｜重要文化財として指定された建造物", "屋外貯蔵所｜屋外貯蔵所の存する敷地内にある住居", "一般取扱所｜幼稚園", "地下タンク貯蔵所｜高圧ガス保安法により都道府県知事の許可を受けた貯蔵所"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "一般取扱所は保安距離が必要な製造所等に含まれ、幼稚園等の学校・病院・劇場等は保安距離の対象となります。", "source": "法令3.pdf p.18", "status": "OK"}, {"id": "law3-035", "originalId": "", "genreLabel": "法令3", "subCategory": "保安距離対象施設", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等のうち、学校及び病院等の建築物等から一定の距離（保安距離）を保たなければならない旨の規定が設けられていない施設は、次のうちどれか。ただし、防火上有効な塀等はないものとし、特例基準が適用されるものを除く。", "options": ["給油取扱所", "一般取扱所", "屋外タンク貯蔵所", "屋外貯蔵所", "製造所"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "給油取扱所は、この保安距離の規定が設けられていない施設です。", "source": "法令3.pdf p.19", "status": "OK"}, {"id": "law3-036", "originalId": "", "genreLabel": "法令3", "subCategory": "保安距離対象物", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、特定の建築物等から一定の距離（保安距離）を保たなければならない製造所等があるが、次のA〜Eのうち、その建築物等に該当するもののみをすべて掲げているものはどれか。\n\nA. 重要文化財を保管する倉庫\nB. 22,000Vの特別高圧架空電線\nC. 大学\nD. 病院\nE. 収容人員300人の劇場", "options": ["A、B", "C、D", "A、C、E", "B、D、E", "A、B、C、E"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "22,000Vの特別高圧架空電線、病院、劇場は保安距離の対象となる建築物等です。重要文化財を保管する倉庫や大学は、この問題では対象外です。", "source": "法令3.pdf p.19-20", "status": "OK"}, {"id": "law3-037", "originalId": "", "genreLabel": "法令3", "subCategory": "保安距離対象施設", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等の外壁又はこれに相当する工作物の外側から、学校、病院等の建築物等までの間に、それぞれ定められた距離（保安距離）を保たなければならない製造所等は、次のうちどれか。ただし、当該建築物等との間に防火上有効な塀はないものとする。", "options": ["1,000kL以上の液体の危険物を貯蔵する屋外タンク貯蔵所", "メタノール等を取り扱う屋外給油取扱所", "引火点が40℃以上の第4類の危険物のみを貯蔵し、又は取り扱うもので、タンク専用室を平家建以外の建築物に設ける屋内タンク貯蔵所", "屋内貯蔵所の用に供する部分以外の部分を有する建築物に設ける指定数量の倍数が20以下の危険物を貯蔵する屋内貯蔵所", "指定数量の倍数が30の危険物を取り扱う第二種販売取扱所"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "屋外タンク貯蔵所は保安距離を保たなければならない製造所等に該当します。", "source": "法令3.pdf p.19-20", "status": "OK"}, {"id": "law3-038", "originalId": "", "genreLabel": "法令3", "subCategory": "保有空地", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、危険物を取り扱う建築物等の周囲に、一定の幅の空地を保有しなければならない旨の規定が設けられている製造所等のみを掲げている組み合わせは、次のうちどれか。", "options": ["販売取扱所｜給油取扱所｜屋外貯蔵所", "地下タンク貯蔵所｜屋内タンク貯蔵所｜製造所", "屋内タンク貯蔵所｜屋内貯蔵所｜販売取扱所", "一般取扱所｜屋外貯蔵所｜屋内貯蔵所", "給油取扱所｜製造所｜簡易タンク貯蔵所"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "一般取扱所、屋外貯蔵所、屋内貯蔵所はいずれも、一定の幅の保有空地が必要となる施設に該当します。", "source": "法令3.pdf p.21", "status": "OK"}, {"id": "law3-039", "originalId": "", "genreLabel": "法令3", "subCategory": "保有空地", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、製造所において、次のA〜Eの指定数量の倍数に応じて、必要な空地の幅を満たしているものの組合せはどれか。ただし、高引火点危険物のみ取り扱うもの及び規則で定める防火上有効な隔壁を設けたものを除く。\n\nA. 指定数量の倍数3｜空地の幅1m\nB. 指定数量の倍数5｜空地の幅2m\nC. 指定数量の倍数7｜空地の幅3m\nD. 指定数量の倍数11｜空地の幅3m\nE. 指定数量の倍数15｜空地の幅5m", "options": ["AとC", "AとD", "BとD", "BとE", "CとE"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "製造所の保有空地は、指定数量の倍数が10以下なら3m以上、10を超えると5m以上が原則です。CとEが条件を満たします。", "source": "法令3.pdf p.22", "status": "OK"}, {"id": "law3-040", "originalId": "", "genreLabel": "法令3", "subCategory": "保有空地", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等において、危険物を貯蔵し、又は取り扱う建築物等の周囲に保有しなければならない空地の幅について、次のうち正しいものはどれか。", "options": ["屋外貯蔵所の空地の幅は、貯蔵する危険物の類に応じて定められている。", "屋内貯蔵所の空地の幅は、軒高に応じて定められている。", "一般取扱所の空地の幅は、取り扱う危険物の品名に応じて定められている。", "製造所の空地の幅は、取り扱う危険物の指定数量の倍数に応じて定められている。", "屋外タンク貯蔵所の空地の幅は、屋外貯蔵タンクの容量に応じて定められている。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "製造所の保有空地の幅は、取り扱う危険物の指定数量の倍数に応じて定められています。", "source": "法令3.pdf p.22", "status": "OK"}, {"id": "carry-law3-001", "originalId": "", "genreLabel": "法令3続き", "subCategory": "保有空地・ページまたぎ回収", "difficulty": 2, "type": "設けられていないものを選べ", "question": "法令上、次に掲げる製造所等のうち、危険物を取り扱う建築物の周囲に、一定の幅の空地を保有しなければならない旨の規定が設けられていないものはどれか。", "options": ["屋内貯蔵所", "屋内タンク貯蔵所", "屋外貯蔵所", "屋外タンク貯蔵所", "簡易タンク貯蔵所（屋外に設けるもの）"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "屋内タンク貯蔵所には、危険物を取り扱う建築物の周囲に一定幅の空地を保有する旨の規定はありません。屋内貯蔵所・屋外貯蔵所・屋外タンク貯蔵所・屋外設置の簡易タンク貯蔵所には保有空地等の規定があります。", "source": "法令4.pdf p.1（法令3からのページまたぎ）", "status": "OK"}, {"id": "law4-001", "originalId": "92", "genreLabel": "法令4", "subCategory": "保安距離③組み合わせ", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、学校、病院等の建築物等から、当該製造所の外壁又はこれに相当する工作物の外側までの間に、それぞれ定められた距離（保安距離）を保たなければならない製造所等と建築物等の組み合わせとして、次のうち正しいものはどれか。", "options": ["屋内タンク貯蔵所　／　使用電圧66,000Vの特別高圧架空電線", "給油取扱所　／　重要文化財として指定された建造物", "屋外貯蔵所　／　屋外貯蔵所の存する敷地内にある住居", "一般取扱所　／　幼稚園", "地下タンク貯蔵所　／　高圧ガス保安法により都道府県知事の許可を受けた貯蔵所"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "保安距離が必要な施設：製造所・屋外タンク貯蔵所・屋内貯蔵所・屋外貯蔵所・一般取扱所の5種類。一般取扱所は保安距離が必要で、幼稚園は学校に含まれ保安距離の対象です。給油取扱所・地下タンク貯蔵所・屋内タンク貯蔵所には保安距離の規定はありません。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-002", "originalId": "93", "genreLabel": "法令4", "subCategory": "製造所の技術基準①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。ただし、当該建築物等との間に防火上有効な塀は無いものとし、特例基準が適用されるものを除く。", "options": ["製造所の位置は、学校や病院等の建築物等から当該製造所の外壁又はこれに相当する工作物の外側までの間に、それぞれ当該建築物等について定める距離を保つこと。", "危険物を取り扱う建築物その他の工作物（危険物を移送するための配管その他これに準ずる工作物を除く。）の周囲に、指定数量の倍数に応じそれぞれ定める幅の空地を保有すること。", "危険物を取り扱う建築物の窓又は出入口にガラスを用いる場合は、網入りガラスとすること。", "可燃性の蒸気又は可燃性の微粉が滞留するおそれのある建築物には、床面に側溝を設け、その蒸気又は微粉を屋外の低所に排出する設備を設けること。", "危険物を取り扱うにあたって静電気が発生するおそれのある設備には、当該設備に蓄積される静電気を有効に除去する装置を設けること。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "可燃性蒸気・微粉が滞留するおそれのある建築物には、床面に側溝を設けて「屋外の低所」ではなく「屋外の高所」に排出する設備が必要です。低所では蒸気が滞留する危険があります。よって選択肢4が誤りです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-003", "originalId": "94", "genreLabel": "法令4", "subCategory": "製造所の技術基準②正しいもの", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所の位置、構造及び設備の技術上の基準について、次のうち正しいものはどれか。ただし、特例基準が適用されるものを除く。", "options": ["危険物を取り扱う建築物は、地階を有することができる。", "危険物を取り扱う建築物の延焼のおそれのある部分以外の窓にガラスを用いている場合は、網入りガラスにしないことができる。", "指定数量の倍数が５以上の製造所には、周囲の状況によって安全上支障がない場合を除き、規則で定める避雷設備を設けなければならない。", "危険物を取り扱う建築物の壁及び屋根は、耐火構造とするとともに、天井を設けなければならない。", "電動機及び危険物を取り扱う設備のポンプ、弁、接手等は、火災の予防上支障のない位置に取り付けなければならない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "電動機及び危険物を取り扱う設備のポンプ・弁・接手等は「火災の予防上支障のない位置」に取り付けなければなりません（正しい）。製造所の建築物は地階を有してはなりません（選択肢1誤）。窓にガラスを使う場合は延焼のおそれのある部分に限らず網入りガラス（選択肢2誤）。避雷設備は倍数10以上（選択肢3誤）。屋根は不燃材料で天井は設けてはなりません（選択肢4誤）。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-004", "originalId": "95", "genreLabel": "法令4", "subCategory": "配管の技術基準①", "difficulty": 2, "type": "定められていないものを選べ", "question": "法令上、製造所の危険物を取り扱う配管について、位置、構造及び設備の技術上の基準に定められていないものは、次のうちどれか。", "options": ["配管は、その設置される条件及び使用される状況に照らして十分な強度を有するものとし、かつ、当該配管に係る最大常用圧力の1.5倍以上の圧力で水圧試験を行ったとき、漏えいその他の異常がないものでなければならない。", "配管を地上に設置する場合には、地盤面に接しないようにするとともに、外面の腐食を防止するための塗装を行わなければならない。", "配管は、取り扱う危険物により容易に劣化するおそれのないものでなければならない。", "配管を地下に設置する場合には、その上部の地盤面を車両等が通行しない位置としなければならない。", "地下の電気的腐食のおそれのある場所に設置する配管にあっては、外面の腐食を防止するための塗覆装またはコーティング及び電気防食を行わなければならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "配管を地下に設置する場合に「車両等が通行しない位置」とする規定はありません。むしろ地下に設置する場合は適切な防護措置を行えば車両通行箇所でも可能です。よって選択肢4が定められていない事項です。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-005", "originalId": "96", "genreLabel": "法令4", "subCategory": "配管の技術基準②誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所において危険物を取り扱う配管の位置、構造及び設備の基準として、次のうち誤っているものはどれか。", "options": ["配管を地下に設置する場合には、配管は接合部分のない構造とすること。", "配管は、火災等による熱によって容易に変形するおそれのないものであること。ただし、当該配管が地下その他の火災等による熱により悪影響を受けるおそれのない場所に設置される場合にあっては、この限りでない。", "配管は、その設置される条件及び使用される状況に照らして十分な強度を有するものであること。", "配管には、外面の腐食を防止するための措置を講ずること。ただし、当該配管が設置される条件の下で腐食するおそれのないものである場合にあっては、この限りでない。", "配管は、取り扱う危険物により容易に劣化するおそれのないものであること。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "配管を地下に設置する場合に「接合部分のない構造」とする規定はありません。地下配管でも接合部分を設けることは可能で、ただし漏れ防止のための適切な措置が必要です。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-006", "originalId": "97", "genreLabel": "法令4", "subCategory": "屋内貯蔵所①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "引火点が70℃未満の第４類の危険物を貯蔵する屋内貯蔵所（独立平家建）の基準として、法令上、誤っているものは次のうちどれか。", "options": ["「屋内貯蔵所」と記載した標識と、「火気厳禁」と記載した注意事項の掲示板を、それぞれ見やすい箇所に掲げなければならない。", "壁、柱及び床を耐火構造とし、はりを不燃材料で造ること。", "窓、出入口にガラスを用いる場合は、網入りガラスとすること。", "貯蔵倉庫には、採光、照明及び換気の設備を設けるとともに、滞留した可燃性蒸気を床下に排出する装置を設けること。", "貯蔵倉庫の床は、危険物が浸透しない構造とするとともに、適当な傾斜をつけ、かつ、貯留設備を設けること。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "可燃性蒸気は「床下」ではなく「屋外の高所（床面より高い位置の外部）」に排出する設備が必要です。床下に排出すると蒸気が床下に滞留し危険です。よって選択肢4が誤りです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-007", "originalId": "98", "genreLabel": "法令4", "subCategory": "屋内貯蔵所②誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "指定数量の倍数が50を超えるガソリンを貯蔵する屋内貯蔵所（高層タイプを除く）の位置、構造及び設備の技術上の基準について、法令上、誤っているものは次のうちどれか。", "options": ["地盤面から軒までの高さが10m未満の平家建とし、床は地盤面より低くしなければならない。", "壁、柱及び床を耐火構造とし、かつ、はりを不燃材料で造らなければならない。", "架台を設ける場合には、不燃材料で造るとともに、堅固な基礎に固定しなければならない。", "床は、危険物が浸透しない構造とし、適当な傾斜を付け、かつ、貯留設備を設けなければならない。", "屋根を不燃材料で造るとともに、金属板等の軽量な不燃材料でふき、かつ、天井を設けてはならない。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "屋内貯蔵所の床は「地盤面より低く」するのではなく「地盤面と同じかそれ以上の高さ」または適切な構造とします。床を地盤面より低くすると危険物が外部から流入する危険があります。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-008", "originalId": "99", "genreLabel": "法令4", "subCategory": "防油堤①容量計算", "difficulty": 1, "type": "正しいものを選べ", "question": "灯油、軽油を貯蔵している３基の屋外貯蔵タンクで、それぞれの容量が10,000L、30,000L、60,000Lのものを同一敷地内に隣接して設置する場合、この３基が共用する防油堤の最低限必要な容量として、法令上、正しいものは次のうちどれか。", "options": ["10,000L", "30,000L", "60,000L", "66,000L", "90,000L"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "防油堤の容量は「防油堤内の最大タンク容量の110%以上」が必要です。最大タンクは60,000Lなので60,000L×110%＝66,000Lが最低限必要な容量です。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-009", "originalId": "100", "genreLabel": "法令4", "subCategory": "防油堤②容量計算", "difficulty": 2, "type": "正しいものを選べ", "question": "製造所等において次の４基の屋外貯蔵タンクを屋外の防油堤の一箇所にまとめて貯蔵する場合、法令上、必要最小限の容量は次のうちどれか。\n\n１号タンク：重油300kL　２号タンク：軽油500kL　３号タンク：ガソリン100kL　４号タンク：灯油200kL", "options": ["100kL", "500kL", "550kL", "800kL", "1,100kL"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "防油堤の容量は「防油堤内の最大タンク容量の110%以上」です。最大タンクは２号タンク（軽油500kL）なので、500kL×110%＝550kLが必要最小限の容量です。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-010", "originalId": "101", "genreLabel": "法令4", "subCategory": "防油堤③設置義務", "difficulty": 1, "type": "正しいものを選べ", "question": "法令上、次の屋外貯蔵タンクのうち、防油堤を設けなければならないものはどれか。", "options": ["液体の危険物（二硫化炭素を除く）を貯蔵するすべての屋外タンク貯蔵所", "第４類の危険物のみを貯蔵する屋外タンク貯蔵所", "引火点を有する危険物のみを貯蔵する屋外タンク貯蔵所", "第４類の危険物で、引火点の低い危険物のみを貯蔵する屋外タンク貯蔵所", "引火点を有しない危険物のみを貯蔵する屋外タンク貯蔵所"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "防油堤は「液体の危険物（二硫化炭素を除く）を貯蔵する屋外タンク貯蔵所」に設けなければなりません。二硫化炭素は水没貯蔵のため除外されています。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-011", "originalId": "102", "genreLabel": "法令4", "subCategory": "防油堤④基準の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、液体の危険物（二硫化炭素を除く。）を貯蔵する屋外タンク貯蔵所の防油堤の基準について、次のうち誤っているものはどれか。", "options": ["防油堤の高さは、0.5m以上としなければならない。", "防油堤は、鉄筋コンクリート又は土で造り、かつ、その中に収納された危険物が当該防油堤の外に流出しない構造としなければならない。", "防油堤の容量は、当該タンク容量の100%以上とし、２以上の屋外貯蔵タンクの周囲に設ける防油堤の容量は、屋外貯蔵タンクの容量の合計の110%以上としなければならない。", "防油堤には、その内部の滞水を外部に排出するための水抜口を設けなければならない。", "高さが1mを超える防油堤には、おおむね30mごとに堤内に出入りするための階段を設置し、又は土砂の盛上げ等を行わなければならない。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "選択肢3には2つの誤りがあります。①「100%以上」→正しくは「110%以上」。②「複数タンクは容量の合計の110%以上」→正しくは「最大タンク容量の110%以上」です。単独・複数どちらの場合も基準は「最大タンク容量の110%以上」です。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-012", "originalId": "103", "genreLabel": "法令4", "subCategory": "地下タンク貯蔵所①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、地下タンク貯蔵所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["地下貯蔵タンク（二重殻タンクを除く。）又はその周囲には、当該タンクからの液体の危険物の漏れを検知する設備を設けなければならない。", "地下貯蔵タンクは、外面にさびどめのための塗装をして、地盤面下に直接埋設しなければならない。", "液体の危険物の地下貯蔵タンクの注入口は、屋外に設けなければならない。", "地下貯蔵タンクには、通気管又は安全装置を設けなければならない。", "地下タンク貯蔵所には、見やすい箇所に地下タンク貯蔵所である旨を表示した標識及び防火に関し、必要な事項を掲示した掲示板を設けなければならない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "地下貯蔵タンクは外面にさびどめ塗装をして地盤面下に直接埋設するのではなく、「タンク室に設けるか、地盤面下に直接埋設する場合は腐食防止措置を講じる」必要があります。直接埋設の場合は追加の防護措置が必要です。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-013", "originalId": "104", "genreLabel": "法令4", "subCategory": "地下タンク貯蔵所②誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、地下タンク貯蔵所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["地下タンク貯蔵所には規則で定めるところにより、見やすい箇所に地下タンク貯蔵所である旨を表示した標識及び防火に関し必要な事項を掲示した掲示板を設けなければならない。", "地下貯蔵タンクには、規則で定めるところにより、通気管又は安全装置を設けなければならない。", "液体の危険物の地下貯蔵タンクには、危険物の量を自動的に表示する装置を設けなければならない。", "地下貯蔵タンクの配管は、当該タンクの頂部以外に取り付けなければならない。", "液体の危険物の地下貯蔵タンクの注入口は、屋外に設けなければならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "地下貯蔵タンクの配管は「頂部以外に取り付けてはならない」ではなく「頂部に取り付けなければならない」です。配管を頂部以外（側面や底部など）に設けると危険物が漏洩しやすくなります。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-014", "originalId": "105", "genreLabel": "法令4", "subCategory": "地下タンク貯蔵所③誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、地下タンク貯蔵所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["地下貯蔵タンクの頂部は、0.6m以上地盤面から下にあること。", "地下タンク貯蔵所には、見やすい箇所に地下タンク貯蔵所である旨を表示した標識及び防火に関し必要な事項を掲示した掲示板を設けること。", "一の地下タンク貯蔵所に設置する地下貯蔵タンクは、その数を３以内とし、かつ、同一品質の危険物の地下貯蔵タンクを２以上設置しないこと。", "液体の危険物の地下貯蔵タンクには、危険物の量を自動的に表示する装置を設けること。", "地下貯蔵タンクには、通気管又は安全装置を設けること。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "一の地下タンク貯蔵所に設置できるタンク数は「原則として１基」です。「３以内、同一品質は２以上不可」という規定は誤りです。地下タンク貯蔵所の原則は１施設１タンクです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-015", "originalId": "106", "genreLabel": "法令4", "subCategory": "屋内タンク貯蔵所①正しいもの", "difficulty": 1, "type": "正しいものを選べ", "question": "法令上、平家建としなければならない屋内タンク貯蔵所の位置、構造及び設備の技術上の基準について、次のうち正しいものはどれか。", "options": ["タンク専用室の窓又は出入口にガラスを用いる場合は、網入りガラスにしなければならない。", "屋内貯蔵タンクには、容量制限が定められていない。", "屋内貯蔵タンクは建物内に設置されるため、タンクの外面にはさびどめのための塗装をしないことができる。", "タンク専用室の出入口のしきいは、床面と段差が生じないように設けなければならない。", "第２石油類の危険物を貯蔵するタンク専用室には、不燃材料で造った天井を設けることができる。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "タンク専用室の窓・出入口にガラスを用いる場合は網入りガラスとしなければなりません（正しい）。屋内貯蔵タンクには容量制限あり（選択肢2誤）。外面にはさびどめ塗装が必要（選択肢3誤）。出入口のしきいは段差を設けなければならない（選択肢4誤）。天井は設けてはならない（選択肢5誤）。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-016", "originalId": "107", "genreLabel": "法令4", "subCategory": "屋内タンク貯蔵所②誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、屋内タンク貯蔵所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。ただし、タンク専用室を平家建以外の建築物に設けるものを除く。", "options": ["液体の危険物の屋内貯蔵タンクには、危険物の量を自動的に表示する装置を設けなければならない。", "引火点が40℃以上の第４類の危険物のみを貯蔵する場合、屋内貯蔵タンクの容量の上限は30,000Lである。", "タンク専用室の壁との間及び同一のタンク専用室内に屋内貯蔵タンクを２以上設置する場合は、それらのタンクの相互間に0.5m以上の間隔を保つこと。", "タンク専用室の窓または出入口にガラスを用いる場合は、網入りガラスとしなければならない。", "タンク専用室は、屋根を不燃材料で造り、かつ、天井を設けないこと。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "引火点40℃以上の第４類危険物のみを貯蔵する屋内貯蔵タンクの容量制限は「20,000L以下」です。30,000Lという数値は誤りです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-017", "originalId": "108", "genreLabel": "法令4", "subCategory": "タンクの容量制限", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、危険物を貯蔵し、又は取り扱うタンクの容量制限について、次のうち正しいものはどれか。", "options": ["第２石油類を貯蔵する屋内タンク貯蔵所の屋内貯蔵タンクの容量制限は、20,000L以下である。", "第３石油類を貯蔵する地下タンク貯蔵所の地下貯蔵タンクの容量制限は、50,000L以下である。", "第２石油類を貯蔵する簡易タンク貯蔵所の簡易貯蔵タンクの容量制限は、1,000L以下である。", "第１石油類を貯蔵する屋外タンク貯蔵所の屋外貯蔵タンクの容量制限は、10,000L以下である。", "アルコール類を貯蔵する移動タンク貯蔵所の移動貯蔵タンクの容量制限は、6,000L以下である。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "第２石油類を貯蔵する屋内タンク貯蔵所の容量上限は20,000Lです（正しい）。地下タンクに容量制限はない（選択肢2誤）。簡易タンクの容量制限は600L以下（選択肢3誤）。屋外貯蔵タンクの容量制限は種別ごとではなく規模による（選択肢4誤）。移動タンクは30,000L以下（選択肢5誤）。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-018", "originalId": "109", "genreLabel": "法令4", "subCategory": "容量上限なしの施設", "difficulty": 1, "type": "上限が定められていないものを選べ", "question": "法令上、貯蔵し、または取り扱う危険物の数量または指定数量の倍数に上限が定められていないものは、次のうちどれか。", "options": ["屋内タンク貯蔵所", "地下タンク貯蔵所", "簡易タンク貯蔵所", "移動タンク貯蔵所", "第一種販売取扱所"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "地下タンク貯蔵所の地下貯蔵タンクには容量の上限規定がありません。屋内タンク貯蔵所（種別に応じた上限）、簡易タンク貯蔵所（600L以下）、移動タンク貯蔵所（30,000L以下）、第一種販売取扱所（倍数15以下）にはそれぞれ上限があります。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-019", "originalId": "110", "genreLabel": "法令4", "subCategory": "簡易タンク貯蔵所①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、簡易タンク貯蔵所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["１つの簡易タンク貯蔵所には、同一品質の危険物の簡易貯蔵タンクを３基まで設けることができる。", "屋外に簡易貯蔵タンクを設ける場合は、当該タンクの周囲に１m以上の幅の空地を保有しなければならない。", "簡易貯蔵タンクの容量は、600L以下としなければならない。", "簡易貯蔵タンクは、厚さ3.2mm以上の鋼板で気密に造るとともに、70kPaの圧力で10分間行う水圧試験において、漏れや変形がないものでなければならない。", "簡易貯蔵タンクには、外面にさびどめの塗装をし、通気管を設けなければならない。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "簡易タンク貯蔵所には同一品質の簡易貯蔵タンクを「２基以上設置してはならない」という規定があります。全体で３基まで設けられますが、同一品質は１基のみです。「３基まで」という記述自体は正しいですが、「同一品質を３基まで」は誤りです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-020", "originalId": "111", "genreLabel": "法令4", "subCategory": "簡易タンク貯蔵所②誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、簡易タンク貯蔵所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["簡易貯蔵タンクは、容易な移動を防ぐため、地盤面、架台等に固定するとともに、タンク専用室に設ける場合は、タンクと専用室の壁との間に0.5m以上の間隔を保たなければならない。", "ひとつの簡易タンク貯蔵所に設置する簡易貯蔵タンクは、３基までとし、同一品質の危険物は２以上設置してはならない。", "簡易貯蔵タンクは、さびを防ぐためその表面を塗装しなければならない。", "簡易タンク貯蔵所は、簡易タンク貯蔵所である旨を表示した標識及び防火に関する必要な事項を掲示した掲示板を設置しなければならない。", "第４類の危険物を貯蔵した簡易貯蔵タンクのうち、圧力タンク以外の屋外に設置した簡易貯蔵タンクには、通気管を設ける必要はない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "圧力タンク以外の屋外設置の簡易貯蔵タンクには通気管を設けなければなりません。「設ける必要はない」という記述が誤りです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-021", "originalId": "112", "genreLabel": "法令4", "subCategory": "貯蔵の技術基準", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、危険物の貯蔵の技術上の基準について、次のうち誤っているものはどれか。", "options": ["屋外貯蔵タンクに設けてある防油堤の水抜口は、通常は閉鎖しておかなければならない。", "屋外貯蔵タンクの元弁は、危険物を入れ、又は出すとき以外は、閉鎖しておかなければならない。", "地下貯蔵タンクの計量口は、計量するとき以外は閉鎖しておかなければならない。", "簡易貯蔵タンクの通気管は、危険物を入れ、又は出すとき以外は閉鎖しておかなければならない。", "移動貯蔵タンクの底弁は、使用時以外は閉鎖しておかなければならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "簡易貯蔵タンクの通気管は「常時開放」しておかなければなりません。通気管を閉鎖すると内部圧力が変化してタンクが変形する危険があります。「危険物を入れ、又は出すとき以外は閉鎖」という記述が誤りです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-022", "originalId": "113", "genreLabel": "法令4", "subCategory": "移動タンク貯蔵所①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、移動タンク貯蔵所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["第３種及び第４種の消火設備を移動貯蔵タンクに２個以上設けなければならない。", "移動貯蔵タンクの底弁を閉鎖することができる手動閉鎖装置のレバーは、手前に引き倒すことにより閉鎖装置を作動させるものでなければならない。", "移動貯蔵タンクの外面には、さびどめのための塗装をしなければならない。", "静電気による災害が発生するおそれのある液体の危険物の移動貯蔵タンクには、接地導線を設けなければならない。", "屋外の防火上安全な場所、または壁、床、はり及び屋根を耐火構造とし、若しくは不燃材料で造った建築物の１階に常置しなければならない。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "移動タンク貯蔵所に設ける消火設備は「第４種（自動車用消火器等）及び第５種（小型消火器）の消火設備」を設けなければなりません。「第３種及び第４種」という記述が誤りです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-023", "originalId": "114", "genreLabel": "法令4", "subCategory": "移動タンク貯蔵所②誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、移動タンク貯蔵所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。ただし、特例基準が適用されるものを除く。", "options": ["屋外の防火上安全な場所、または壁、床、はり及び屋根を耐火構造とし、もしくは不燃材料で造った建築物の１階に常置しなければならない。", "移動貯蔵タンクの配管は、先端部に弁等を設けなければならない。", "静電気による災害が発生するおそれのある液体の危険物の移動貯蔵タンクには、接地導線を設けなければならない。", "移動貯蔵タンクの底弁手動閉鎖装置のレバーは、手前に引き倒すことにより閉鎖装置を作動させるものでなければならない。", "移動貯蔵タンクの容量は、10,000L以下としなければならない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "移動貯蔵タンクの容量制限は「30,000L以下」です。10,000Lという数値は誤りです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-024", "originalId": "115", "genreLabel": "法令4", "subCategory": "移動タンク貯蔵所③備付書類", "difficulty": 1, "type": "正しいものを選べ", "question": "法令上、移動タンク貯蔵所に備え付けておかなければならない書類は、次のＡ〜Ｅのうちいくつあるか。\n\nＡ．完成検査済証　Ｂ．予防規程　Ｃ．製造所等の譲渡引渡届出書　Ｄ．危険物施設保安員選任・解任届出書　Ｅ．貯蔵する危険物の品名、数量又は指定数量の倍数変更の届出書", "options": ["１つ", "２つ", "３つ", "４つ", "５つ"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "移動タンク貯蔵所に備え付けが必要な書類は「完成検査済証」のみです（Ａのみ）。予防規程は移動タンク貯蔵所には不要、その他の書類も備え付け義務はありません。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-025", "originalId": "116", "genreLabel": "法令4", "subCategory": "移動タンク貯蔵所④移送基準", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、移動タンク貯蔵所による危険物の移送、貯蔵及び取扱いの基準について、次のうち正しいものはどれか。", "options": ["移動貯蔵タンクから重油を容器に詰め替えてはならない。", "定期的に危険物を移送する場合は、移送経路その他必要な事項を事前に、経路を管轄する消防署に届け出なければならない。", "すべての移動貯蔵タンクには、接地導線を設けなければならない。", "移動貯蔵タンクの底弁その他の弁、マンホール及び注入口のふた、消火器等の点検は、移送の終了後に行わなければならない。", "移動タンク貯蔵所には完成検査済証及び定期点検記録等を備え付けておかなければならない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "移動タンク貯蔵所には「完成検査済証」及び「定期点検記録等」を備え付けておかなければなりません（正しい）。重油は容器への詰め替え可（選択肢1誤）。移送前の届出は不要（選択肢2誤）。接地導線は静電気のおそれのある液体危険物タンクのみ（選択肢3誤）。点検は移送開始前（選択肢4誤）。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-026", "originalId": "117", "genreLabel": "法令4", "subCategory": "移動タンク貯蔵所⑤引火点温度", "difficulty": 2, "type": "当てはまるものを選べ", "question": "危険物の取扱いの技術上の基準について、次の文の（　）内に当てはまる法令に定められている温度はどれか。\n\n「移動貯蔵タンクから危険物を貯蔵し、又は取り扱うタンクに引火点が（　）の危険物を注入するときは、移動タンク貯蔵所の原動機を停止させること。」", "options": ["30℃未満", "35℃未満", "40℃未満", "45℃未満", "50℃未満"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "引火点が「40℃未満」の危険物を注入するときは移動タンク貯蔵所の原動機を停止させなければなりません。これは法令で定められた基準です。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-027", "originalId": "118", "genreLabel": "法令4", "subCategory": "移動タンク貯蔵所⑥移送規制", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、移動タンク貯蔵所によるガソリンの移送、貯蔵及び取扱いについて、次のうち誤っているものはどれか。", "options": ["移動貯蔵タンクから危険物を貯蔵し、又は取り扱うタンクに危険物を注入するときは、注入ホースを注入口に緊結すること。", "移動貯蔵タンクから直接容器に詰め替えてはならない。", "移動貯蔵タンクから、危険物を貯蔵し、又は取り扱うタンクに注入するときは、移動タンク貯蔵所の原動機を停止しなければならない。", "移動貯蔵タンクにその上部から注入する場合、注入管を用いるとともに、当該注入管の先端を移動貯蔵タンクの上部のマンホールに固定しなければならない。", "静電気による災害が発生するおそれのある液体の危険物を移動貯蔵タンクに入れ、又は移動貯蔵タンクから出すときは、当該移動貯蔵タンクを接地しなければならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "選択肢4「移動貯蔵タンクにその上部から注入する場合、注入管の先端をマンホールに固定しなければならない」が誤りです。上部から注入する場合、注入管の先端はマンホールではなく「タンクの底部付近まで延ばして底部近くから注入する」ことが求められます（静電気による引火防止）。選択肢3（引火点40℃未満の危険物注入時に原動機停止）は正しい記述です。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-028", "originalId": "119", "genreLabel": "法令4", "subCategory": "移送時の免状携帯義務", "difficulty": 1, "type": "携帯義務があるものを選べ", "question": "法令上、危険物取扱者がその免状に指定された危険物の取扱作業に従事している場合、免状の携帯が義務付けられているものは、次のうちどれか。", "options": ["製造所等で、危険物取扱者でない者の危険物の取扱いに立ち会っている場合", "指定数量以上の危険物を車両で運搬している場合", "製造所等で、定期点検の実施又は立会いをしている場合", "危険物保安監督者として選任され、製造所等で危険物を取り扱っている場合", "危険物の移送のため、移動タンク貯蔵所に乗車している場合"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "危険物取扱者の免状携帯が義務付けられているのは「危険物の移送のため移動タンク貯蔵所に乗車しているとき」のみです。他の作業（立会い、点検、通常の取扱い等）では携帯義務はありません。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-029", "originalId": "120", "genreLabel": "法令4", "subCategory": "移動タンク移送の正しいもの", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、危険物の移送について、次のうち正しいものはどれか。", "options": ["危険物を移送するために移動タンク貯蔵所に乗車している危険物取扱者の免状は、当該移動タンク貯蔵所の常置場所に保管しておかなければならない。", "移動タンク貯蔵所で危険物を移送する者は、移動貯蔵タンクの底弁その他の弁、マンホール及び注入口のふた、消火器等の点検を１か月に１回以上行わなければならない。", "消防吏員又は警察官は、火災の防止のため特に必要と認める場合、走行する移動タンク貯蔵所を停止させることができる。", "移動タンク貯蔵所を休憩等のため一時停止させるときは、最寄りの消防署に通報しなければならない。", "移動タンク貯蔵所で危険物を移送する者は、10日前までにその計画を所轄消防署長に届け出なければならない。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "消防吏員又は警察官は、火災の防止のため特に必要と認める場合、走行する移動タンク貯蔵所を停止させ、乗車している危険物取扱者に対し免状の提示を求めることができます（正しい）。免状は乗車中に携帯（選択肢1誤）。点検は移送開始前（選択肢2誤）。一時停止の通報義務なし（選択肢4誤）。届出義務なし（選択肢5誤）。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law4-030", "originalId": "121", "genreLabel": "法令4", "subCategory": "屋外貯蔵所①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、第４類の危険物のうちアルコール類のみを貯蔵し、又は取り扱う屋外貯蔵所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["架台を設ける場合は、不燃材料で造るとともに、堅固な地盤面に固定すること。", "屋外貯蔵所は、湿潤でなく、かつ、排水のよい場所に設置すること。", "架台は、架台及びその附属設備の自重、貯蔵する危険物の重量、風荷重、地震の影響等の荷重によって生じる応力に対して安全なものであること。", "屋外貯蔵所の柵等の周囲には、指定数量の倍数にかかわらず、２mの幅の空地（保安空地）を保有すること。", "架台には、危険物を収納した容器が容易に落下しない措置を講ずること。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "架台を設ける場合の固定先は「堅固な地盤面」ではなく「堅固な基礎」です。地盤面に固定するという記述が誤りです。", "source": "法令4.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "carry-law4-001", "originalId": "", "genreLabel": "法令4続き", "subCategory": "給油取扱所・顧客給油", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、顧客に自ら給油等をさせる給油取扱所の取扱いの技術上の基準について、次のうち誤っているものはどれか。", "options": ["顧客用固定給油設備を使用して、顧客に自ら自動車等に給油させることができる。", "顧客用固定給油設備を使用して、ガソリンを運搬容器に詰め替えさせることはできない。", "顧客用固定注油設備を使用して、移動貯蔵タンクに軽油を注入させることはできない。", "顧客用固定給油設備以外の固定給油設備を使用して、顧客に自ら自動車等に給油させることはできない。", "顧客用固定給油設備を用いた顧客の給油作業に対し、監視及び必要な指示を行う必要はない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "セルフ式給油取扱所では、顧客の給油作業に対して監視及び必要な指示を行う必要があります。したがって5が誤りです。", "source": "法令5.pdf p.1（法令4からのページまたぎ）", "status": "OK"}, {"id": "carry-law4-002", "originalId": "", "genreLabel": "法令4続き", "subCategory": "給油取扱所・顧客給油", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、顧客に自ら自動車等に給油等をさせる給油取扱所の取扱いの技術上の基準について、次のうち誤っているものはどれか。", "options": ["顧客用固定給油設備以外の固定給油設備を使用して、顧客自らによる給油を行わせることができる。", "顧客用固定給油設備の1回の給油量及び給油時間の上限を、それぞれ顧客の1回あたりの給油量及び給油時間を勘案して、適正な数値を設定しなければならない。", "顧客の給油作業が開始されるときは、火気のないこと、その他安全上支障のないことを確認した上で、制御装置を用いてホース機器への危険物の供給を開始し、顧客の給油作業が行える状態にしなければならない。", "制御卓で、顧客の給油作業を直視等により、適切に監視しなければならない。", "顧客の給油作業が終了したときは、制御装置を用いてホース機器への危険物の供給を停止し、顧客が給油作業を行えない状態にしなければならない。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "顧客に自ら給油させる場合は、顧客用固定給油設備を使用します。顧客用固定給油設備以外を使用して顧客に給油させることはできません。", "source": "法令5.pdf p.1（法令4からのページまたぎ）", "status": "OK"}, {"id": "law5-001", "originalId": "122", "genreLabel": "法令5", "subCategory": "屋外貯蔵所②穴埋め", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次の文の（　）内のＡとＢに当てはまる語句の組み合わせとして、正しいものはどれか。\n\n「屋外貯蔵所とは、屋外の場所において第２類の危険物のうち（Ａ）もしくは引火性固体（引火点が0℃以上のものに限る）または第４類の危険物のうち第１石油類（引火点が0℃以上のものに限る）、（Ｂ）、第２石油類、第３石油類、第４石油類、動植物油類を貯蔵し、または取り扱う貯蔵所をいう。」", "options": ["A：硫化リン　B：特殊引火物", "A：鉄粉　B：アルコール類", "A：硫黄　B：アルコール類", "A：鉄粉　B：特殊引火物", "A：赤リン　B：アルコール類"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "屋外貯蔵所で貯蔵できる第２類危険物は「硫黄（Ａ）」と「引火性固体（引火点0℃以上）」です。第４類はアルコール類（Ｂ）と第1〜4石油類（引火点0℃以上）・動植物油類です。特殊引火物は屋外貯蔵所では貯蔵不可です。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-002", "originalId": "123", "genreLabel": "法令5", "subCategory": "屋外貯蔵所③貯蔵できる危険物", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、屋外貯蔵所において貯蔵し、または取り扱うことができる危険物の組み合わせとして、次のうち正しいものはどれか。", "options": ["炭化カルシウム　鉄粉　灯油", "硫黄　灯油　重油", "アセトン　灯油　エタノール", "黄リン　カリウム　ギヤー油", "過酸化水素　クレオソート油　シリンダー油"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "屋外貯蔵所で貯蔵できる危険物：第２類の硫黄・引火性固体（引火点0℃以上）、第４類の第１石油類（引火点0℃以上）・アルコール類・第２〜４石油類・動植物油類。硫黄（第２類）・灯油（第２石油類）・重油（第３石油類）はすべて該当し正しい組み合わせです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-003", "originalId": "124", "genreLabel": "法令5", "subCategory": "屋外貯蔵所④貯蔵できない危険物", "difficulty": 1, "type": "貯蔵できないものを選べ", "question": "法令上、屋外貯蔵所で貯蔵できない危険物は次のうちどれか。", "options": ["硫黄", "アルコール類", "引火性固体（引火点が0℃以上のもの）", "第２石油類", "黄リン"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "黄リン（第３類危険物）は屋外貯蔵所で貯蔵できません。屋外貯蔵所で貯蔵できるのは第２類の硫黄・引火性固体（引火点0℃以上）と第４類の一部（特殊引火物・第１石油類の一部を除く）のみです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-004", "originalId": "125", "genreLabel": "法令5", "subCategory": "給油取扱所①給油空地の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "法令上、給油取扱所の給油空地について、次のうち誤っているものはどれか。ただし、特例基準が適用されるものを除く。", "options": ["自動車等が安全かつ円滑に出入りすることができる幅で、道路に面していなければならない。", "自動車等が当該空地からはみ出さずに、安全かつ円滑に通行することができる広さを有していなければならない。", "自動車等が当該空地からはみ出さずに、安全かつ円滑に給油を受けることができる広さを有していなければならない。", "漏れた危険物が流出しないよう、浸透性のあるもので舗装しなければならない。", "耐火性を有するもので舗装しなければならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "給油空地の舗装は「漏れた危険物が浸透・流出しないよう」にするため「浸透性のないもの（耐火性のある不浸透性材料）」で舗装しなければなりません。「浸透性のあるもの」という記述が誤りです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-005", "originalId": "126", "genreLabel": "法令5", "subCategory": "給油取扱所②給油空地の正しいもの", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、給油取扱所の「給油空地」に関する説明として、次のうち正しいものはどれか。", "options": ["給油取扱所の専用タンクに移動貯蔵タンクから危険物を注入するとき、移動タンク貯蔵所が停車するために設けられた空地のことである。", "懸垂式の固定給油設備と道路境界線との間に設けられた幅４m以上の空地のことである。", "固定給油設備のうちホース機器の周囲に設けられた、自動車等に直接給油し、及び給油を受ける自動車等が出入りするための、間口10m以上、奥行6m以上の空地のことである。", "消防活動及び延焼防止のため、給油取扱所の敷地の周囲に設けられた幅3m以上の空地のことである。", "固定注油設備のうちホース機器の周囲に設けられた、4㎡以上の空地のことである。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "給油空地とは「固定給油設備のうちホース機器の周囲に設けられた、自動車等に直接給油し及び給油を受ける自動車等が出入りするための間口10m以上、奥行6m以上の空地」のことです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-006", "originalId": "127", "genreLabel": "法令5", "subCategory": "給油取扱所③技術基準の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、給油取扱所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["給油取扱所には、給油に支障があると認められる設備を設けてはならない。", "給油取扱所は、学校、病院等から30m以上離して設置しなければならない。", "給油取扱所の地盤面下に埋没して設ける専用タンクの容量制限はない。", "「給油中エンジン停止」の掲示板を設けなければならない。", "事務所等の窓又は出入口には、防火設備を設けなければならない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "給油取扱所（取扱所）は保安距離の規定がなく、学校・病院等から30m以上離す義務はありません。保安距離が必要なのは製造所・屋内貯蔵所・屋外タンク貯蔵所・屋外貯蔵所・一般取扱所の5種類です。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-007", "originalId": "128", "genreLabel": "法令5", "subCategory": "給油取扱所④設置できないもの", "difficulty": 2, "type": "設置できないものを選べ", "question": "法令上、給油取扱所に設けることができないものは、次のうちどれか。", "options": ["給油のために出入りする者を対象とした宿泊施設", "給油のために出入りする者を対象とした物品販売場", "自動車等の点検・整備を行う作業場", "給油のために出入りする者を対象とした飲食店", "給油取扱所の管理者が居住する住居"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "給油取扱所に設けることができる附属建築物・設備は、給油・点検・整備・洗車・携行缶販売、及び来客向けの物品販売・飲食・管理者住居などです。「宿泊施設」は給油取扱所に設けることができない施設です。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-008", "originalId": "129", "genreLabel": "法令5", "subCategory": "給油取扱所⑤用語の説明", "difficulty": 2, "type": "正しいものを選べ", "question": "給油取扱所の用語の説明として、次のうち正しいものはどれか。", "options": ["顧客用固定給油設備……顧客に自ら自動車等に給油させるための固定給油設備をいう。", "顧客用固定注油設備……顧客に自ら灯油のみを容器に詰め替えさせるための固定注油設備をいう。", "注油空地……ホース機器の周囲に設けられた、自動車等に直接給油し、及び給油を受ける自動車等が出入りするための、間口10m以上の空地をいう。", "廃油タンク等……容量30,000L以下の廃油タンクその他の総務省令で定めるタンクをいう。", "ポンプ室等……ポンプ室その他危険物を取り扱わない室をいう。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "顧客用固定給油設備とは「顧客に自ら自動車等に給油させるための固定給油設備」です（正しい）。顧客用固定注油設備は灯油・軽油を容器に詰め替えさせる設備（灯油のみではない）。注油空地はホース機器の周囲の空地（給油空地とは別）。ポンプ室等は危険物を取り扱う室です。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-009", "originalId": "130", "genreLabel": "法令5", "subCategory": "給油取扱所⑥セルフ基準の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、顧客に自ら給油等をさせる給油取扱所の取扱いの技術上の基準について、次のうち誤っているものはどれか。", "options": ["顧客用固定給油設備を使用して、顧客に自ら自動車等に給油させることができる。", "顧客用固定給油設備を使用して、ガソリンを運搬容器に詰め替えさせることはできない。", "顧客用固定注油設備を使用して、移動貯蔵タンクに軽油を注入させることはできない。", "顧客用固定給油設備以外の固定給油設備を使用して、顧客に自ら自動車等に給油させることはできない。", "顧客用固定給油設備を用いた顧客の給油作業に対し、監視及び必要な指示を行う必要はない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "セルフスタンドでは「従業員が顧客の給油作業を適切に監視し、必要な指示を行わなければならない」という義務があります。「監視及び必要な指示を行う必要はない」という記述が誤りです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-010", "originalId": "131", "genreLabel": "法令5", "subCategory": "給油取扱所⑦セルフ基準の誤り②", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、顧客に自ら自動車等に給油等をさせる給油取扱所の取扱いの技術上の基準について、次のうち誤っているものはどれか。", "options": ["顧客用固定給油設備以外の固定給油設備を使用して、顧客自らによる給油を行わせることができる。", "顧客用固定給油設備の１回の給油量及び給油時間の上限を、それぞれ顧客の１回あたりの給油量及び給油時間を勘案して、適正な数値を設定しなければならない。", "顧客の給油作業が開始されるときは、火気のないこと、その他安全上支障のないことを確認した上で、制御装置を用いてホース機器への危険物の供給を開始し、顧客の給油作業が行える状態にしなければならない。", "制御卓で、顧客の給油作業を直視等により、適切に監視しなければならない。", "顧客の給油作業が終了したときは、制御装置を用いてホース機器への危険物の供給を停止し、顧客が給油作業を行えない状態にしなければならない。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "顧客用固定給油設備以外の固定給油設備を使用して顧客自らに給油させることはできません。セルフスタンドでも、顧客が使用できるのは「顧客用固定給油設備」のみです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-011", "originalId": "132", "genreLabel": "法令5", "subCategory": "給油取扱所⑧セルフ構造基準の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、顧客に自ら自動車等に給油させる給油取扱所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["当該給油取扱所へ進入する際、見やすい箇所に顧客が自ら給油等を行うことができる旨の表示をしなければならない。", "顧客用固定給油設備は、ガソリン及び軽油相互の誤給油を有効に防止することができる構造としなければならない。", "顧客用固定給油設備の給油ノズルは、自動車等の燃料タンクが満量となったときに給油を自動的に停止する構造としなければならない。", "顧客用固定給油設備には、顧客の運転する自動車等が衝突することを防止するための措置を講じなければならない。", "当該給油取扱所は、建築物内に設置してはならない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "セルフスタンドであっても建築物内（屋内型）に設置することは認められています。「建築物内に設置してはならない」という記述が誤りです。屋内型のセルフスタンドも存在します。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-012", "originalId": "133", "genreLabel": "法令5", "subCategory": "給油取扱所⑨セルフ表示事項", "difficulty": 2, "type": "該当しないものを選べ", "question": "法令上、顧客に自ら給油等をさせる給油取扱所に表示しなければならない事項として、次のうち該当しないものはどれか。", "options": ["顧客が自ら給油等を行うことができる給油取扱所である旨の表示", "自動車等の進入路の表示", "ホース機器等の使用方法の表示", "危険物の品目の表示", "顧客用固定給油設備以外の給油設備には、顧客が自ら用いることができない旨の表示"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "自動車等の進入路の表示はセルフスタンドの表示義務事項ではありません。必要な表示：①セルフスタンドである旨、②ホース機器等の使用方法、③危険物の品目、④顧客用以外の設備は顧客が使えない旨などです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-013", "originalId": "134", "genreLabel": "法令5", "subCategory": "給油取扱所⑩設置できないもの②", "difficulty": 2, "type": "設置できないものの組み合わせを選べ", "question": "次のＡ〜Ｅのうち、法令上、給油取扱所に設けることができないものの組み合わせはどれか。\n\nＡ．灯油又は軽油の詰替えのために出入りする者を対象とした店舗\nＢ．給油のために出入りする者を対象とした展示場\nＣ．灯油又は軽油の詰替えのために出入りする者を対象とした游技場（ゲームセンター）\nＤ．自動車の点検・整備のために出入りする者を対象とした立体駐車場\nＥ．自動車の洗浄のために出入りする者を対象としたレストラン", "options": ["ＡとＢ", "ＢとＣ", "ＣとＤ", "ＤとＥ", "ＡとＥ"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "給油取扱所に設けられない施設：展示場（Ｂ）・遊技場（Ｃ）などの娯楽・集客施設。設けられるのは給油・注油・整備・洗車に関連する施設と来客向けの物品販売・飲食等（ただし展示場・遊技場等は不可）。ＢとＣが設置できない組み合わせです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-014", "originalId": "135", "genreLabel": "法令5", "subCategory": "給油取扱所⑪取扱い基準", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、給油取扱所における危険物の取り扱い等について、次のうち正しいものはどれか。", "options": ["最大容積18Lのプラスチック製の容器に、ガソリンを詰め替えて販売することができる。", "顧客に自ら給油等をさせる給油取扱所（セルフスタンド）において、顧客自らガソリンを詰め替えるときは、法令に適合する容器でなければならない。", "ガソリンを容器に詰め替えて販売するときは、顧客用固定注油設備を使用しなければならない。", "ガソリンを容器に詰め替えて販売するときは、使用目的を確認しなければならない。", "軽油を容器に詰め替えて販売するときは、顧客の本人確認をしなければならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "ガソリンを容器に詰め替えて販売するときは「使用目的を確認」しなければなりません（正しい）。ガソリンの容器詰め替えはプラスチック容器では不可（金属缶等の法適合容器のみ）。セルフスタンドでは顧客自らの容器詰め替えは不可。ガソリン詰め替えは顧客用固定注油設備ではなく固定給油設備等を使用。軽油の本人確認義務はありません。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-015", "originalId": "136", "genreLabel": "法令5", "subCategory": "給油取扱所⑫技術基準に適合しないもの", "difficulty": 2, "type": "適合しないものを選べ", "question": "法令上、給油取扱所（航空機、船舶及び鉄道給油取扱所を除く。）における危険物の取扱いの技術上の基準に適合しないものは、次のうちどれか。", "options": ["自動車に給油するときは、自動車の原動機を停止させなければならない。", "油分離装置にたまった油は、あふれないように随時くみ上げなければならない。", "自動車に給油するときは、固定給油設備を使用して直接給油しなければならない。", "自動車の一部が給油空地からはみ出たままで給油するときは、防火上の細心の注意を払わなければならない。", "自動車の洗浄を行う場合は、引火点を有する液体の洗剤を使用してはならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "自動車が給油空地からはみ出たまま給油することは禁止されています。「防火上の細心の注意を払えば可」という記述が誤りで、はみ出したままでの給油は技術基準に適合しません。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-016", "originalId": "137", "genreLabel": "法令5", "subCategory": "販売取扱所①基準の組み合わせ", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、第一種販売取扱所と第二種販売取扱所の基準について、正しいもののみの組み合わせはどれか。", "options": ["第一種：指定数量の倍数が15以下のものをいう。　第二種：指定数量の倍数が15を超え40以下のものをいう。", "第一種：店舗は建築物の１階または２階に設置できる。　第二種：店舗は建築物の１階に設置すること。", "第一種：危険物は容器入りのまま販売すること。　第二種：危険物は販売室で小分けして販売することができる。", "第一種：窓の位置に関する制限はない。　第二種：延焼のおそれのない部分に限り、窓を設けることができる。", "第一種：危険物を配合する部屋は設けることができない。　第二種：危険物を配合する部屋を設けることができる。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "第一種販売取扱所は指定数量の倍数が15以下、第二種販売取扱所は15を超え40以下のものをいいます。第二種を30以下とする記述は誤りです。第一種・第二種とも販売取扱所は容器入りのまま販売する取扱所で、配合室を設ける場合は所定の基準に適合させる必要があります。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-017", "originalId": "138", "genreLabel": "法令5", "subCategory": "販売取扱所②技術基準", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、第一種販売取扱所の位置、構造及び設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["販売取扱所は、建築物の1階に設置しなければならない。", "販売取扱所の用に供する部分は、壁を準耐火構造とし、販売取扱所の用に供する部分とその他の部分との隔壁は、耐火構造としなければならない。", "販売取扱所の用に供する部分は、はりを不燃材料で造るとともに、天井を設ける場合にあっては、これを不燃材料で造ること。", "販売取扱所の用に供する部分は、上階がある場合にあっては上階の床を耐火構造とし、上階のない場合にあっては屋根を耐火構造とし、または不燃材料でふくこと。", "危険物を配合する室の床は、危険物が浸透しない構造とするとともに、適当な傾斜を付け、かつ、貯留設備を設けること。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "上階がない場合の屋根は「耐火構造」ではなく「防火構造、または不燃材料でふく」が正しい基準です。「耐火構造」という記述が誤りです。他の選択肢（1階設置、壁・隔壁、はり・天井、配合室の床）はすべて正しい技術基準です。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-018", "originalId": "139", "genreLabel": "法令5", "subCategory": "販売取扱所③誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、第一種販売取扱所の位置、構造又は設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["２階に設置する場合は、床及び壁を耐火構造とし、出入口には自動閉鎖の特定防火設備を設けなければならない。", "天井を設ける場合は、不燃材料で造らなければならない。", "窓又は出入口にガラスを用いる場合は、網入りガラスとしなければならない。", "上階のない場合にあっては、屋根を耐火構造又は不燃材料で造らなければならない。", "見やすい箇所に、第一種販売取扱所である旨の標識及び防火に関し必要な事項を掲示した掲示板を設けなければならない。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "第一種販売取扱所は建築物の一階のみに設置できます（二階への設置規定はありません）。「二階に設置する場合は…」という規定自体が存在しないため、選択肢1が誤りです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-019", "originalId": "140", "genreLabel": "法令5", "subCategory": "販売取扱所④第二種の倍数", "difficulty": 1, "type": "当てはまる数値を選べ", "question": "法令上、次の文の（　）内に当てはまる数値として、正しいものはどれか。\n\n「第二種販売取扱所とは、店舗において容器入りのままで販売するため危険物を取り扱う取扱所で、指定数量の倍数が15を超え（　）以下のものをいう。」", "options": ["20", "30", "40", "50", "60"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "第二種販売取扱所は「指定数量の倍数が15を超え40以下」のものをいいます。第一種が15以下、第二種が15超え40以下です。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-020", "originalId": "141", "genreLabel": "法令5", "subCategory": "販売取扱所⑤取扱基準の誤り", "difficulty": 2, "type": "誤っているものの組み合わせを選べ", "question": "法令上、販売取扱所における危険物の取扱いの技術上の基準について、次のＡ〜Ｄのうち誤っているものの組み合わせはどれか。\n\nＡ．第一種販売取扱所では、危険物の配合を行うことはできない。\nＢ．配合することができるのは第１類と第３類の危険物である。\nＣ．販売する量にかかわらず、法令で定める容器等に危険物を収納し、かつ、容器入りのままで販売しなければならない。\nＤ．危険物を配合する室以外の場所で詰替えを行ってはならない。", "options": ["ＡとＢ", "ＡとＤ", "ＢとＣ", "ＢとＤ", "ＣとＤ"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "Ａ（第一種では配合できない）→誤り。第一種販売取扱所でも危険物の配合は認められています（配合室が必要）。Ｂ（配合できるのは第１類と第３類）→誤り。配合できる危険物の種類に第１・第３類のみという限定はありません。ＡとＢが誤りです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-021", "originalId": "142", "genreLabel": "法令5", "subCategory": "販売取扱所⑥取扱基準の正しいもの", "difficulty": 2, "type": "正しいものの組み合わせを選べ", "question": "法令上、販売取扱所における危険物の取扱いの技術上の基準について、次のＡ〜Ｄのうち正しいものを組み合わせたものはどれか。\n\nＡ．危険物を配合する室以外の場所で配合又は詰替えを行うことはできない。\nＢ．危険物は容器入りのままで販売しなければならない。\nＣ．配合することができるのは第１類と第６類の危険物である。\nＤ．第一種販売取扱所では、危険物の配合を行うことはできない。", "options": ["ＡとＢ", "ＡとＤ", "ＢとＣ", "ＢとＤ", "ＣとＤ"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "Ａ（配合・詰替えは配合室のみ）とＢ（容器入りのまま販売）が正しい記述です。Ｃ（第１類と第６類のみ）という限定はなく、Ｄ（第一種では配合不可）も誤りです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-022", "originalId": "143", "genreLabel": "法令5", "subCategory": "標識・掲示板①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等に設ける標識、掲示板について、次のうち誤っているものはどれか。", "options": ["給油取扱所には、「給油中エンジン停止」と表示した掲示板を設けなければならない。", "第４類の危険物を貯蔵する地下タンク貯蔵所には、「取扱注意」と表示した掲示板を設けなければならない。", "第５類の危険物を貯蔵する屋内貯蔵所には、「火気厳禁」と表示した掲示板を設けなければならない。", "灯油を貯蔵する屋内タンク貯蔵所には、危険物の類別、品名及び貯蔵最大数量を表示した掲示板を設けなければならない。", "移動タンク貯蔵所には、「危」と表示した標識を車両の前後の見やすい箇所に設けなければならない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "第４類の危険物を貯蔵する地下タンク貯蔵所の掲示板は「取扱注意」ではなく「火気厳禁」です。第４類危険物（引火性液体）には火気厳禁の掲示が必要です。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-023", "originalId": "144", "genreLabel": "法令5", "subCategory": "標識・掲示板②誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等に設ける標識、掲示板について、次のうち誤っているものはどれか。", "options": ["屋外タンク貯蔵所には、危険物の類別、品名及び貯蔵又は取扱最大数量、指定数量の倍数並びに危険物保安監督者の氏名又は職名を表示した掲示板を設けなければならない。", "移動タンク貯蔵所には、「危」と表示した標識を設けなければならない。", "第４類の危険物を貯蔵する地下タンク貯蔵所には、「取扱注意」と表示した掲示板を設けなければならない。", "給油取扱所には、「給油中エンジン停止」と表示した掲示板を設けなければならない。", "第４類の危険物を貯蔵する屋内貯蔵所には、「火気厳禁」と表示した掲示板を設けなければならない。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "第４類危険物を貯蔵する地下タンク貯蔵所の掲示板は「取扱注意」ではなく「火気厳禁」です。第４類は引火性液体のため火気厳禁の表示が必要です。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-024", "originalId": "145", "genreLabel": "法令5", "subCategory": "貯蔵取扱共通基準①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等における危険物の貯蔵、又は取扱いのすべてに共通する技術上の基準について、次のうち誤っているものはどれか。", "options": ["危険物は、温度計、湿度計、圧力計等を監視して、当該危険物の性質に応じた適正な温度、湿度または圧力を保つように貯蔵し、又は取り扱わなければならない。", "危険物を貯蔵し、又は取り扱う建築物その他の工作物又は設備は、当該危険物の性質に応じ、遮光又は換気を行うこと。", "許可若しくは届出にかかわる品名以外の危険物、又はこれらの許可若しくは届出にかかわる数量を超える危険物を貯蔵し、又は取り扱ってはならない。", "危険物が残存しているおそれがある設備、機械器具、容器等を修理する場合、火花を発する機械器具の使用には注意をすること。", "貯留設備又は油分離装置にたまった危険物は、あふれないように随時くみ上げること。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "危険物が残存しているおそれがある設備・機械器具・容器等を修理する場合は「安全な場所で行うとともに、危険物を完全に除去した後に行う」必要があります。「注意をすること」という緩やかな表現では不十分で、残存危険物がある状態での修理は禁止されています。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-025", "originalId": "146", "genreLabel": "法令5", "subCategory": "貯蔵取扱共通基準②正しいもの", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等における危険物の貯蔵、取扱いのすべてに共通する技術上の基準について、次のうち正しいものはどれか。", "options": ["危険物のくず、かす等は、１日に１回以上危険物の性質に応じて安全な場所で廃棄その他適当な処置をしなければならない。", "危険物が残存し、又は残存しているおそれがある設備、機械器具、容器を修理する場合は、適宜換気をしながら行わなければならない。", "危険物を保護液中に保存する場合は、危険物の確認のため、その一部を保護液から露出させなければならない。", "貯留設備又は油分離装置にたまった危険物は、十分希釈して濃度を下げてから下水等に排出しなければならない。", "製造所等においては、一切の火気を使用してはならない。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "危険物のくず・かす等は「1日に1回以上」危険物の性質に応じた安全な場所で廃棄等の処置をしなければなりません（正しい）。残存危険物のある設備の修理は完全除去後に行う（選択肢2誤）。保護液中の危険物は露出させてはならない（選択肢3誤）。貯留危険物は下水排出不可（選択肢4誤）。製造所等でも業務に必要な火気は使用可（選択肢5誤）。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-026", "originalId": "147", "genreLabel": "法令5", "subCategory": "貯蔵取扱共通基準③誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等における危険物の貯蔵及び取扱いの技術上の基準について、次のうち誤っているものはどれか。", "options": ["屋内貯蔵所においては、容器に収納して貯蔵する危険物の温度が55℃を超えないように必要な措置を講じなければならない。", "給油取扱所において自動車等に給油するときは、自動車等のエンジンを停止させなければならない。", "給油取扱所において自動車等に給油するときは、自動車等の一部または全部が給油空地からはみ出たままで給油してはならない。", "危険物のくず、かす等は１日１回以上その危険物の性質に応じて、安全な場所で廃棄その他適当な処置をしなければならない。", "危険物を保護液中に保存する場合は、危険物の確認のため、その一部を保護液から露出させなければならない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "危険物を保護液中に保存する場合は、危険物が保護液から「露出しないように」管理しなければなりません。露出させると空気・水と反応して危険な場合があります（黄リンなど）。「露出させなければならない」という記述が誤りです。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-027", "originalId": "148", "genreLabel": "法令5", "subCategory": "貯蔵取扱共通基準④誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等における危険物の貯蔵、又は取扱いのすべてに共通する技術上の基準について、次のうち誤っているものはどれか。", "options": ["製造所等においては、一切の火気を使用してはならない。", "許可若しくは届出にかかわる品名以外の危険物、又はこれらの許可若しくは届出にかかわる数量を超える危険物を貯蔵し、又は取り扱ってはならない。", "製造所等においては、常に整理及び清掃を行うとともに、みだりに空箱その他の不必要な物件を置かないこと。", "危険物のくず、かす等は１日１回以上その危険物の性質に応じて、安全な場所で廃棄その他適当な処置をしなければならない。", "危険物を貯蔵し、又は取り扱う場合においては、当該危険物が漏れ、あふれ、又は飛散しないように必要な措置を講ずること。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "「製造所等においては一切の火気を使用してはならない」は誤りです。製造所等でも必要な業務のための火気（加熱設備等）は適切な条件のもとで使用できます。全面禁止ではなく、危険物の性質に応じた適切な管理が求められています。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-028", "originalId": "149", "genreLabel": "法令5", "subCategory": "類ごとの共通基準①水との接触", "difficulty": 2, "type": "正しいものを選べ", "question": "危険物の貯蔵及び取扱いについて、法令上、危険物の類ごとに共通する技術上の基準が定められている。その基準において、「水との接触を避けること」と定められているものは、次のＡ〜Ｅのうちいくつあるか。\n\nＡ．第１類のアルカリ金属の過酸化物\nＢ．第２類の鉄粉、金属粉及びマグネシウム\nＣ．第３類の黄りん\nＤ．第４類の危険物\nＥ．第５類の危険物", "options": ["１つ", "２つ", "３つ", "４つ", "５つ"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "「水との接触を避けること」と定められているのは、ＡとＢの2つです。Ａ（第１類アルカリ金属の過酸化物：水と反応して酸素を放出）とＢ（第２類鉄粉・金属粉・マグネシウム：水と反応して水素を発生）。Ｃ（黄りん）は水中保存が必要、ＤＥは水との接触回避の規定はありません。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-029", "originalId": "150", "genreLabel": "法令5", "subCategory": "類ごとの共通基準②避けること", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、危険物の類ごとに共通する貯蔵及び取扱いの技術上の基準において、すべての危険物の類（第３類の危険物のうち禁水性物質を除く。）に共通して避けなければならないと定められているものは、次のうちどれか。", "options": ["過熱", "衝撃または摩擦", "水または酸との接触", "分解を促す物品との接近", "可燃物との接触もしくは混合"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "すべての危険物類に共通して避けなければならないのは「過熱（みだりに加熱しないこと）」です。衝撃・摩擦は第１・２・５類など一部の類、水との接触は特定類のみ、酸化性物質との接触は第１類の取扱品目による、可燃物との接触は第１・６類などに規定されています。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-030", "originalId": "151", "genreLabel": "法令5", "subCategory": "法令用語の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上の用語とその説明の組み合わせとして、次のうち誤っているものはどれか。", "options": ["顧客用固定給油設備……顧客が自ら自動車等に給油することができる固定給油設備をいう。", "顧客用固定注油設備……顧客に自ら灯油又は軽油を容器に詰め替えさせるための固定注油設備をいう。", "準特定屋外タンク貯蔵所……屋外タンク貯蔵所で、その貯蔵し、又は取り扱う液体の危険物の最大数量が500kL以上1,000kL未満のものをいう。", "特定屋外タンク貯蔵所……屋外タンク貯蔵所で、その貯蔵し、又は取り扱う液体の危険物の最大数量が1,000kL以上のものをいう。", "高引火点危険物……引火点が130℃以上の第４類の危険物をいう。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "高引火点危険物とは「引火点が100℃以上」の第４類危険物をいいます。「130℃以上」という記述が誤りです。他の選択肢はすべて正しい定義です。", "source": "法令5.pdf p.2以降（既存HTMLデータと照合）", "status": "OK"}, {"id": "law5-031", "originalId": "152", "genreLabel": "法令5補完", "subCategory": "貯蔵技術基準①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等における危険物の貯蔵の技術上の基準として、次のうち誤っているものはどれか。", "options": ["屋外貯蔵所において、第４類の危険物の動植物油類を収納する容器のみを積み重ねる場合、高さ３mを超えて積み重ねないこと（機械により荷役する構造を有する容器のみを積み重ねる場合を除く）。", "屋外貯蔵タンク、屋内貯蔵タンク、地下貯蔵タンクまたは簡易貯蔵タンクの計量口は、計量するとき以外は閉鎖しておくこと。", "屋内貯蔵所においては、容器に収納して貯蔵する危険物の温度が55℃を超えないように必要な措置を講ずること。", "屋外貯蔵タンク、屋内貯蔵タンク、または地下貯蔵タンクの元弁及び注入口の弁またはふたは、危険物を出し入れするとき以外は閉鎖しておくこと。", "屋外貯蔵タンクの周囲に設ける防油堤の水抜口は通常閉鎖しておき、防油堤内部に滞油または滞水した場合は、遅滞なくこれを排出すること。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "動植物油類の積み重ね高さ制限は「3m以下」ではなく「4m以下」（機械荷役構造容器のみは6m以下）です。3mを超えてはならないという記述が誤りです。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-032", "originalId": "153", "genreLabel": "法令5補完", "subCategory": "貯蔵取扱基準⑤誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等における危険物の貯蔵及び取扱いのすべてに共通する技術上の基準について、次のうち誤っているものはどれか。", "options": ["屋外貯蔵タンク、屋内貯蔵タンク又は地下貯蔵タンクの元弁及び注入口の弁又はふたは、危険物を出し入れするとき以外は閉鎖しておかなければならない。", "類を異にする危険物は、原則として同一の貯蔵所（耐火構造の隔壁で完全に区分された室が２以上ある貯蔵所においては、同一の室）で貯蔵してはならない。", "危険物のくず、かす等は、１日に１回以上、安全な場所で廃棄等の処置をしなければならない。", "廃油等は、いかなるときも焼却による廃棄処分をしてはならない。", "屋外貯蔵タンク、屋内貯蔵タンク、地下貯蔵タンク又は簡易貯蔵タンクの計量口は、計量するとき以外は閉鎖しておかなければならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "廃油等は「安全な場所で少量ずつ焼却する等」適切な方法で廃棄することができます。「いかなるときも焼却による廃棄を禁止」という記述は誤りです。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-033", "originalId": "154", "genreLabel": "法令5補完", "subCategory": "取扱い技術基準の誤り", "difficulty": 1, "type": "誤っているものを選べ", "question": "法令上、危険物の取扱いの技術上の基準について、次のうち誤っているものはどれか。", "options": ["抽出工程においては、抽出罐の内圧が異常に上昇しないようにしなければならない。", "バーナーを使用する場合においては、バーナーの逆火を防ぎ、かつ、危険物があふれないようにしなければならない。", "染色又は洗浄の作業は、可燃性の蒸気の換気をよくして行うとともに、廃液をみだりに放置しないで安全に処置しなければならない。", "焼入れ作業は、危険物が危険な温度に達しないようにして行わなければならない。", "乾燥工程においては、危険物が引火点に達しない温度で加熱、乾燥させなければならない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "乾燥工程では危険物が「引火点に達しない温度」ではなく「危険な温度に達しない温度」で加熱・乾燥させなければなりません。引火点以外にも発火点等の危険温度があるため、「危険な温度に達しない」という表現が正確です。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-034", "originalId": "155", "genreLabel": "法令5補完", "subCategory": "運搬基準①定められているもの", "difficulty": 2, "type": "定められているものを選べ", "question": "法令上、危険物の運搬に関する技術上の基準に定められているものは、次のうちどれか。", "options": ["危険物取扱者でなければ、危険物を運搬してはならない。", "危険物を混載して運搬することは一切禁じられている。", "指定数量以上の危険物を運搬する場合、危険物に適応する消火設備を備え付けなければならない。", "運搬容器の基準に適合した容器に収納すれば、積載方法の基準に適合しなくてもよい。", "指定数量以上の危険物を車両で運搬する場合は、所轄消防長又は消防署長に届け出なければならない。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "指定数量以上の危険物を車両で運搬する場合は、当該危険物に適応する消火設備を備え付けなければなりません（正しい）。運搬には危険物取扱者免状不要。混載は一定条件下で許可。容器基準と積載基準は別々に守る必要あり。運搬の届出義務はありません。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-035", "originalId": "156", "genreLabel": "法令5補完", "subCategory": "運搬基準②指定数量未満", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、指定数量未満の危険物の貯蔵又は取扱い等の技術上の基準について、次のうち正しいものはどれか。ただし、法第17条第１項に定める消防用設備等の技術上の基準を除く。", "options": ["指定数量未満の危険物を貯蔵し、又は取り扱う製造所等の位置、構造及び設備の技術上の基準は、市町村条例で定められている。", "指定数量未満の危険物の運搬容器の技術上の基準は、市町村条例で定められている。", "指定数量未満の危険物とは、市町村条例で定める数量未満の危険物をいう。", "指定数量未満の危険物を車両で運搬する場合の運搬方法の技術上の基準は、市町村条例で定められている。", "製造所等に設置された、指定数量未満の液体の危険物を貯蔵するタンクの技術上の基準は、市町村条例で定められている。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "指定数量未満の危険物の貯蔵・取扱い場所の位置・構造・設備の技術基準は市町村条例で定めます（正しい）。運搬容器の基準・車両運搬方法の基準は政令（国の法令）。指定数量未満とは法令上の指定数量の単位未満のことで、市町村条例で定める量ではありません。タンクの基準も政令。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-036", "originalId": "157", "genreLabel": "法令5補完", "subCategory": "運搬容器の基準", "difficulty": 2, "type": "正しいものの組み合わせを選べ", "question": "法令上、危険物を運搬する運搬容器の技術上の基準として、次のＡ〜Ｄのうち正しいもののみの組合せはどれか。\n\nＡ．運搬容器の材質は、ガラス製は認められていない。\nＢ．運搬容器の性能は、原則として落下試験等の基準に適合したものでなければならない。\nＣ．運搬容器の外部には、収納する危険物に応じた注意事項を表示しなければならない。\nＤ．危険物を収納した運搬容器を積み重ねる場合は、高さ４m以下としなければならない。", "options": ["Ａ、Ｂ", "Ａ、Ｃ", "Ａ、Ｄ", "Ｂ、Ｃ", "Ｂ、Ｄ"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "ＢとＣが正しいです。Ａ：ガラス容器も一定条件下で運搬容器として認められています（内装容器として使用可）。Ｄ：積み重ね高さ制限は3m以下です。Ｂ（落下試験等の基準に適合）とＣ（外部への注意事項表示）は正しい基準です。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-037", "originalId": "158", "genreLabel": "法令5補完", "subCategory": "運搬容器の表示①正しいもの", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、危険物を運搬する容器の外部に行う表示について、次のうち正しいものはどれか。", "options": ["第１類の危険物にあっては、「火気厳禁」及び「空気接触注意」", "第２類の危険物にあっては、「可燃物接触注意」及び「空気接触注意」", "第３類の危険物にあっては、「衝撃注意」及び「可燃物接触注意」", "第４類の危険物にあっては、「火気注意」及び「禁水」", "第５類の危険物にあっては、「火気厳禁」及び「衝撃注意」"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "第５類危険物（自己反応性物質）の表示は「火気厳禁」及び「衝撃注意」が正しいです。第１類は「火気厳禁」と「可燃物接触注意」。第２類は「火気注意」（自然発火性は「火気厳禁」）。第３類は「空気接触厳禁」や「禁水」。第４類は「火気厳禁」（火気注意ではない）。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-038", "originalId": "159", "genreLabel": "法令5補完", "subCategory": "運搬容器の表示②誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、運搬容器の外部に行う表示として、次のうち誤っているものはどれか。", "options": ["第１類の危険物のうちアルカリ金属の過酸化物又はこれを含有するものは、「火気・衝撃注意」、「可燃物接触注意」及び「禁水」", "第２類の危険物のうち鉄粉、金属紛もしくはマグネシウム又はこれらのいずれかを含有するものは、「火気注意」及び「禁水」", "第４類の危険物は、「火気注意」及び「非水溶性」", "第５類の危険物は、「火気厳禁」及び「衝撃注意」", "危険物の品名、数量、危険等級及び化学名"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "第４類危険物の表示は「火気注意」ではなく「火気厳禁」です。また「非水溶性」は第４類全体に表示するものではなく、水溶性のものに「水溶性」と表示します。よって選択肢3が誤りです。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-039", "originalId": "160", "genreLabel": "法令5補完", "subCategory": "運搬容器の表示③定められていないもの", "difficulty": 1, "type": "定められていないものを選べ", "question": "法令上、危険物を運搬する運搬容器の外部に行う表示として定められていないものは、次のうちどれか。", "options": ["危険物の品名、危険等級及び化学名", "第４類の危険物のうち、水溶性の性状を有するものにあっては「水溶性」", "危険物の数量", "収納する危険物に応じた消火方法", "収納する危険物に応じた注意事項"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "運搬容器外部への表示事項：品名・危険等級・化学名、水溶性表示、数量、注意事項などです。「収納する危険物に応じた消火方法」は表示義務事項ではありません。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-040", "originalId": "161", "genreLabel": "法令5補完", "subCategory": "運搬容器の表示④特定危険物", "difficulty": 2, "type": "正しいものを選べ", "question": "液体の危険物が入った未開封容器の表示が汚れてしまい、「危険等級Ⅲ」「水溶性」「火気厳禁」という表示だけが読み取れた。この危険物に該当するものは次のうちどれか。", "options": ["ジエチルエーテル", "硫黄", "ナトリウム", "ガソリン", "グリセリン"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "危険等級Ⅲ・水溶性・火気厳禁の組み合わせから：液体・水溶性・火気厳禁は第４類危険物。危険等級Ⅲは第３石油類・第４石油類・動植物油類等。水溶性で危険等級Ⅲはグリセリンやエチレングリコール等の第３石油類水溶性が該当します。グリセリンが正解です。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-041", "originalId": "162", "genreLabel": "法令5補完", "subCategory": "運搬基準③定められていないもの", "difficulty": 2, "type": "定められていないものを選べ", "question": "法令上、危険物を運搬する運搬容器の外部に行う表示として定められていないものは、次のうちどれか。", "options": ["危険物の品名、危険等級及び化学名", "第４類の危険物のうち、水溶性の性状を有するものにあっては「水溶性」", "危険物の数量", "収納する危険物に応じた消火方法", "収納する危険物に応じた注意事項"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "運搬容器への消火方法の表示義務はありません。表示が必要なのは品名・危険等級・化学名・数量・注意事項・水溶性表示等です。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-042", "originalId": "163", "genreLabel": "法令5補完", "subCategory": "運搬方法①定められていないもの", "difficulty": 2, "type": "定められていないものを選べ", "question": "法令上、指定数量以上の第４類の非水溶性液体の危険物を車両で運搬する場合、法令上、積載方法及び運搬方法の技術上の基準に定められていないものは、次のうちどれか。", "options": ["運搬容器は、すべて収納口を上方に向けて積載する。", "車両の前後の見やすい箇所に、0.3m平方の地が黒色の板に黄色の反射塗料その他反射性を有する材料で「危」と表示した標識を掲げる。", "品名又は指定数量を異にする２以上の危険物を同時に運搬することはできない。", "危険物を収納した運搬容器を車両に積み重ねる場合、その高さは3m以下とする。", "運搬容器の外部に、危険物の品名、危険等級及び化学名、数量、及び「火気厳禁」等の注意事項を表示する。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "「品名又は指定数量を異にする２以上の危険物を同時に運搬することはできない」という規定はありません。異なる危険物でも一定の混載基準に従えば同時運搬は可能です。よって選択肢3が定められていない事項です。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "law5-043", "originalId": "164", "genreLabel": "法令5補完", "subCategory": "運搬の高さ制限", "difficulty": 1, "type": "正しいものを選べ", "question": "法令上、危険物の運搬に関する技術上の基準に従って危険物を積載する場合、運搬容器を積み重ねる高さの制限として定められているのは、次のうちどれか。", "options": ["１m以下", "２m以下", "３m以下", "４m以下", "５m以下"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "危険物を収納した運搬容器を積み重ねる場合の高さ制限は「3m以下」です。", "source": "法令5.pdf p.10-16（前回未回収のページまたぎ補完）", "status": "OK"}, {"id": "carry-law5-001", "originalId": "165", "genreLabel": "法令5続き", "subCategory": "運搬基準④定められていないもの②", "difficulty": 2, "type": "定められていないものを選べ", "question": "法令上、危険物の運搬に関する技術上の基準に定められていないものは、次のうちどれか。", "options": ["運搬容器は、収納口を上方に向けて積載しなければならない。", "運搬容器の外部には、原則として危険物の品名、数量等を表示して積載しなければならない。", "危険物又は危険物を収納した運搬容器が著しく摩擦または動揺を起こさないように運搬しなければならない。", "特殊引火物を運搬する場合は、運搬容器を日光の直射から避けるため、遮光性のもので被覆しなければならない。", "指定数量の10倍以上の危険物を車両で運搬する場合は、所轄消防署長に届け出なければならない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "指定数量の10倍以上の危険物を車両で運搬する場合に所轄消防署長への届出義務はありません。運搬の届出規定は存在しないため、選択肢5が定められていない事項です。", "source": "法令6.pdf p.1-2（法令5からのページまたぎ）", "status": "OK"}, {"id": "carry-law5-002", "originalId": "166", "genreLabel": "法令5続き", "subCategory": "運搬方法②正しいもの", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、危険物の運搬について、次のうち正しいものはどれか。", "options": ["指定数量以上の危険物を車両で運搬する場合には、0.3メートル平方の地が黒色の板に白色の反射塗料で「危」と表示した標識を、車両の前後の見やすい箇所に掲げなければならない。", "指定数量の1/10未満の危険物を運搬する場合は、運搬容器の技術上の基準は適用されない。", "塊状の硫黄を運搬する場合は、運搬方法の技術上の基準は適用されない。", "指定数量未満の危険物を運搬する場合は、積載方法の技術上の基準は適用されない。", "指定数量以上の危険物を車両で運搬する場合において、積替え、休憩、故障等のため車両を一時停止させるときは、安全な場所を選び、かつ、運搬する危険物の保安に注意しなければならない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "一時停止の際は安全な場所を選び危険物の保安に注意することが必要です（正しい）。車両標識は黒地に黄色の反射塗料（選択肢1誤）。運搬容器基準は数量に関わらず適用（選択肢2誤）。塊状硫黄も運搬方法基準適用（選択肢3誤）。指定数量未満でも積載方法基準は適用（選択肢4誤）。", "source": "法令6.pdf p.1-2（法令5からのページまたぎ）", "status": "OK"}, {"id": "carry-law5-003", "originalId": "167", "genreLabel": "法令5続き", "subCategory": "運搬基準⑤誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、危険物の運搬に関する技術上の基準として、次のうち誤っているものはどれか。", "options": ["指定数量以上の危険物を車両で運搬する場合、当該危険物に適応する消火設備を備え付けなければならない。", "危険物を運搬する車両に乗車するときは、当該危険物を取り扱うことができる危険物取扱者を乗車させ、かつ、危険物取扱者免状を携帯していなければならない。", "指定数量以上の危険物を車両で運搬する場合、その車両に、規則に定める「危」の標識を掲げなければならない。", "移動タンク貯蔵所により危険物を運ぶ行為は、移送として規制されている。", "類の異なった危険物を同時に運搬する場合、混載禁止のものがある。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "危険物の運搬には危険物取扱者の乗車義務も免状携帯義務もありません（移送とは異なります）。運搬時に危険物取扱者を乗車させる規定はなく、危険物取扱者以外の者でも運搬できます。", "source": "法令6.pdf p.1-2（法令5からのページまたぎ）", "status": "OK"}, {"id": "law6-001", "originalId": "168", "genreLabel": "法令6", "subCategory": "消火設備の種類①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等に設置する消火設備の区分について、次のうち誤っているものはどれか。", "options": ["屋内消火栓設備は、第１種の消火設備に該当する。", "粉末消火設備は、第２種の消火設備である。", "乾燥砂は、第５種の消火設備に該当する。", "地下タンク貯蔵所には、第５種の消火設備を２個以上設けなければならない。", "電気設備に対する消火設備は、電気設備のある場所の面積100㎡ごとに１個以上設けなければならない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "粉末消火設備は第２種ではなく「第３種の消火設備」です。消火設備の区分：第１種（屋内消火栓・屋外消火栓）、第２種（スプリンクラー設備）、第３種（水蒸気・水噴霧・泡・不活性ガス・ハロゲン化物・粉末消火設備）、第４種（大型消火器）、第５種（小型消火器・乾燥砂等）。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-002", "originalId": "169", "genreLabel": "法令6", "subCategory": "消火設備の種類②誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等に設置する消火設備の区分について、次のうち誤っているものはどれか。", "options": ["水バケツは、第５種の消火設備である。", "粉末消火設備は、第４種の消火設備である。", "泡消火設備は、第３種の消火設備である。", "スプリンクラー設備は、第２種の消火設備である。", "屋内消火栓設備は、第１種の消火設備である。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "粉末消火設備は第４種ではなく「第３種の消火設備」です。第４種は大型消火器（消火粉末・ハロゲン化物を放射する大型消火器等）です。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-003", "originalId": "170", "genreLabel": "法令6", "subCategory": "消火設備の種類③第３種", "difficulty": 2, "type": "該当しないものを選べ", "question": "法令上、製造所等に設置する消火設備の区分について、次のうち第３種の消火設備に該当しないものはどれか。", "options": ["水噴霧消火設備", "粉末消火設備", "不活性ガス消火設備", "水蒸気消火設備", "屋内消火栓設備"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "屋内消火栓設備は第１種の消火設備です。第３種の消火設備：水噴霧・泡・不活性ガス・ハロゲン化物・粉末・水蒸気消火設備です。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-004", "originalId": "171", "genreLabel": "法令6", "subCategory": "消火設備の種類④第４種", "difficulty": 1, "type": "第４種に該当するものを選べ", "question": "法令上、製造所等に設置する消火設備の区分について、第４種消火設備に該当するものはどれか。", "options": ["屋内消火栓設備", "スプリンクラー設備", "泡消火設備", "消火粉末を放射する大型の消火器", "ハロゲン化物を放射する小型の消火器"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "第４種消火設備は「大型消火器」です。消火粉末を放射する大型消火器が該当します。第１種は屋内・屋外消火栓、第２種はスプリンクラー、第３種は固定式消火設備（泡・粉末等）、第５種は小型消火器・乾燥砂等です。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-005", "originalId": "172", "genreLabel": "法令6", "subCategory": "消火設備⑤第５種のみの施設", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、第５種の消火設備のみを設ければよい製造所等は、次のうちどれか。", "options": ["指定数量の倍数が10の灯油を取り扱う一般取扱所", "指定数量の倍数が20のエタノールを販売する第二種販売取扱所", "指定数量の倍数が100の軽油を貯蔵する屋外貯蔵所", "指定数量の倍数が150のガソリンを貯蔵する地下タンク貯蔵所", "指定数量の倍数が400の重油を移送する移送取扱所"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "第二種販売取扱所は規模・倍数に関わらず第５種の消火設備のみで足ります（販売取扱所は小型施設のため）。一般取扱所・屋外貯蔵所・地下タンク貯蔵所・移送取扱所は倍数によってより高度な消火設備が必要です。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-006", "originalId": "173", "genreLabel": "法令6", "subCategory": "消火設備⑥技術基準の誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等に設置する消火設備の技術上の基準について、次のうち誤っているものはどれか。", "options": ["消火設備の種類は、第１種の消火設備から第６種の消火設備に区分されている。", "危険物は、指定数量の10倍が１所要単位である。", "給油取扱所に設ける第５種の消火設備（小型の消火器等）は、有効に消火できる位置に設けなければならない。", "地下タンク貯蔵所には、危険物の数量に関係なく第５種の消火設備（小型の消火器等）を２個以上設けなければならない。", "移動タンク貯蔵所に、消火粉末を放射する消火器を設ける場合は、自動車用消火器で充てん量が3.5kg以上のものを２個以上設けなければならない。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "消火設備の区分は「第１種から第５種」までの5段階です。第６種という区分は存在しません。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-007", "originalId": "174", "genreLabel": "法令6", "subCategory": "消火設備⑦第５種に該当するもの", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等に設置する消火設備の区分について、第５種の消火設備に該当するものはどれか。", "options": ["消火粉末を放射する大型の消火器", "スプリンクラー設備", "屋内消火栓設備", "ハロゲン化物消火設備", "二酸化炭素を放射する小型の消火器"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "第５種消火設備は「小型消火器」と「乾燥砂・膨張ひる石・膨張真珠岩」です。二酸化炭素を放射する小型消火器は第５種に該当します。大型消火器は第４種、スプリンクラーは第２種、屋内消火栓は第１種、ハロゲン化物消火設備は第３種です。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-008", "originalId": "175", "genreLabel": "法令6", "subCategory": "消火設備⑧第５種と危険物の組み合わせ", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、危険物とその火災に適応する第５種の消火設備との組合せとして、次のうち誤っているものはどれか。", "options": ["第４類、第５類、第６類の危険物……水消火器（棒状）", "第４類、第５類、第６類の危険物……強化液消火器（霧状）", "第４類の危険物……二酸化炭素消火器", "第４類、第５類、第６類の危険物……泡消火器", "第４類の危険物……粉末消火器（炭酸水素塩類等）"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "棒状の水消火器は第４類危険物（引火性液体）の火災には適応しません。棒状放射は油火災を拡散させる危険があります。第４類には霧状・泡・CO₂・粉末・ハロゲン化物が適応します。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-009", "originalId": "176", "genreLabel": "法令6", "subCategory": "消火設備⑨第３種と対象物", "difficulty": 2, "type": "誤っているものを選べ", "question": "政令別表第５に掲げる対象物の区分に応じた、その消火に適応する第３種の消火設備の組合せとして、次のうち誤っているものはどれか。", "options": ["建築物その他の工作物……りん酸塩類等を使用する粉末消火設備", "第４類の危険物……水噴霧消火設備", "電気設備……ハロゲン化物消火設備", "建築物その他の工作物……炭酸水素塩類等を使用する粉末消火設備", "第４類の危険物……不活性ガス消火設備"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "炭酸水素塩類等を使用する粉末消火設備は「建築物その他の工作物」には適応しません（第4〜6類危険物・電気設備には適応）。りん酸塩類等の粉末消火設備は建築物にも適応可能です。よって選択肢4が誤りです。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-010", "originalId": "177", "genreLabel": "法令6", "subCategory": "消火設備⑩全危険物に適応する第５種", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次のＡ〜Ｇに掲げる第５種の消火設備のうち、すべての危険物の火に適応するものの組合せはどれか。\n\nＡ．霧状の強化液を放射する消火器\nＢ．泡消火剤を放射する消火器\nＣ．乾燥砂\nＤ．膨張ひる石\nＥ．リン酸塩類等の消火粉末を放射する消火器\nＦ．二酸化炭素を放射する消火器\nＧ．炭酸水素塩類等の消火粉末を放射する消火器", "options": ["ＡとＢ", "ＢとＥ", "ＣとＤ", "ＣとＧ", "ＤとＦ"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "すべての危険物類（第１〜６類）の火災に適応するのは「乾燥砂（Ｃ）」と「膨張ひる石（Ｄ）」です。霧状の強化液（Ａ）は第３類禁水性には不適応、泡消火剤（Ｂ）は第３類禁水性・第６類酸化性液体には不適応、リン酸塩類（Ｅ）は第６類不適応、CO₂（Ｆ）・炭酸水素塩類（Ｇ）は第１・第６類不適応です。乾燥砂と膨張ひる石・膨張真珠岩は全類の危険物に適応できます。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-011", "originalId": "178", "genreLabel": "法令6", "subCategory": "消火設備⑪所要単位の穴埋め", "difficulty": 1, "type": "当てはまる数値を選べ", "question": "法令上、次の文の（　）内に当てはまる数値はどれか。\n\n「製造所等に設ける消火設備の所要単位の計算方法は、危険物に対しては指定数量の（　）倍を１所要単位とする。」", "options": ["5", "10", "50", "100", "150"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "危険物の所要単位は「指定数量の10倍を１所要単位」とします。建築物は外壁が耐火構造か否かで100㎡または50㎡を１所要単位とします。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-012", "originalId": "179", "genreLabel": "法令6", "subCategory": "消火設備⑫所要単位の計算", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等に消火設備を設置する場合の所要単位を計算する方法として、次のうち誤っているものはどれか。ただし、製造所等は他の用に供する部分を有しない建築物に設けるものとする。", "options": ["外壁が耐火構造の製造所の建築物は、延べ面積100㎡を１所要単位とする。", "外壁が耐火構造でない製造所の建築物は、延べ面積50㎡を１所要単位とする。", "外壁が耐火構造の貯蔵所の建築物は、延べ面積150㎡を１所要単位とする。", "外壁が耐火構造でない貯蔵所の建築物は、延べ面積75㎡を１所要単位とする。", "危険物は、指定数量の100倍を１所要単位とする。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "危険物の所要単位は「指定数量の10倍を１所要単位」です。100倍という数値が誤りです。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-013", "originalId": "180", "genreLabel": "法令6", "subCategory": "消火設備⑬第５種のみ設ければよい施設", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、次に掲げる製造所等のうち、その規模、貯蔵し又は取り扱う危険物の品名及び最大数量にかかわらず、第５種の消火設備のみを設ければよいものはどれか。", "options": ["製造所", "屋内貯蔵所", "屋外タンク貯蔵所", "地下タンク貯蔵所", "一般取扱所"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "地下タンク貯蔵所は規模・数量にかかわらず第５種の消火設備（小型消火器等）のみを設ければよい施設です。製造所・屋内貯蔵所・屋外タンク貯蔵所・一般取扱所はいずれも指定数量の倍数が一定以上になると第５種に加えてより高度な消火設備が必要になります。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-014", "originalId": "181", "genreLabel": "法令6", "subCategory": "消火設備⑭第５種以外も必要な施設", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、第５種の消火設備に加え、それ以外の消火設備を設置しなければならない製造所等として、次のうち正しいものはどれか。ただし、製造所等において100℃未満の温度で危険物を貯蔵し、取り扱うものとする。", "options": ["指定数量の倍数が10の灯油を取り扱う一般取扱所", "指定数量の倍数が40の重油を貯蔵する地下タンク貯蔵所", "指定数量の倍数が15のエタノールを取り扱う第一種販売取扱所", "指定数量の倍数が３のガソリンを貯蔵する簡易タンク貯蔵所", "指定数量の倍数が５のギヤー油を貯蔵する屋外タンク貯蔵所"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "一般取扱所は指定数量の倍数が10以上の場合、第５種以外の消火設備（第１〜４種）も必要になります。倍数10の一般取扱所には第４種以上の消火設備が追加で必要です。地下タンク・販売取扱所・簡易タンクは第５種のみ可。屋外タンク貯蔵所は倍数が小さいため第５種のみ可。", "source": "法令6.pdf p.2-6", "status": "OK"}, {"id": "law6-015", "originalId": "182", "genreLabel": "法令6", "subCategory": "警報設備①穴埋め", "difficulty": 1, "type": "当てはまる数値を選べ", "question": "法令上、警報設備の設置義務について、次の文の（　）内にあてはまる数値は、次のうちどれか。\n\n「指定数量の倍数が（　）以上の危険物を取り扱う製造所等（移動タンク貯蔵所を除く）では、警報設備の設置が義務付けられている。」", "options": ["5", "10", "20", "30", "50"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "指定数量の倍数が「10以上」の製造所等（移動タンク貯蔵所を除く）には警報設備の設置が義務付けられています。", "source": "法令6.pdf p.7-13", "status": "OK"}, {"id": "law6-016", "originalId": "183", "genreLabel": "法令6", "subCategory": "警報設備②設置義務から除かれるもの", "difficulty": 1, "type": "正しいものを選べ", "question": "法令上、指定数量の倍数が10以上の製造所等で、警報設備を設置しなければならないものから除かれているのは、次のうちどれか。", "options": ["一般取扱所", "屋内貯蔵所", "簡易タンク貯蔵所", "移動タンク貯蔵所", "給油取扱所"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "移動タンク貯蔵所は警報設備の設置義務から除かれています。移動タンク貯蔵所は常に移動しているため固定の警報設備を設置することができないためです。", "source": "法令6.pdf p.7-13", "status": "OK"}, {"id": "law6-017", "originalId": "184", "genreLabel": "法令6", "subCategory": "警報設備③設置義務がある施設", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、警報設備を設置しなければならない製造所等として、次のうち正しいものの組み合わせはどれか。\n\nＡ．指定数量の倍数が５の製造所\nＢ．指定数量の倍数 "], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "製造所等の位置・構造・設備が技術上の基準に適合していないときに修理・改造・移転命令が発せられます。公共の安全維持のための緊急命令は一時使用停止命令。貯蔵取扱方法の違反は貯蔵取扱基準遵守命令の対象です。", "source": "法令6.pdf p.7-13", "status": "OK"}, {"id": "law6-021", "originalId": "188", "genreLabel": "法令6", "subCategory": "命令の組み合わせ", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等における法令違反と、それに対して市町村長等から受ける命令等の組み合わせとして、次のうち誤っているものはどれか。", "options": ["製造所等の位置、構造及び設備が技術上の基準に適合しないとき……製造所等の修理、改造又は移転命令", "製造所等における危険物の貯蔵又は取扱の方法が技術上の基準に違反しているとき……危険物の貯蔵、取扱基準遵守命令", "許可を受けないで、製造所等の位置、構造又は設備を変更したとき……使用停止命令又は許可の取消し", "公共の安全の維持又は災害発生の防止のため、緊急の必要があるとき……製造所等の一時使用停止命令又は使用制限", "危険物保安監督者が、その責務を怠っているとき……危険物の取扱作業の保安に関する講習の受講命令"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "危険物保安監督者が責務を怠っているときの命令は「講習の受講命令」ではなく「危険物保安監督者の解任命令」です。解任命令を受けた場合に新たな保安監督者を選任することが義務付けられます。", "source": "法令6.pdf p.7-13", "status": "OK"}, {"id": "law6-022", "originalId": "189", "genreLabel": "法令6", "subCategory": "法令違反と命令①誤り", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、法令違反に対し市町村長等から発令される命令として、次のうち誤っているものはどれか。", "options": ["製造所等を設置したとき、完成検査を受けないで当該製造所等を使用したときは、使用の停止を命ぜられる。", "許可を受けないで製造所等の位置、構造又は設備を変更したときは、仮用承認申請の提出を命ぜられる。", "製造所等以外の場所で、仮貯蔵又は仮取扱いの承認を受けないで指定数量以上の危険物を貯蔵し、又は取り扱っているときは、当該危険物の除去その他危険物による災害防止のための必要な措置をとることを命ぜられる。", "製造所等の位置、構造及び設備が技術上の基準に適合していないときは、これらを修理し、改造し、又は移転することを命ぜられる。", "製造所等における危険物の貯蔵又は取扱いの方法が技術上の基準に違反しているときは、当該基準に従って危険物を貯蔵し、又は取り扱うことを命ぜられる。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "許可を受けずに製造所等の位置・構造・設備を変更した場合は「仮用承認申請の提出」ではなく「使用停止命令または許可の取消し」が命じられます。", "source": "法令6.pdf p.7-13", "status": "OK"}, {"id": "law6-023", "originalId": "190", "genreLabel": "法令6", "subCategory": "許可の取消し事由", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次のＡ〜Ｅのうち、市町村長等から許可の取消しを受ける事由に該当しないものの組み合わせはどれか。\n\nＡ．完成検査を受ける前に製造所等を使用したとき。\nＢ．危険物施設保安員を定めなければならない製造所等で、危険物施設保安員を定めていないとき。\nＣ．予防規程を定めなければならない製造所等で、予防規程を定めていない const KEY="otsu4_law1_6_combined_v2";
let state=JSON.parse(localStorage.getItem(KEY)||'{"answers":{}}'),list=[...QUESTIONS],idx=0,locked=false,selectedSet=new Set();

function isMulti(q){return (q.correctNos||[]).length>1}
function sameArray(a,b){return a.length===b.length && a.every((v,i)=>v===b[i])}
function save(){localStorage.setItem(KEY,JSON.stringify(state));stats()}
function currentFilteredBase(){
  const g=genreFilter.value;
  let base = g==="all" ? QUESTIONS : QUESTIONS.filter(q => (q.genreLabel||"").includes(g) || (q.source||"").includes(g));
  const m=mode.value;
  if(m==="wrong") base=base.filter(q=>state.answers[q.id]&&!state.answers[q.id].correct);
  if(m==="unseen") base=base.filter(q=>!state.answers[q.id]);
  return base;
}
function stats(){
  totalCount.textContent=list.length;
  let ids=new Set(list.map(q=>q.id));
  let entries=Object.entries(state.answers).filter(([id])=>ids.has(id));
  let a=entries.length,c=entries.filter(([_,x])=>x.correct).length;
  doneCount.textContent=a;rate.textContent=a?Math.round(c/a*100)+"%":"0%";
}
function build(){list=currentFilteredBase();idx=0;render()}
function render(){
  stats();
  if(!list.length){card.classList.add("hidden");empty.classList.remove("hidden");return}
  card.classList.remove("hidden");empty.classList.add("hidden");
  let q=list[idx];locked=false;selectedSet=new Set();
  qid.textContent=`${idx+1} / ${list.length}　${q.id}`;
  genre.textContent=q.genreLabel||"法令";
  cat.textContent=q.subCategory||"";
  typ.textContent=q.type||"";
  src.textContent=q.source||"";
  question.textContent=q.question;
  explanation.classList.add("hidden");explanation.textContent="";
  multiBox.classList.toggle("hidden", !isMulti(q));
  multiNote.classList.toggle("hidden", !isMulti(q));
  multiNote.textContent=isMulti(q)?`この問題は${q.correctNos.length}つ選ぶ形式。選んでから「解答する」を押してな。`:"";
  let old=state.answers[q.id];
  if(old){
    review.classList.remove("hidden");
    const selectedText=(old.selectedNos||[old.selected+1]).join("・");
    review.textContent=`前回：${old.correct?"正解":"不正解"}　選択：${selectedText}番`;
  }else review.classList.add("hidden");
  options.innerHTML="";
  q.options.forEach((o,i)=>{
    let b=document.createElement("button");
    b.className="option";
    b.textContent=`${i+1}. ${o}`;
    b.onclick=()=>selectOption(i);
    options.appendChild(b);
  });
}
function selectOption(i){
  if(locked)return;
  let q=list[idx];
  if(isMulti(q)){
    if(selectedSet.has(i)) selectedSet.delete(i); else selectedSet.add(i);
    [...document.querySelectorAll(".option")].forEach((b,n)=>b.classList.toggle("selected", selectedSet.has(n)));
  }else{
    submitAnswer([i]);
  }
}
function clearMulti(){
  if(locked)return;
  selectedSet=new Set();
  [...document.querySelectorAll(".option")].forEach(b=>b.classList.remove("selected"));
}
function submitMulti(){
  if(locked)return;
  let q=list[idx];
  if(selectedSet.size===0){alert("選択してから解答してな");return}
  submitAnswer([...selectedSet].sort((a,b)=>a-b));
}
function submitAnswer(selectedIndexes){
  if(locked)return;locked=true;
  let q=list[idx];
  let correctIndexes=[...(q.answerIndexes||[q.answer])].sort((a,b)=>a-b);
  let chosen=[...selectedIndexes].sort((a,b)=>a-b);
  let ok=sameArray(chosen, correctIndexes);
  state.answers[q.id]={selectedIndexes:chosen,selectedNos:chosen.map(x=>x+1),selected:chosen[0],correct:ok,at:new Date().toISOString()};
  [...document.querySelectorAll(".option")].forEach((b,n)=>{
    if(correctIndexes.includes(n)) b.classList.add("correct");
    if(chosen.includes(n)&&!correctIndexes.includes(n)) b.classList.add("wrong");
  });
  const correctText=(q.correctNos||correctIndexes.map(x=>x+1)).join("・");
  explanation.textContent=`${ok?"正解":"不正解"}。正解は${correctText}番。\n\n${q.explanation}`;
  explanation.classList.remove("hidden");
  save();
}
function nextQ(){if(!list.length)return;idx=(idx+1)%list.length;render()}
function prevQ(){if(!list.length)return;idx=(idx-1+list.length)%list.length;render()}
function shuffleCurrent(){for(let i=list.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]]}idx=0;render()}
function jumpRandom(){if(!list.length)return;idx=Math.floor(Math.random()*list.length);render()}
function resetStats(){if(confirm("回答履歴をリセットする？")){state={answers:{}};save();build()}}
genreFilter.addEventListener("change",build);mode.addEventListener("change",build);
build();
</script>
