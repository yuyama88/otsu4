const QUESTIONS = [{"id": "law1-001", "originalId": "", "genreLabel": "法令1", "subCategory": "危険物の品名", "difficulty": 2, "type": "誤っているものを選べ", "question": "法別表第1に危険物の品名として掲げられていないものは、次のうちどれか。", "options": ["過酸化水素", "硫黄", "赤りん", "ナトリウム", "プロパン"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "法別表第1に定める危険物は、原則として固体と液体です。気体のプロパンは消防法で定める危険物には該当しません。過酸化水素は第6類、硫黄・赤りんは第2類、ナトリウムは第3類です。", "source": "法令1.pdf p.1-3", "status": "OK"}, {"id": "law1-002", "originalId": "", "genreLabel": "法令1", "subCategory": "類別・性質・品名", "difficulty": 2, "type": "誤っているものを選べ", "question": "法別表第1に掲げる危険物の類別、性質及び品名の組み合わせとして、次のうち誤っているものはどれか。", "options": ["第1類｜酸化性固体｜過塩素酸塩類", "第3類｜可燃性固体｜マグネシウム", "第4類｜引火性液体｜動植物油類", "第5類｜自己反応性物質｜硝酸エステル類", "第6類｜酸化性液体｜過酸化水素"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "第3類の性質は「自然発火性物質及び禁水性物質」です。マグネシウムは第2類の可燃性固体に該当します。", "source": "法令1.pdf p.1-3", "status": "OK"}, {"id": "law1-003", "originalId": "", "genreLabel": "法令1", "subCategory": "危険物の定義", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、危険物に関する記述について、次のうち誤っているものはどれか。", "options": ["危険物とは、法別表第1の品名欄に掲げる物品で、同表に定める区分に応じ同表の性質欄に掲げる性状を有するものをいう。", "液化石油ガスは、危険物に該当する。", "危険物に該当するか否かを判断するための試験の1つに、火炎による着火の危険性を判断するための試験がある。", "危険物は、酸化性固体、可燃性固体、自然発火性物質及び禁水性物質、引火性液体、自己反応性物質、酸化性液体の性質ごとに分類されている。", "指定数量とは、危険物の危険性を勘案して政令で定める数量である。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "液化石油ガスは常温常圧で気体であるため、消防法で定める危険物には該当しません。", "source": "法令1.pdf p.1-3", "status": "OK"}, {"id": "law1-004", "originalId": "", "genreLabel": "法令1", "subCategory": "危険物の説明", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、危険物に関する説明について、次のうち誤っているものはどれか。", "options": ["危険物とは、法別表第1の品名欄に掲げる物品で、同表に定める区分に応じ同表の性質欄に掲げる性状を有するものをいう。", "危険物の状態は、20℃、1気圧において固体又は液体である。", "危険物を含有する物品であっても、政令で定める試験において政令で定める性状を示さなければ危険物に該当しない。", "危険物の区分として、第1類から第6類までの6つの類に分けられている。", "不燃性又は難燃性でない固体の合成樹脂製品は、危険物に該当する。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "不燃性又は難燃性でない固体の合成樹脂製品は、数量等に応じて指定可燃物に該当する場合がありますが、消防法別表第1の危険物とは異なります。", "source": "法令1.pdf p.2-3", "status": "OK"}, {"id": "law1-005", "originalId": "", "genreLabel": "法令1", "subCategory": "複数性状物品", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、次の文の（　）内に当てはまる語句として、正しいものはどれか。\n\n「法別表第1の性質欄に掲げる性状の2以上を有する物品（複数性状物品）の属する品名は、規則で定められている。複数性状物品が、酸化性固体の性状及び自己反応性物質の性状を有する場合は、法別表第1（　）の項第11号に掲げる品名とされる。」", "options": ["第1類", "第2類", "第3類", "第5類", "第6類"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "酸化性固体（第1類）と自己反応性物質（第5類）の複数性状物品は、第5類に属するとされます。", "source": "法令1.pdf p.3", "status": "OK"}, {"id": "law1-006", "originalId": "", "genreLabel": "法令1", "subCategory": "第4類品名", "difficulty": 2, "type": "誤っているものを選べ", "question": "法に定める危険物の品名について、次のうち誤っているものはどれか。", "options": ["二酸化硫黄は、特殊引火物に該当する。", "アセトンは、第1石油類に該当する。", "灯油は、第2石油類に該当する。", "クレオソート油は、第3石油類に該当する。", "ギヤー油は、第4石油類に該当する。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "二酸化硫黄は特殊引火物ではありません。特殊引火物の代表例は、ジエチルエーテル、二硫化炭素などです。", "source": "法令1.pdf p.4", "status": "OK"}, {"id": "law1-007", "originalId": "", "genreLabel": "法令1", "subCategory": "第4類品名", "difficulty": 2, "type": "誤っているものを選べ", "question": "法別表第1に定める第4類の危険物の品名について、次のうち誤っているものはどれか。", "options": ["特殊引火物……二硫化炭素", "第1石油類……ガソリン", "第2石油類……軽油", "アルコール類……ジエチルエーテル", "第3石油類……重油"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "ジエチルエーテルはアルコール類ではなく、特殊引火物に分類されます。", "source": "法令1.pdf p.4", "status": "OK"}, {"id": "law1-008", "originalId": "", "genreLabel": "法令1", "subCategory": "特殊引火物", "difficulty": 2, "type": "当てはまるものを選べ", "question": "法令上、次の文の（　）内に当てはまる語句はどれか。\n\n「特殊引火物とは、ジエチルエーテル、二硫化炭素その他1気圧において、発火点が100℃以下のもの又は（　）のものをいう。」", "options": ["引火点が－40℃以下", "引火点が－40℃以下で沸点が40℃以下", "引火点が－20℃以下", "引火点が－20℃以下で沸点が40℃以下", "沸点が40℃以下"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "特殊引火物は、発火点が100℃以下のもの、又は引火点が－20℃以下かつ沸点が40℃以下のものをいいます。", "source": "法令1.pdf p.4", "status": "OK"}, {"id": "law1-009", "originalId": "", "genreLabel": "法令1", "subCategory": "アルコール類", "difficulty": 2, "type": "当てはまるものを選べ", "question": "アルコール類については法別表第1備考において、組成等を勘案して規則で定めるものを除くとされている。次の文の（　）内に当てはまる規則で定められている数値はどれか。\n\n「アルコール類から除かれるものは、1分子を構成する炭素の原子の数が1個から3個までの飽和1価アルコールの含有量が（　）未満の水溶液である。」", "options": ["50%", "60%", "70%", "80%", "90%"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "炭素数1〜3の飽和1価アルコールの含有量が60%未満の水溶液は、アルコール類から除かれます。", "source": "法令1.pdf p.5-6", "status": "OK"}, {"id": "law1-010", "originalId": "", "genreLabel": "法令1", "subCategory": "動植物油類", "difficulty": 2, "type": "正しいものを選べ", "question": "法別表第1で定める動植物油類について、次の文の（　）内のA及びBに当てはまる語句の組み合わせとして、正しいものはどれか。\n\n「動植物油類とは、動物の脂肉等又は植物の種子若しくは果肉から抽出したものであって、1気圧において（A）が（B）未満のものをいい、総務省令で定めるところにより貯蔵保管されているものを除く。」", "options": ["A：引火点　B：200℃", "A：引火点　B：250℃", "A：引火点　B：300℃", "A：発火点　B：250℃", "A：発火点　B：300℃"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "動植物油類は、1気圧において引火点が250℃未満のものです。発火点ではなく引火点で判定します。", "source": "法令1.pdf p.5-6", "status": "OK"}, {"id": "law1-011", "originalId": "", "genreLabel": "法令1", "subCategory": "品名の説明", "difficulty": 2, "type": "誤っているものを選べ", "question": "法別表第1備考に掲げる品名の説明として、次のうち誤っているものはどれか。", "options": ["特殊引火物とは、1気圧において、発火点が100℃以下のもの、または引火点が－20℃以下で沸点が40℃以下のものをいう。", "第一石油類とは、1気圧において引火点が21℃未満のものをいう。", "第二石油類とは、1気圧において引火点が21℃以上70℃未満のものをいう。", "第三石油類とは、1気圧において引火点が70℃以上200℃未満のものをいう。", "第四石油類とは、1気圧において引火点が200℃以上のものをいう。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "第四石油類は、1気圧において引火点が200℃以上250℃未満のものです。「200℃以上」だけでは不完全です。", "source": "法令1.pdf p.6", "status": "OK"}, {"id": "law1-012", "originalId": "", "genreLabel": "法令1", "subCategory": "品名判定", "difficulty": 2, "type": "正しいものを選べ", "question": "屋外貯蔵タンクに第4類の危険物が貯蔵されている。この危険物の性状は、非水溶性液体、1気圧において引火点24.5℃、沸点136.2℃、発火点432℃である。法令上、この危険物に該当する品名は次のうちどれか。", "options": ["特殊引火物", "第1石油類", "アルコール類", "第2石油類", "第3石油類"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "引火点24.5℃は21℃以上70℃未満なので、第2石油類に該当します。", "source": "法令1.pdf p.7", "status": "OK"}, {"id": "law1-013", "originalId": "", "genreLabel": "法令1", "subCategory": "指定数量未満", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、指定数量未満の危険物について、次のうち正しいものはどれか。ただし、法第17条第1項の消防用設備等については除くものとする。", "options": ["指定数量未満の危険物を貯蔵し、又は取り扱う場所の位置、構造及び設備の技術上の基準は、市町村条例により定めることとされている。", "指定数量未満の危険物の運搬容器の基準は、市町村条例により定めることとされている。", "指定数量未満の危険物とは、市町村条例で定める数量未満の危険物をいう。", "指定数量未満の危険物を車両で運搬する場合の技術上の基準は、市町村条例により定めることとされている。", "製造所等に設置する、指定数量未満の液体の危険物を貯蔵するタンクの技術上の基準は、市町村条例により定めることとされている。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "指定数量未満の危険物の貯蔵・取扱い場所の位置、構造、設備の基準は市町村条例で定めます。運搬容器や運搬の基準は政令で定めます。", "source": "法令1.pdf p.7", "status": "OK"}, {"id": "law1-014", "originalId": "", "genreLabel": "法令1", "subCategory": "指定数量", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令に定める第4類の危険物の指定数量について、次のうち誤っているものはどれか。", "options": ["特殊引火物の指定数量は、第4類の危険物の中で最も少ない量である。", "第1石油類の水溶性液体と、アルコール類の指定数量は同じである。", "第2石油類の水溶性液体と、第3石油類の非水溶性液体の指定数量は同じである。", "第1石油類、第2石油類及び第3石油類の指定数量は、各類とも水溶性液体の数量が非水溶性液体の2倍となっている。", "第3石油類の水溶性液体と、第4石油類の指定数量は同じである。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "第3石油類の水溶性液体は4,000L、第4石油類は6,000Lなので同じではありません。", "source": "法令1.pdf p.7", "status": "OK"}, {"id": "law1-015", "originalId": "", "genreLabel": "法令1", "subCategory": "指定数量計算", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、次の危険物を同一の場所で貯蔵する場合、貯蔵量は指定数量の何倍になるか。\n\n・軽油……3,000L\n・ガソリン……1,000L\n・エタノール……2,000L", "options": ["10", "11", "12", "13", "14"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "軽油は第2石油類（非水溶性）で1,000L、ガソリンは第1石油類（非水溶性）で200L、エタノールはアルコール類で400Lです。3,000/1,000=3、1,000/200=5、2,000/400=5、合計13倍です。", "source": "法令1.pdf p.8", "status": "OK"}, {"id": "law1-016", "originalId": "", "genreLabel": "法令1", "subCategory": "指定数量計算", "difficulty": 2, "type": "正しいものを選べ", "question": "ある製造所において、第4類の危険物A及びBを同一場所に貯蔵している。指定数量の倍数の合計として、次のうち正しいものはどれか。\n\n危険物A：非水溶性、発火点220℃、引火点45℃、貯蔵量2,000L\n危険物B：非水溶性、発火点480℃、引火点5℃、貯蔵量1,000L", "options": ["3", "5", "7", "22", "30"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "Aは引火点45℃なので第2石油類（非水溶性）で指定数量1,000L、2倍です。Bは引火点5℃なので第1石油類（非水溶性）で指定数量200L、5倍です。合計7倍です。", "source": "法令1.pdf p.8-9", "status": "OK"}, {"id": "law1-017", "originalId": "", "genreLabel": "法令1", "subCategory": "指定数量計算", "difficulty": 2, "type": "正しいものを選べ", "question": "次に掲げる危険物の品名と数量の組み合わせのうち、指定数量の倍数が1以上となるものはどれか。", "options": ["ガソリン100L ＋ 灯油400L", "灯油500L ＋ 軽油400L", "軽油400L ＋ 重油1,000L", "メタノール200L ＋ ガソリン100L", "エタノール200L ＋ 灯油400L"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "メタノールはアルコール類で400L、ガソリンは第1石油類（非水溶性）で200Lです。200/400=0.5、100/200=0.5、合計1.0となります。", "source": "法令1.pdf p.8-9", "status": "OK"}, {"id": "law1-018", "originalId": "", "genreLabel": "法令1", "subCategory": "指定数量計算", "difficulty": 2, "type": "正しいものを選べ", "question": "屋内貯蔵所に灯油2,000Lと軽油4,000Lを貯蔵している。これらと同時に貯蔵するとき、指定数量の倍数が10となるものは、次のうちどれか。", "options": ["ガソリン……1,000L", "二硫化炭素……300L", "ベンゼン……1,200L", "アセトン……800L", "エタノール……1,600L"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "灯油2,000Lは2倍、軽油4,000Lは4倍で、すでに合計6倍です。エタノール1,600Lはアルコール類400Lが指定数量なので4倍となり、合計10倍です。", "source": "法令1.pdf p.9", "status": "OK"}, {"id": "law1-019", "originalId": "", "genreLabel": "法令1", "subCategory": "製造所等の区分", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等の区分の一般的説明として、次のうち正しいものはどれか。", "options": ["屋外貯蔵所……屋外で特殊引火物及びナトリウムを貯蔵し、又は取り扱う貯蔵所", "給油取扱所……自動車の燃料タンクのみにガソリンを給油する取扱所", "移動タンク貯蔵所……鉄道の車両に固定されたタンクにおいて危険物を貯蔵し、又は取り扱う貯蔵所", "地下タンク貯蔵所……地盤面下に埋没されているタンクにおいて危険物を貯蔵し、又は取り扱う貯蔵所", "屋内貯蔵所……屋内にあるタンクにおいて危険物を貯蔵し、又は取り扱う貯蔵所"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "地下タンク貯蔵所は、地盤面下に埋没されているタンクで危険物を貯蔵し、又は取り扱う貯蔵所です。", "source": "法令1.pdf p.10", "status": "OK"}, {"id": "law1-020", "originalId": "", "genreLabel": "法令1", "subCategory": "貯蔵所・取扱所", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、貯蔵所及び取扱所の区分について、次のうち誤っているものはどれか。", "options": ["屋外貯蔵所とは、屋外の場所において危険物を貯蔵し、又は取り扱う貯蔵所をいう。", "地下タンク貯蔵所とは、地盤面下に埋没されているタンクにおいて危険物を貯蔵し、又は取り扱う貯蔵所をいう。", "屋外タンク貯蔵所とは、屋外にあるタンクにおいて危険物を貯蔵し、又は取り扱う貯蔵所をいう。", "第一種販売取扱所とは、店舗において容器入りのままで販売するため、指定数量の倍数が15以下の危険物を取り扱う取扱所をいう。", "一般取扱所とは、屋内取扱所、屋外取扱所又は移送取扱所以外の取扱所をいう。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "一般取扱所とは、給油取扱所、販売取扱所、移送取扱所以外の取扱所です。「屋内取扱所」「屋外取扱所」という区分ではありません。", "source": "法令1.pdf p.10-11", "status": "OK"}, {"id": "law1-021", "originalId": "", "genreLabel": "法令1", "subCategory": "貯蔵所・取扱所", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、貯蔵所及び取扱所の区分について、次のA〜Dのうち、正しいものの組合せはどれか。\n\nA. 第二種販売取扱所とは、店舗において容器入りのままで販売するため危険物を取り扱う取扱所で、指定数量の倍数が15を超え40以下のものをいう。\nB. 移動タンク貯蔵所とは、車両、鉄道の貨車又は船舶に固定されたタンクにおいて危険物を貯蔵し、又は取り扱う。\nC. 給油取扱所とは、金属製ドラム等のみに直接給油するためガソリンを取り扱う施設。\nD. 屋内タンク貯蔵所とは、屋内にあるタンクにおいて危険物を貯蔵し、又は取り扱う貯蔵所をいう。", "options": ["A、B", "A、C", "A、D", "B、C", "B、D"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "AとDが正しいです。Bは移動タンク貯蔵所の説明に鉄道貨車・船舶を含めている点が誤りです。Cは給油取扱所の説明として不適切です。", "source": "法令1.pdf p.11", "status": "OK"}, {"id": "law1-022", "originalId": "", "genreLabel": "法令1", "subCategory": "貯蔵所・取扱所", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、貯蔵所及び取扱所の区分について、次のうち誤っているものはどれか。", "options": ["屋内貯蔵所とは、屋内の場所において容器入りの危険物を貯蔵し、又は取り扱う貯蔵所をいう。", "屋内タンク貯蔵所とは、屋内にあるタンクにおいて危険物を貯蔵し、又は取り扱う貯蔵所をいう。", "屋外タンク貯蔵所とは、屋外にあるタンクにおいて危険物を貯蔵し、又は取り扱う貯蔵所をいう。", "第二種販売取扱所とは、店舗において容器入りのままで販売するため危険物を取り扱う取扱所で、指定数量の倍数が15を超え40以下のものをいう。", "一般取扱所とは、配管及びポンプ並びにこれらに付属する設備によって危険物の移送の取扱いを行う取扱所をいう。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "選択肢5は移送取扱所の説明です。一般取扱所は、給油取扱所、販売取扱所、移送取扱所以外の取扱所です。", "source": "法令1.pdf p.12", "status": "OK"}, {"id": "law1-023", "originalId": "", "genreLabel": "法令1", "subCategory": "製造所等の区分", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等の区分について、次のうち正しいものはどれか。", "options": ["屋外にあるタンクで危険物を貯蔵し、又は取り扱う貯蔵所を屋外貯蔵所という。", "屋内にあるタンクで危険物を貯蔵し、又は取り扱う貯蔵所を屋内貯蔵所という。", "店舗において容器入りのままで販売するため、指定数量の倍数が15以下の危険物を取り扱う取扱所を第一種販売取扱所という。", "ボイラーで重油等を消費する施設を製造所という。", "金属製ドラム等のみに直接給油するためガソリンを取り扱う施設を給油取扱所という。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "指定数量の倍数が15以下の危険物を、店舗で容器入りのまま販売する取扱所は第一種販売取扱所です。", "source": "法令1.pdf p.12-13", "status": "OK"}, {"id": "law1-024", "originalId": "", "genreLabel": "法令1", "subCategory": "設置・変更", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等の位置、構造又は設備を変更する場合の手続きとして、次のうち正しいものはどれか。", "options": ["変更工事完了後、速やかに市町村長等に届け出なければならない。", "変更工事完了の10日前までに市町村長等に届け出なければならない。", "変更の計画を市町村長等に届け出てから変更工事を開始しなければならない。", "市町村長等の変更許可を受けてから変更工事を開始しなければならない。", "変更工事を開始しようとする日の10日前までに市町村長等に届け出なければならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "製造所等の位置、構造又は設備を変更する場合は、あらかじめ市町村長等の変更許可を受けてから工事を開始します。", "source": "法令1.pdf p.14", "status": "OK"}, {"id": "law1-025", "originalId": "", "genreLabel": "法令1", "subCategory": "設置許可・完成検査", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次の文の（　）内のA〜Cに当てはまる語句の組み合わせとして、正しいものはどれか。\n\n「製造所等（移送取扱所を除く。）を設置するためには、消防本部及び消防署を置く市町村の区域では当該（A）、その他の区域では当該区域を管轄する（B）の許可を受けなければならない。また、工事完了後には技術上の基準に適合しているかどうか（C）を受けなければならない。」", "options": ["A：消防長又は消防署長　B：市町村長　C：機能検査", "A：市町村長　B：都道府県知事　C：完成検査", "A：市町村長　B：都道府県知事　C：機能検査", "A：消防長　B：市町村長　C：完成検査", "A：消防署長　B：都道府県知事　C：機能検査"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "消防本部及び消防署を置く市町村の区域では市町村長、その他の区域では都道府県知事の許可を受けます。工事完了後は完成検査を受けます。", "source": "法令1.pdf p.14-15", "status": "OK"}, {"id": "law1-026", "originalId": "", "genreLabel": "法令1", "subCategory": "各種手続き", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、各種手続きについて、次のうち誤っているものはどれか。", "options": ["製造所等以外の場所で指定数量以上の危険物を10日以内の期間、仮に貯蔵し、又は取り扱う場合は、所轄消防長又は消防署長の承認を受けなければならない。", "製造所等の譲渡又は引渡しを受けた場合は、市町村長等に届け出なければならない。", "製造所等の位置、構造又は設備を変更する場合は、所轄消防長又は消防署長に届け出なければならない。", "製造所等において、予防規程を定めた場合は、市町村長等の認可を受けなければならない。", "製造所等を設置したときは、使用する前に市町村長等の検査を受けなければならない。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "製造所等の位置、構造又は設備を変更する場合は、届出ではなく市町村長等の許可が必要です。", "source": "法令1.pdf p.15-16", "status": "OK"}, {"id": "law1-027", "originalId": "", "genreLabel": "法令1", "subCategory": "設置場所と許可権者", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等を設置する場合の設置場所と許可権者の組合せとして、次のうち誤っているものはどれか。", "options": ["消防本部及び消防署を設置している市町村の区域に設置される製造所等（移送取扱所を除く。）｜当該市町村長", "消防本部及び消防署を設置していない市町村の区域に設置される製造所等（移送取扱所を除く。）｜当該区域を管轄する都道府県知事", "消防本部及び消防署を設置している1の市町村の区域内に設置される移送取扱所｜当該市町村長", "2以上の市町村の区域にわたって設置される移送取扱所｜消防庁長官", "2以上の都道府県の区域にわたって設置される移送取扱所｜総務大臣"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "2以上の市町村の区域にわたる移送取扱所は、原則として都道府県知事が許可権者です。消防庁長官ではありません。", "source": "法令1.pdf p.16-17", "status": "OK"}, {"id": "law1-028", "originalId": "", "genreLabel": "法令1", "subCategory": "仮使用", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等の仮使用について、次のうち正しいものはどれか。", "options": ["市町村長等の承認を受ける前に、貯蔵し、又は取り扱う危険物の品名、数量又は指定数量の倍数を変更し、仮に使用すること。", "製造所等を変更する場合に、変更工事が終了した一部について、順次、市町村長等の承認を受けて、仮に使用すること。", "製造所等を変更する場合に、変更工事に係る部分以外の部分で、指定数量以上の危険物を10日以内の期間、仮に使用すること。", "製造所等を変更する場合に、変更工事に係る部分以外の部分の全部又は一部について市町村長等の承認を受け、完成検査を受ける前に、仮に使用すること。", "製造所等の譲渡又は引渡しがある場合に、市町村長等の承認を受ける前に、仮に使用すること。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "仮使用は、変更工事に係る部分以外の全部又は一部について、市町村長等の承認を受けることで、完成検査前でも使用できる制度です。", "source": "法令1.pdf p.16-17", "status": "OK"}, {"id": "law2-001", "originalId": "", "genreLabel": "法令2", "subCategory": "仮使用", "difficulty": 2, "type": "誤っている箇所を選べ", "question": "法令上、製造所等の仮使用に関する次の文の下線部分A〜Eのうち、誤っている箇所はどれか。\n\n「製造所、貯蔵所又は取扱所の位置、構造又は設備を変更する場合において、当該製造所、貯蔵所又は取扱所のうち当該変更の（A）工事に係る部分以外の部分の（B）全部又は一部について（C）所轄消防長又は消防署長の（D）承認を受けたときは（E）完成検査を受ける前においても、仮に、当該承認を受けた部分を使用することができる。」", "options": ["A", "B", "C", "D", "E"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "仮使用の承認権者は「所轄消防長又は消防署長」ではなく「市町村長等」です。したがってCが誤りです。", "source": "法令2.pdf p.1", "status": "OK"}, {"id": "law2-002", "originalId": "", "genreLabel": "法令2", "subCategory": "仮使用", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次の文の（　）内のA及びBに当てはまる語句の組み合わせとして、正しいものはどれか。\n\n「製造所、貯蔵所又は取扱所の位置、構造又は設備を変更する場合において、当該製造所、貯蔵所又は取扱所のうち当該変更の（A）の全部又は一部について（B）の承認を受けたときは、完成検査を受ける前においても、仮に当該承認を受けた部分を使用することができる。」", "options": ["A：工事に係る部分以外の部分　B：市町村長等", "A：工事に係る部分以外の部分　B：消防長又は消防署長", "A：工事に係る部分　B：市町村長等", "A：工事に係る部分　B：消防長又は消防署長", "A：工事に係る部分　B：消防庁長官"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "仮使用は、変更工事に係る部分以外の全部又は一部について、市町村長等の承認を受けた場合に認められます。", "source": "法令2.pdf p.1-2", "status": "OK"}, {"id": "law2-003", "originalId": "", "genreLabel": "法令2", "subCategory": "完成検査前検査", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、完成検査前検査に関する記述について、次のうち誤っているものはどれか。", "options": ["容量が指定数量以上の液体危険物タンクを有しない製造所は、完成検査前検査を受けなくてもよい。", "液体危険物タンクの基礎及び地盤に関する事項についての完成検査前検査に、基礎・地盤検査がある。", "液体危険物タンクの外面の保護に関する事項についての完成検査前検査に、膜厚検査がある。", "液体危険物タンクの溶接部に関する事項についての完成検査前検査に、溶接部検査がある。", "完成検査前検査において、技術上の基準に適合すると認められた事項については、完成検査を受けなくてもよい。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "完成検査前検査で適合していても、完成検査そのものを省略できるわけではありません。完成検査は別に受ける必要があります。", "source": "法令2.pdf p.2", "status": "OK"}, {"id": "law2-004", "originalId": "", "genreLabel": "法令2", "subCategory": "製造所の設置等", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所の設置等について、次のうち誤っているものはどれか。", "options": ["製造所の保有空地を変更するときは、市町村長等の変更の許可が必要である。", "製造所を設置するときは、工事期間の中間で、完成検査時に目視できない地下埋設配管の完成検査前検査を行った後でなければ、完成検査は実施できない。", "製造所の構造を変更するときは、市町村長等の変更の許可を受けなければ、工事に着手できない。", "設置工事が終了し、市町村長等から完成検査済証を交付された場合は、製造所を使用できる。", "市町村長等に変更の許可を申請する場合は、変更の内容に関する図面その他規則で定める書類を添付しなければならない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "「工事期間の中間で」という記述が不適切です。完成検査前検査と完成検査は別の手続きです。", "source": "法令2.pdf p.3", "status": "OK"}, {"id": "law2-005", "originalId": "", "genreLabel": "法令2", "subCategory": "届出の種類と時期", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等に関する届出の種類と時期の組み合わせとして、次のうち誤っているものはどれか。", "options": ["製造所等の譲渡又は引渡しの届出｜製造所等の譲渡又は引渡しをした後、遅滞なく", "危険物の品名、数量、指定数量の倍数の変更の届出｜変更する日の10日前まで", "製造所等の用途の廃止の届出｜製造所等を廃止した後、遅滞なく", "危険物保安監督者の選任又は解任の届出｜選任又は解任した後、遅滞なく", "危険物施設保安員の選任又は解任の届出｜選任又は解任する日の10日前まで"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "危険物施設保安員の選任又は解任の届出は、事前10日前ではなく、選任又は解任した後、遅滞なく行います。", "source": "法令2.pdf p.4-5", "status": "OK"}, {"id": "law2-006", "originalId": "", "genreLabel": "法令2", "subCategory": "各種規制・手続き", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、次のうち誤っているものはどれか。", "options": ["指定数量未満の危険物の貯蔵又は取扱いの技術上の基準は、市町村条例で定められている。", "製造所等の位置、構造又は設備を変更しないで、貯蔵し、又は取り扱う危険物の種類又は数量を変更したときは、速やかに所轄消防署長の認可を受けなければならない。", "製造所等を廃止したときは、遅滞なくその旨を市町村長等に届け出なければならない。", "消防職員が市町村長の定める証票を示して、指定数量以上の危険物を貯蔵し、又は取り扱っている場所に立ち入り、検査や質問をしたときは、関係者は、これに応じなければならない。", "製造所等の所有者等は、危険物保安監督者を定めたとき、又はこれを解任したときは、遅滞なくその旨を市町村長等に届け出なければならない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "危険物の品名、数量、指定数量の倍数を変更しようとする場合は、変更する日の10日前までに市町村長等に届け出ます。認可ではありません。", "source": "法令2.pdf p.4-5", "status": "OK"}, {"id": "law2-007", "originalId": "", "genreLabel": "法令2", "subCategory": "品名・数量変更の届出", "difficulty": 2, "type": "誤っている箇所を選べ", "question": "法令上、次の文の下線部分A〜Eのうち、誤っている箇所はどれか。\n\n「製造所等の位置、構造又は設備を変更しないで、当該製造所等において貯蔵し、又は取り扱う危険物の（A）品名、（B）数量又は指定数量の倍数を変更しようとする者は、（C）遅滞なくその旨を（D）市町村長等に（E）届け出なければならない。」", "options": ["A", "C", "A、B", "B、C", "A、B、C"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "品名・数量・指定数量の倍数を変更しようとする場合は、「遅滞なく」ではなく、変更する日の10日前までに届け出ます。", "source": "法令2.pdf p.5", "status": "OK"}, {"id": "law2-008", "originalId": "", "genreLabel": "法令2", "subCategory": "事前届出", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等の所有者等があらかじめ市町村長等に届出をしなければならないのは、次のうちどれか。", "options": ["製造所等の譲渡又は引渡しを受ける場合", "製造所等の位置、構造又は設備を変更しないで、製造所等で貯蔵し、又は取り扱う危険物の品名、数量を変更する場合", "製造所等を廃止する場合", "危険物保安監督者を定めなければならない製造所等において、危険物保安監督者を定める場合", "危険物施設保安員を定めなければならない製造所等において、危険物施設保安員を定める場合"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "危険物の品名、数量、指定数量の倍数を変更する場合は、変更する日の10日前までに届け出ます。", "source": "法令2.pdf p.6", "status": "OK"}, {"id": "law2-009", "originalId": "", "genreLabel": "法令2", "subCategory": "届出が必要な場合", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等の所有者等が市町村長等に届け出なければならない場合として、次のうち誤っているものはどれか。", "options": ["製造所等の譲渡又は引渡しを受けたとき。", "製造所等の定期点検を実施したとき。", "危険物保安統括管理者を定めたとき。", "危険物保安監督者を解任したとき。", "製造所等の用途を廃止したとき。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "定期点検を実施したことは届出事項ではありません。点検記録の保存義務はあります。", "source": "法令2.pdf p.6", "status": "OK"}, {"id": "law2-010", "originalId": "", "genreLabel": "法令2", "subCategory": "廃止の届出", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次の文の（　）内のA〜Cに当てはまる語句の組み合わせとして、正しいものはどれか。\n\n「製造所、貯蔵所又は取扱所の所有者、管理者又は占有者は、当該製造所、貯蔵所又は取扱所の用途を廃止したときは、（A）その旨を（B）に（C）なければならない。」", "options": ["A：遅滞なく　B：市町村長等　C：届け出", "A：遅滞なく　B：市町村長等　C：承認を受け", "A：遅滞なく　B：所轄消防長又は消防署長　C：届け出", "A：10日以内に　B：市町村長等　C：承認を受け", "A：10日以内に　B：所轄消防長又は消防署長　C：承認を受け"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "製造所等の用途を廃止したときは、遅滞なく市町村長等に届け出なければなりません。", "source": "法令2.pdf p.6", "status": "OK"}, {"id": "law2-011", "originalId": "", "genreLabel": "法令2", "subCategory": "仮貯蔵・仮取扱い", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次の文の（　）内のA〜Cに当てはまるものの組み合わせとして、正しいものはどれか。\n\n「指定数量以上の危険物は、貯蔵所以外の場所でこれを貯蔵し、又は製造所等以外の場所でこれを取り扱ってはならない。ただし、（A）の（B）を受けて指定数量以上の危険物を、（C）以内の期間、仮に貯蔵し、又は取り扱う場合は、この限りではない。」", "options": ["A：市町村長等　B：承認　C：10日", "A：市町村長等　B：許可　C：10日", "A：市町村長等　B：許可　C：14日", "A：所轄消防長又は消防署長　B：承認　C：10日", "A：所轄消防長又は消防署長　B：許可　C：14日"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "仮貯蔵・仮取扱いは、所轄消防長又は消防署長の承認を受けて、10日以内の期間に限って認められます。", "source": "法令2.pdf p.7", "status": "OK"}, {"id": "law2-012", "originalId": "", "genreLabel": "法令2", "subCategory": "仮貯蔵の基準", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等以外の場所において、指定数量以上の危険物を仮に貯蔵する場合の基準について、次のうち正しいものはどれか。", "options": ["貯蔵する期間は20日以内としなければならない。", "貯蔵しようとする日から10日以内に市町村長等に申し出なければならない。", "市町村条例で定める基準に従って、貯蔵しなければならない。", "貯蔵する危険物の数量は、指定数量の倍数が2以下としなければならない。", "貯蔵する場合、所轄消防長または消防署長の承認を得なければならない。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "指定数量以上の危険物を製造所等以外で仮に貯蔵するには、所轄消防長又は消防署長の承認が必要です。期間は10日以内です。", "source": "法令2.pdf p.7", "status": "OK"}, {"id": "law2-013", "originalId": "", "genreLabel": "法令2", "subCategory": "仮貯蔵・仮取扱い", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、指定数量以上の危険物を製造所等以外の場所で仮に貯蔵し、又は取り扱う場合について、次のうち正しいものはどれか。", "options": ["市町村長等に届け出れば、危険物を貯蔵し、又は取り扱うことができる。", "危険物を貯蔵し、又は取り扱う場合には、危険物保安監督者の選任が必要である。", "危険物を貯蔵し、又は取り扱うことができる期間に制限はない。", "貯蔵し、又は取り扱うことのできる危険物の指定数量の倍数は10以下である。", "所轄消防長又は消防署長の承認を受けないで指定数量以上の危険物を貯蔵し、又は取り扱っている者は、危険物の除去を命ぜられることがある。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "承認を受けずに仮貯蔵・仮取扱いをしている場合、危険物の除去その他災害防止のための措置を命ぜられることがあります。", "source": "法令2.pdf p.8-9", "status": "OK"}, {"id": "law2-014", "originalId": "", "genreLabel": "法令2", "subCategory": "仮貯蔵の手続き", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等以外の場所で指定数量以上の危険物を仮に貯蔵し、又は取り扱う場合の手続きとして、次のうち正しいものはどれか。", "options": ["管轄の市町村長等に届け出る。", "管轄の都道府県知事の認可を受ける。", "所轄消防長又は消防署長に届け出る。", "管轄の市町村長等の認可を受ける。", "所轄消防長又は消防署長の承認を受ける。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "仮貯蔵・仮取扱いは、所轄消防長又は消防署長の承認を受けます。届出や認可ではありません。", "source": "法令2.pdf p.8-9", "status": "OK"}, {"id": "law2-015", "originalId": "", "genreLabel": "法令2", "subCategory": "仮貯蔵の基準", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、製造所等以外の場所において、指定数量以上の危険物を仮に貯蔵する場合の基準について、次のA〜Dのうち正しいものの組合せはどれか。\n\nA. 貯蔵する場合、所轄消防長または消防署長の承認を得なければならない。\nB. 貯蔵する危険物の量は、指定数量の10倍以下としなければならない。\nC. 危険物保安監督者を定めなければならない。\nD. 貯蔵する期間は10日以内としなければならない。", "options": ["AとB", "AとC", "AとD", "BとC", "CとD"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "正しいのはAとDです。仮貯蔵・仮取扱いには承認が必要で、期間は10日以内です。数量10倍以下や保安監督者選任の規定ではありません。", "source": "法令2.pdf p.9", "status": "OK"}, {"id": "law2-016", "originalId": "", "genreLabel": "法令2", "subCategory": "危険物取扱者の責務", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、危険物取扱者の責務に関する条文について、次の文の（　）内のA及びBに当てはまる語句の組み合わせとして、正しいものはどれか。\n\n「危険物取扱者は、危険物の取扱作業に従事するときは、法第10条第3項の（A）の技術上の基準を遵守するとともに、当該危険物の（B）について細心の注意を払わなければならない。」", "options": ["A：位置、構造及び設備　B：保安の確保", "A：位置、構造及び設備　B：安全の確保", "A：貯蔵または取扱い　B：貯蔵や取扱い", "A：位置、構造及び設備　B：貯蔵や取扱い", "A：貯蔵または取扱い　B：保安の確保"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "法第10条第3項は、危険物の貯蔵又は取扱いの技術上の基準です。危険物取扱者は保安の確保に細心の注意を払います。", "source": "法令2.pdf p.10", "status": "OK"}, {"id": "law2-017", "originalId": "", "genreLabel": "法令2", "subCategory": "危険物取扱者の立会い", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等における危険物取り扱い時の危険物取扱者の立会いについて、次のうち正しいものはどれか。", "options": ["危険物施設保安員が危険物を取り扱う場合は、すべて立会いを必要としない。", "乙種危険物取扱者が取り扱うことができる危険物以外の危険物を取り扱う場合は、甲種又は当該危険物を取り扱うことができる乙種危険物取扱者の立会いが必要である。", "危険物取扱者以外の従業員が危険物を取り扱う場合は、所有者の指示があれば、立会いを必要としない。", "丙種危険物取扱者は、取り扱うことができる危険物の取扱作業についてのみ立ち会うことができる。", "危険物取扱作業に立ち会うことができる危険物取扱者は、6か月以上の実務経験が必要である。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "乙種が取り扱える危険物以外を扱う場合は、甲種又は当該危険物を扱える乙種危険物取扱者の立会いが必要です。丙種は立会いができません。", "source": "法令2.pdf p.10-11", "status": "OK"}, {"id": "law2-018", "originalId": "", "genreLabel": "法令2", "subCategory": "危険物取扱者", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、危険物取扱者について、次のうち誤っているものはどれか。", "options": ["危険物取扱者とは、危険物取扱者試験に合格し、免状の交付を受けている者をいう。", "危険物の取扱作業に従事するときは、貯蔵または取扱いの技術上の基準を遵守するとともに、当該危険物の保安の確保について細心の注意を払わなければならない。", "丙種危険物取扱者は、危険物保安監督者になることができない。", "甲種危険物取扱者又は乙種危険物取扱者は、危険物の取扱作業の立会いをする場合は、取扱作業に従事する者が危険物の貯蔵又は取扱いの技術上の基準を遵守するように監督しなければならない。", "危険物取扱者であれば、危険物取扱者以外の者による危険物の取扱作業に立ち会うことができる。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "立会いができるのは甲種又は乙種危険物取扱者です。丙種危険物取扱者は、他者の危険物取扱作業に立ち会うことはできません。", "source": "法令2.pdf p.11-12", "status": "OK"}, {"id": "law2-019", "originalId": "", "genreLabel": "法令2", "subCategory": "丙種の取扱対象", "difficulty": 2, "type": "定められていないものを選べ", "question": "製造所等において、丙種危険物取扱者が取り扱うことができる危険物として、規則に定められていないものはどれか。", "options": ["重油", "第3石油類の潤滑油", "固形アルコール", "第3石油類のうち、引火点が130℃以上のもの", "第4石油類のすべて"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "固形アルコールは、丙種危険物取扱者が取り扱うことができる危険物として定められていません。", "source": "法令2.pdf p.12-13", "status": "OK"}, {"id": "law2-020", "originalId": "", "genreLabel": "法令2", "subCategory": "危険物取扱者以外の取扱い", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、危険物取扱者以外の者が行う危険物の取り扱いについて、次のうち誤っているものはどれか。", "options": ["製造所等では、甲種危険物取扱者が立ち会えば、すべての危険物を取り扱うことができる。", "製造所等では、第1類の免状を有する危険物取扱者が立会いをしても、第2類の危険物を取り扱うことはできない。", "製造所等では、丙種危険物取扱者が立会いをしても、危険物を取り扱うことはできない。", "製造所等以外の場所では、危険物取扱者の立会いがなくても、指定数量未満の危険物であれば市町村条例に基づいて取り扱うことができる。", "製造所等では、危険物取扱者の立会いがなくても、指定数量未満の危険物であれば取り扱いができる。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "製造所等では、指定数量未満であっても、危険物取扱者以外の者が取り扱う場合は甲種又は乙種の立会いが必要です。", "source": "法令2.pdf p.12-13", "status": "OK"}, {"id": "law2-021", "originalId": "", "genreLabel": "法令2", "subCategory": "危険物取扱者", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、危険物取扱者に関する記述について、次のうち正しいものはどれか。", "options": ["給油取扱所において、乙種危険物取扱者が急用で不在となったため、業務内容に詳しい丙種危険物取扱者が立会い、免状を有していない従業員に給油を行わせた。", "重油を貯蔵する屋外タンク貯蔵所において、危険物保安監督者が退職したので、丙種危険物取扱者を危険物保安監督者として選任した。", "移動タンク貯蔵所に丙種危険物取扱者を乗車させて、エタノールの移送を行った。", "屋内貯蔵所で貯蔵する危険物をガソリンからアセトンに変更したが、法別表第1の品名が同じのため、従前のまま丙種危険物取扱者が危険物の取り扱いを行った。", "一般取扱所で、丙種危険物取扱者が灯油を容器に詰め替えた。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "灯油は丙種危険物取扱者が取り扱うことができる危険物に含まれます。丙種は立会い不可、保安監督者不可、エタノールやアセトンは取扱対象外です。", "source": "法令2.pdf p.13", "status": "OK"}, {"id": "law2-022", "originalId": "", "genreLabel": "法令2", "subCategory": "免状の交付・書換・再交付", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、免状の交付、書換え又は再交付の手続きについて、次のうち誤っているものはどれか。", "options": ["危険物取扱者試験に合格したので、試験を行った都道府県知事に免状の交付を申請した。", "免状を亡失したので、以前免状の書換えをした都道府県知事に免状の再交付を申請した。", "本籍地は変わらないが居住地が変わったので新たに居住地を管轄する都道府県知事に免状の書換えを申請した。", "氏名が変わったので、勤務地を管轄する都道府県知事に免状の書換えを申請した。", "亡失により免状の再交付を受けたが、亡失した免状を発見したので、再交付を受けた都道府県知事に亡失した免状を提出した。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "居住地の変更だけでは免状の書換えは不要です。書換えが必要なのは氏名、本籍地の属する都道府県、写真などです。", "source": "法令2.pdf p.14", "status": "OK"}, {"id": "law2-023", "originalId": "", "genreLabel": "法令2", "subCategory": "免状の再交付", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、免状を亡失・滅失・汚損・破損した場合の再交付の申請について、次のうち誤っているものはどれか。", "options": ["当該免状を交付した都道府県知事に申請することができる。", "当該免状の書換えをした都道府県知事に申請することができる。", "居住地を管轄する都道府県知事に申請することができる。", "汚損または破損により免状の再交付を申請する場合は、当該免状を添えて申請しなければならない。", "免状を亡失してその再交付を受けた者は、亡失した免状を発見した場合は、これを10日以内に免状の再交付を受けた都道府県知事に提出しなければならない。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "再交付の申請先は、交付した都道府県知事又は書換えをした都道府県知事です。居住地を管轄する都道府県知事ではありません。", "source": "法令2.pdf p.14", "status": "OK"}, {"id": "law2-024", "originalId": "", "genreLabel": "法令2", "subCategory": "免状の記載事項", "difficulty": 2, "type": "定められていないものを選べ", "question": "法令上、免状の記載事項として定められていないものは、次のうちどれか。", "options": ["氏名及び生年月日", "過去10年以内に撮影した写真", "居住地の属する都道府県", "免状の交付年月日及び交付番号", "免状の種類"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "免状には本籍地の属する都道府県は記載されますが、居住地の属する都道府県は記載事項ではありません。", "source": "法令2.pdf p.15", "status": "OK"}, {"id": "law2-025", "originalId": "", "genreLabel": "法令2", "subCategory": "免状の返納命令", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、免状の返納を命じることができるのは、次のうちどれか。", "options": ["消防長", "都道府県知事", "消防庁長官", "消防署長", "市町村長"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "危険物取扱者が法令違反等をした場合、免状の返納を命じることができるのは都道府県知事です。", "source": "法令2.pdf p.15", "status": "OK"}, {"id": "law2-026", "originalId": "", "genreLabel": "法令2", "subCategory": "免状", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、危険物取扱者の免状に関する記述について、次のうち正しいものはどれか。", "options": ["危険物取扱者が法又は法に基づく命令の規定に違反しているときは、所轄消防署長から免状の返納を命ぜられることがある。", "免状を汚損したとき、再交付の申請をすることができる。", "居住地を変更したとき、免状の書換えをしなければならない。", "免状の返納を命じられた者は、その日から起算して2年を経過しないと免状の交付を受けることができない。", "再交付は、居住地又は勤務地を管轄する都道府県知事に申請しなければならない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "免状を汚損したときは再交付申請ができます。返納命令は都道府県知事、交付制限は1年、居住地変更だけでは書換え不要です。", "source": "法令2.pdf p.15-16", "status": "OK"}, {"id": "law2-027", "originalId": "", "genreLabel": "法令2", "subCategory": "免状の申請先", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、危険物取扱者免状の書換え及び再交付の申請先について、次のうち正しい組合せはどれか。", "options": ["書換え：居住地を管轄する知事｜再交付：交付した知事又は居住地若しくは勤務地を管轄する知事", "書換え：交付した知事又は勤務地を管轄する知事｜再交付：交付した知事若しくは書換えした知事又は居住地を管轄する知事", "書換え：居住地又は勤務地を管轄する知事｜再交付：交付した知事又は居住地を管轄する知事", "書換え：交付した知事又は居住地を管轄する知事｜再交付：居住地又は勤務地を管轄する知事", "書換え：交付した知事又は居住地若しくは勤務地を管轄する知事｜再交付：交付した知事又は書換えした知事"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "書換えは、交付した知事・居住地を管轄する知事・勤務地を管轄する知事に申請できます。再交付は、交付した知事又は書換えした知事に申請します。", "source": "法令2.pdf p.16", "status": "OK"}, {"id": "law2-028", "originalId": "", "genreLabel": "法令2", "subCategory": "免状の書換え", "difficulty": 2, "type": "誤っているものをすべて選べ", "question": "法令上、免状の書換えについて、次のA〜Eのうち誤っているもののみをすべて掲げているものはどれか。\n\nA. 保安に関する講習を受けたとき。\nB. 現住所を変更したとき。\nC. 氏名が変わったとき。\nD. 免状の写真が撮影から10年を超えたとき。\nE. 本籍地の属する都道府県が変更したとき。", "options": ["AとB", "AとE", "BとC", "CとD", "DとE"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "書換えが必要なのは、氏名変更、本籍地の属する都道府県変更、写真が撮影から10年を超えたときなどです。講習受講と現住所変更は書換え事由ではありません。", "source": "法令2.pdf p.17", "status": "OK"}, {"id": "law2-029", "originalId": "", "genreLabel": "法令2", "subCategory": "免状の不交付", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、免状の交付について、次の文の（　）内のA〜Cに当てはまる語句の組み合わせとして、正しいものはどれか。\n\n「法令に違反して（A）から免状の返納を命じられた者は、（B）から起算して（C）が経過しないと免状の交付を受けることができない。」", "options": ["A：市町村長　B：返納を命ぜられた日　C：2年", "A：市町村長　B：返納した日　C：2年", "A：都道府県知事　B：返納を命ぜられた日　C：1年", "A：都道府県知事　B：返納を命ぜられた日　C：2年", "A：都道府県知事　B：返納した日　C：1年"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "免状の返納命令は都道府県知事が行います。返納を命ぜられた日から起算して1年を経過しない者には、免状の交付が制限されます。", "source": "法令2.pdf p.17", "status": "OK"}, {"id": "law3-001", "originalId": "", "genreLabel": "法令3", "subCategory": "危険物取扱者", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、危険物取扱者について、次のうち誤っているものはどれか。", "options": ["危険物取扱者でなければ、危険物保安統括管理者になることはできない。", "危険物取扱者でなくても、危険物施設保安員になることができる。", "丙種危険物取扱者は、危険物取扱者以外の者による危険物の取扱作業に立ち会うことはできない。", "移動タンク貯蔵所で危険物を移送する場合、移送者として危険物取扱者が乗車していれば、運転する者は危険物取扱者でなくてもよい。", "甲種危険物取扱者は、すべての危険物を取り扱うことができる。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "危険物保安統括管理者は、必ずしも危険物取扱者である必要はありません。", "source": "法令3.pdf p.1", "status": "OK"}, {"id": "law3-002", "originalId": "", "genreLabel": "法令3", "subCategory": "危険物保安統括管理者", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次のA〜Dの危険物保安統括管理者に関する記述のうち、正しいもののみをすべて掲げているものはどれか。\n\nA. 危険物保安統括管理者は、免状の交付を受けていなくても、製造所等において、危険物取扱者の立会いなしに危険物を取り扱うことができる。\nB. 危険物施設保安員が50人を超える事業所にあっては、危険物保安統括管理者を選任しなければならない。\nC. 危険物保安統括管理者を定めなければならない製造所等において、危険物保安統括管理者を定めていない場合は、市町村長等から施設の使用停止命令を受けることがある。\nD. 危険物保安統括管理者は、事業所においてその事業の実施を統括管理する者をもって充てなければならない。", "options": ["A", "A、B", "C、D", "A、C、D", "B、C、D"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "Aは免状なしで立会いなしに危険物を取り扱えるという内容が誤りです。Bも危険物施設保安員の人数で選任義務が決まるわけではありません。C、Dが正しいです。", "source": "法令3.pdf p.1", "status": "OK"}, {"id": "law3-003", "originalId": "", "genreLabel": "法令3", "subCategory": "危険物保安統括管理者", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、一定数量以上の第4類の危険物を貯蔵し、又は取り扱う製造所等で、危険物保安統括管理者を選任しなければならない旨の規定が設けられているものは、次のうちどれか。", "options": ["製造所", "給油取扱所", "屋外タンク貯蔵所", "第二種販売取扱所", "屋内貯蔵所"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "一定数量以上の第4類危険物を扱う製造所等では、危険物保安統括管理者の選任義務が設けられる場合があります。この選択肢では製造所が該当します。", "source": "法令3.pdf p.1", "status": "OK"}, {"id": "law3-004", "originalId": "", "genreLabel": "法令3", "subCategory": "保安員・保安監督者・統括管理者", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、危険物施設保安員、危険物保安監督者及び危険物保安統括管理者の選任について、次のうち誤っているものはどれか。", "options": ["危険物施設保安員は、危険物取扱者でなくてもよい。", "危険物保安監督者は、甲種危険物取扱者又は乙種危険物取扱者でなければならない。", "危険物保安統括管理者は、危険物取扱者でなくてもよい。", "危険物保安監督者は、製造所等において、6か月以上の危険物取扱いの実務経験が必要である。", "危険物施設保安員は、製造所等において、6か月以上の危険物取扱いの実務経験が必要である。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "危険物施設保安員は、危険物取扱者である必要も、6か月以上の危険物取扱い実務経験がある必要もありません。", "source": "法令3.pdf p.2", "status": "OK"}, {"id": "law3-005", "originalId": "", "genreLabel": "法令3", "subCategory": "危険物施設保安員", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、危険物施設保安員について、次のうち正しいものはどれか。", "options": ["指定数量の倍数が100の屋内貯蔵所には、危険物施設保安員を定めなければならない。", "危険物施設保安員は、甲種又は乙種危険物取扱者でなければならない。", "製造所等の所有者は、危険物施設保安員を定めたときは、遅滞なくその旨を市町村長等に届け出なければならない。", "危険物施設保安員は、製造所等の構造及び設備に係る保安のための業務を行う。", "危険物施設保安員は、危険物保安監督者が旅行、疾病その他の事故によってその業務を行うことができない場合にその業務を代行しなければならない。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "危険物施設保安員は、製造所等の構造及び設備に係る保安のための業務を行います。", "source": "法令3.pdf p.2", "status": "OK"}, {"id": "law3-006", "originalId": "", "genreLabel": "法令3", "subCategory": "危険物施設保安員", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、一定数量以上の危険物を貯蔵し、又は取り扱うようになると危険物施設保安員を選任しなければならない旨の規定が設けられている製造所等は、次のうちどれか。", "options": ["製造所", "屋内貯蔵所", "給油取扱所", "第二種販売取扱所", "屋外タンク貯蔵所"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "危険物施設保安員の選任義務は、指定数量の倍数が一定以上の製造所や一般取扱所、移送取扱所などに設けられます。この選択肢では製造所が該当します。", "source": "法令3.pdf p.2", "status": "OK"}, {"id": "law3-007", "originalId": "", "genreLabel": "法令3", "subCategory": "危険物施設保安員の業務", "difficulty": 2, "type": "2つ選べ", "question": "危険物施設保安員に関する記述について、法令上、定められていないものを次から2つ答えなさい。", "options": ["危険物施設保安員は、製造所等の計測装置、制御装置、安全装置等の機能が適正に保持されるようにこれを保安管理しなければならない。", "危険物施設保安員は、危険物の取扱作業にあたり、危険物取扱者に対して必要な指示を与えなければならない。", "製造所等の所有者等は、危険物取扱者以外の者から危険物施設保安員を選任することができる。", "危険物施設保安員は、施設の異常を発見したときは、危険物保安監督者その他関係のある者に連絡するとともに、状況を判断して適当な措置を講ずること。", "危険物施設保安員は、火災が発生したとき又は火災発生の危険が著しいときは、危険物保安監督者と協力して、応急措置を講じなければならない。", "危険物施設保安員は、定期及び臨時の点検を行ったときは、記録し、保存しなければならない。また、3年に1回は所轄消防長又は消防署長に報告をしなければならない。"], "correctNos": [2, 6], "answerIndexes": [1, 5], "correctNo": 2, "answer": 1, "explanation": "危険物取扱者に対して必要な指示を与えるという形では定められていません。また、点検記録を3年に1回所轄消防長又は消防署長へ報告するという規定もありません。", "source": "法令3.pdf p.3", "status": "OK"}, {"id": "law3-008", "originalId": "", "genreLabel": "法令3", "subCategory": "予防規程", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、予防規程に関する記述について、次のうち正しいものはどれか。", "options": ["製造所等の危険物保安監督者は、予防規程を定めなければならない。", "危険物取扱者が不在時の危険物の取り扱いについて、予防規程に定めなければならない。", "予防規程を定めたときは、遅滞なく市町村長等に届け出なければならない。", "製造所等の所有者等のほか、その従業者も予防規程を守らなければならない。", "火災の予防のため必要とされる場合、所轄消防署長から予防規程の変更を命ぜられることがある。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "予防規程は所有者等だけでなく、その従業者も守らなければなりません。予防規程は届出ではなく、市町村長等の認可が必要です。", "source": "法令3.pdf p.4", "status": "OK"}, {"id": "law3-009", "originalId": "", "genreLabel": "法令3", "subCategory": "予防規程対象施設", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、予防規程を定めなければならない製造所等として、定められているものは次のうちどれか。ただし、鉱山保安法による保安規程又は火薬類取締法による危害予防規程を定めているものを除く。", "options": ["指定数量の倍数が100の屋内貯蔵所", "指定数量の倍数が100の屋外貯蔵所", "指定数量の倍数が100の屋外タンク貯蔵所", "指定数量の倍数が5の製造所", "屋外の自家用の給油取扱所"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "屋外貯蔵所は、指定数量の倍数が100以上の場合、予防規程を定めなければなりません。", "source": "法令3.pdf p.4", "status": "OK"}, {"id": "law3-010", "originalId": "", "genreLabel": "法令3", "subCategory": "予防規程対象施設", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次のA〜Eに掲げる製造所等のうち、指定数量の倍数により予防規程を定めなければならないものの組み合わせはどれか。\n\nA. 製造所\nB. 地下タンク貯蔵所\nC. 移動タンク貯蔵所\nD. 販売取扱所\nE. 屋外タンク貯蔵所", "options": ["AとB", "BとC", "CとD", "DとE", "AとE"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "製造所と屋外タンク貯蔵所は、指定数量の倍数により予防規程の作成義務が生じます。", "source": "法令3.pdf p.4", "status": "OK"}, {"id": "law3-011", "originalId": "", "genreLabel": "法令3", "subCategory": "予防規程対象施設", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、危険物の品名及び数量にかかわらず予防規程を定めなければならない製造所等は、次のうちどれか。", "options": ["一般取扱所", "屋内貯蔵所", "屋外貯蔵所", "移動タンク貯蔵所", "屋外タンク貯蔵所", "地下タンク貯蔵所", "移送取扱所"], "correctNos": [7], "answerIndexes": [6], "correctNo": 7, "answer": 6, "explanation": "移送取扱所は、危険物の品名及び数量にかかわらず予防規程を定めなければならない製造所等に該当します。", "source": "法令3.pdf p.5-6", "status": "OK"}, {"id": "law3-012", "originalId": "", "genreLabel": "法令3", "subCategory": "予防規程", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、製造所等において定めなければならない予防規程について、次のうち誤っているものはどれか。", "options": ["予防規程を定める場合及び変更する場合は、市町村長等の認可を受けなければならない。", "予防規程は、当該製造所等の危険物保安監督者が作成し、認可を受けなければならない。", "予防規程に関して、火災予防のため必要があるときは、市町村長等から変更を命ぜられることがある。", "予防規程には、地震発生時における施設及び設備に対する点検、応急措置等に関することを定めなければならない。", "予防規程には、災害その他の非常の場合に取るべき措置に関することを定めなければならない。"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "予防規程を定めるのは危険物保安監督者ではなく、製造所等の所有者、管理者又は占有者です。", "source": "法令3.pdf p.5-6", "status": "OK"}, {"id": "law3-013", "originalId": "", "genreLabel": "法令3", "subCategory": "予防規程", "difficulty": 2, "type": "誤っているものを選べ", "question": "法令上、予防規程について、次のうち誤っているものはどれか。", "options": ["予防規程を定めたときは、市町村長等の認可を受けなければならない。", "予防規程を定めなければならない製造所等において、これを定めずに危険物を貯蔵し、又は取り扱った場合は、罰せられることがある。", "予防規程は、指定数量の倍数が100以上の製造所等において定めなければならない。", "予防規程を変更したときは、市町村長等の認可を受けなければならない。", "予防規程は、製造所等の火災予防のために所有者等が定める保安基準で、自主的な意義を有する。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "予防規程の作成義務は、指定数量の倍数100以上だけで一律に決まるものではありません。製造所は10以上、屋外貯蔵所は100以上など、施設区分ごとに条件が異なります。", "source": "法令3.pdf p.6-7", "status": "OK"}, {"id": "law3-014", "originalId": "", "genreLabel": "法令3", "subCategory": "予防規程・セルフ給油", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、営業用給油取扱所の予防規程のうち、顧客に自ら給油等をさせる給油取扱所のみが定めなければならない事項は、次のうちどれか。", "options": ["顧客に対する従業員の接遇教育に関すること。", "顧客の車両に対する誘導に関すること。", "顧客に対する価格の表示に関すること。", "顧客に対する監視その他保安のための措置に関すること。", "顧客の車両に対する点検、検査に関すること。"], "correctNos": [4], "answerIndexes": [3], "correctNo": 4, "answer": 3, "explanation": "セルフ式給油取扱所では、顧客に対する監視その他保安のための措置に関する事項を予防規程に定めます。", "source": "法令3.pdf p.8", "status": "OK"}, {"id": "law3-015", "originalId": "", "genreLabel": "法令3", "subCategory": "予防規程", "difficulty": 2, "type": "該当しないものを選べ", "question": "法令上、予防規程に定めなければならない事項に該当しないものは、次のうちどれか。", "options": ["危険物施設の運転又は操作に関すること。", "危険物の取扱作業の基準に関すること。", "補修等の方法に関すること。", "地震発生時における施設及び設備に対する点検、応急措置等に関すること。", "製造所等において火災が発生した場合、当該施設が火災及び消火で受けた損害調査に関すること。"], "correctNos": [5], "answerIndexes": [4], "correctNo": 5, "answer": 4, "explanation": "損害調査に関する事項は、予防規程に定めなければならない事項ではありません。", "source": "法令3.pdf p.8", "status": "OK"}, {"id": "law3-016", "originalId": "", "genreLabel": "法令3", "subCategory": "予防規程", "difficulty": 2, "type": "該当しないものを選べ", "question": "法令上、予防規程に定めなければならない事項として、該当しないものは次のうちどれか。", "options": ["危険物の在庫の管理と発注に関すること。", "危険物の保安に関する業務を管理する者の職務及び組織に関すること。", "危険物の取扱作業の基準に関すること。", "災害その他の非常の場合に取るべき措置に関すること。", "危険物の保安に係る作業に従事する者に対する保安教育に関すること。"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "在庫管理や発注に関することは、予防規程に定めなければならない事項ではありません。", "source": "法令3.pdf p.8", "status": "OK"}, {"id": "law3-017", "originalId": "", "genreLabel": "法令3", "subCategory": "維持命令", "difficulty": 2, "type": "誤っている箇所を選べ", "question": "法令上、次の下線部分A〜Dのうち、誤っているもののみをすべて掲げているものはどれか。\n\n「製造所等の（A）所有者等は、製造所等の位置、構造及び設備が技術上の基準に適合するように維持しなければならない。（B）市町村長等は、製造所等の位置、構造及び設備が技術上の基準に適合していないと認めるときは、製造所等の（C）危険物取扱者免状を有する者に対し、技術上の基準に適合するように、これらを（D）修理し、改造し、又は移転すべきことを命ずることができる。」", "options": ["A", "B", "C", "A、B", "B、D"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "命令の対象は危険物取扱者免状を有する者ではなく、所有者、管理者又は占有者で権原を有する者です。", "source": "法令3.pdf p.9", "status": "OK"}, {"id": "law3-018", "originalId": "", "genreLabel": "法令3", "subCategory": "維持命令", "difficulty": 2, "type": "正しいものを選べ", "question": "消防法に定める、製造所等の位置、構造及び設備の技術上の基準について、次の文の（　）内に当てはまる語句として、正しいものはどれか。\n\n「市町村長等は、製造所、貯蔵所又は取扱所の位置、構造及び設備が第10条第4項の技術上の基準に適合していないと認めるときは、製造所、貯蔵所又は取扱所の（　）に対し、同項の技術上の基準に適合するように、これらを修理し、改造し、又は移転すべきことを命ずることができる。」", "options": ["危険物保安監督者", "所有者、管理者又は占有者で権原を有する者", "危険物保安統括管理者", "危険物施設保安員", "危険物取扱者"], "correctNos": [2], "answerIndexes": [1], "correctNo": 2, "answer": 1, "explanation": "技術上の基準に適合するよう命令できる相手は、所有者、管理者又は占有者で権原を有する者です。", "source": "法令3.pdf p.9-10", "status": "OK"}, {"id": "law3-019", "originalId": "", "genreLabel": "法令3", "subCategory": "共通義務", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、製造所等の区分及び貯蔵し、又は取り扱う危険物の品名、数量に関係なく、すべての製造所等の所有者等に共通して義務付けられているものは、次のうちどれか。", "options": ["製造所等に危険物保安監督者を定めなければならない。", "製造所等に自衛消防組織を置かなければならない。", "製造所等の位置、構造及び設備を技術上の基準に適合するよう維持しなければならない。", "製造所等の火災を予防するため、予防規程を定めなければならない。", "製造所等に危険物施設保安員を定めなければならない。"], "correctNos": [3], "answerIndexes": [2], "correctNo": 3, "answer": 2, "explanation": "すべての製造所等に共通する義務は、位置、構造及び設備を技術上の基準に適合するよう維持することです。", "source": "法令3.pdf p.10", "status": "OK"}, {"id": "law3-020", "originalId": "", "genreLabel": "法令3", "subCategory": "定期点検対象", "difficulty": 2, "type": "正しいものを選べ", "question": "法令上、定期点検が義務づけられている製造所等は、次のうちどれか。", "options": ["地下タンクを有する製造所", "すべての屋外タンク貯蔵所", "すべての屋外貯蔵所", "簡易タンクのみを有する給油取扱所", "すべての屋内タンク貯蔵所"], "correctNos": [1], "answerIndexes": [0], "correctNo": 1, "answer": 0, "explanation": "地下タンクを有する製造所は、定期点検の対象です。", "source": "法令3.pdf p.11", "status": "OK"}, {"id": "law3-021", "originalId": "", "genreLabel": "法令3", "subCategory": "定期点検対象", "difficulty": 2, "type": "正しい組み合わせを選べ", "question": "法令上、次のA〜Eの製造所等のうち、定期点検を行わなければならないもののみを掲げているものはど
